"desc": "Cybersecurity roles, responsibilities, and authorities to foster accountability are established and communicated."}, {"id": "GV.PO", "name": "Policy", "desc": "Organizational cybersecurity policy is established, communicated and enforced."}, {"id": "GV.OV", "name": "Oversight", "desc": "Results of cybersecurity risk management activities are used to inform, improve and adjust the risk management strategy."}, {"id": "GV.SC", "name": "Supply chain risk management", "desc": "Cyber supply chain risk management processes are identified, established, managed, monitored and improved."}]}, {"id": "ID", "name": "Identify", "desc": "Develop understanding to manage cybersecurity risk to systems and assets.", "controls": [{"id": "ID.AM", "name": "Asset management", "desc": "Assets that enable the organization to achieve business purposes are identified and managed consistent with their importance to organizational objectives."}, {"id": "ID.RA", "name": "Risk assessment", "desc": "The cybersecurity risk to the organization, assets, and individuals is understood."}, {"id": "ID.IM", "name": "Improvement", "desc": "Improvements to organizational cybersecurity risk management processes are identified across all CSF Functions."}]}, {"id": "PR", "name": "Protect", "desc": "Develop and implement safeguards to ensure delivery of critical services.", "controls": [{"id": "PR.AA", "name": "Identity management and authentication", "desc": "Access to physical and logical assets is limited to authorized users, services, and hardware commensurate with the assessed risk."}, {"id": "PR.AT", "name": "Awareness and training", "desc": "The organization's personnel are provided cybersecurity awareness education and are trained to perform their cybersecurity-related duties."}, {"id": "PR.DS", "name": "Data security", "desc": "Information and records are managed consistent with the organization's risk strategy to protect confidentiality, integrity, and availability."}, {"id": "PR.PS", "name": "Platform security", "desc": "The hardware, software, and services of physical and virtual platforms are managed consistent with the organization's risk strategy."}, {"id": "PR.IR", "name": "Technology infrastructure resilience", "desc": "Security architectures are managed with the organization's risk strategy to protect asset confidentiality, integrity, and availability."}]}, {"id": "DE", "name": "Detect", "desc": "Develop and implement activities to identify cybersecurity events.", "controls": [{"id": "DE.CM", "name": "Continuous monitoring", "desc": "Assets are monitored to find anomalies, indicators of compromise, and other potentially adverse events."}, {"id": "DE.AE", "name": "Adverse event analysis", "desc": "Anomalies and other potentially adverse events are analyzed to characterize and detect cybersecurity incidents."}]}, {"id": "RS", "name": "Respond", "desc": "Develop and implement activities to take action regarding detected incidents.", "controls": [{"id": "RS.MA", "name": "Incident management", "desc": "Responses to detected cybersecurity incidents are managed."}, {"id": "RS.AN", "name": "Incident analysis", "desc": "Investigations are conducted to ensure effective response and support forensics and recovery activities."}, {"id": "RS.CO", "name": "Incident response communication", "desc": "Response activities are coordinated with internal and external stakeholders."}, {"id": "RS.MI", "name": "Incident mitigation", "desc": "Activities are performed to prevent expansion of an event, mitigate its effects, and resolve the incident."}]}, {"id": "RC", "name": "Recover", "desc": "Develop and implement activities to restore capabilities impaired by an incident.", "controls": [{"id": "RC.RP", "name": "Incident recovery plan execution", "desc": "Restoration activities are performed to ensure operational availability of systems and services affected by cybersecurity incidents."}, {"id": "RC.CO", "name": "Incident recovery communication", "desc": "Restoration activities are coordinated with internal and external parties."}]}]}, {"id": "hipaa", "name": "HIPAA", "version": "2013", "desc": "Health Insurance Portability and Accountability Act \u2014 protecting patient health information.", "tag": "US Law", "domains": [{"id": "\u00a7164.308", "name": "Administrative Safeguards", "desc": "Policies and procedures to manage security measures protecting ePHI.", "controls": [{"id": "\u00a7164.308(a)(1)", "name": "Security management process", "desc": "Implement policies and procedures to prevent, detect, contain, and correct security violations."}, {"id": "\u00a7164.308(a)(2)", "name": "Assigned security responsibility", "desc": "Identify the security official who is responsible for the development and implementation of security policies and procedures."}, {"id": "\u00a7164.308(a)(3)", "name": "Workforce security", "desc": "Implement policies and procedures to ensure all workforce members have appropriate access to ePHI."}, {"id": "\u00a7164.308(a)(4)", "name": "Information access management", "desc": "Implement policies and procedures for authorizing access to ePHI consistent with applicable requirements."}, {"id": "\u00a7164.308(a)(5)", "name": "Security awareness and training", "desc": "Implement a security awareness and training program for all members of the workforce including management."}, {"id": "\u00a7164.308(a)(6)", "name": "Security incident procedures", "desc": "Implement policies and procedures to address security incidents."}, {"id": "\u00a7164.308(a)(7)", "name": "Contingency plan", "desc": "Establish policies and procedures for responding to an emergency or other occurrence that damages systems containing ePHI."}, {"id": "\u00a7164.308(a)(8)", "name": "Evaluation", "desc": "Perform a periodic technical and nontechnical evaluation of security policies in response to environmental or operational changes."}]}, {"id": "\u00a7164.310", "name": "Physical Safeguards", "desc": "Physical measures, policies and procedures to protect ePHI and related equipment.", "controls": [{"id": "\u00a7164.310(a)(1)", "name": "Facility access controls", "desc": "Implement policies and procedures to limit physical access to electronic information systems and the facility."}, {"id": "\u00a7164.310(b)", "name": "Workstation use", "desc": "Implement policies and procedures that specify the proper functions to be performed on workstations that can access ePHI."}, {"id": "\u00a7164.310(c)", "name": "Workstation security", "desc": "Implement physical safeguards for all workstations that access ePHI to restrict access to authorized users."}, {"id": "\u00a7164.310(d)(1)", "name": "Device and media controls", "desc": "Implement policies and procedures that govern the receipt and removal of hardware and electronic media that contain ePHI."}]}, {"id": "\u00a7164.312", "name": "Technical Safeguards", "desc": "Technology, policy and procedures for electronic systems that protect and control access to ePHI.", "controls": [{"id": "\u00a7164.312(a)(1)", "name": "Access control", "desc": "Implement technical policies and procedures to allow access only to authorized persons or software programs."}, {"id": "\u00a7164.312(b)", "name": "Audit controls", "desc": "Implement hardware, software, and procedural mechanisms that record and examine activity in information systems containing ePHI."}, {"id": "\u00a7164.312(c)(1)", "name": "Integrity controls", "desc": "Implement policies and procedures to protect ePHI from improper alteration or destruction."}, {"id": "\u00a7164.312(d)", "name": "Person or entity authentication", "desc": "Implement procedures to verify that a person or entity seeking access to ePHI is the one claimed."}, {"id": "\u00a7164.312(e)(1)", "name": "Transmission security", "desc": "Implement technical security measures to guard against unauthorized access to ePHI that is being transmitted over an electronic communications network."}]}, {"id": "\u00a7164.400", "name": "Breach Notification Rule", "desc": "Requirements for notification following a breach of unsecured protected health information.", "controls": [{"id": "\u00a7164.404", "name": "Notification to individuals", "desc": "Following discovery of a breach of unsecured PHI, notify each individual whose unsecured PHI has been accessed, acquired, used, or disclosed."}, {"id": "\u00a7164.406", "name": "Notification to the media", "desc": "A covered entity experiencing a breach involving more than 500 residents of a State shall notify prominent media outlets serving the State."}, {"id": "\u00a7164.408", "name": "Notification to Secretary of HHS", "desc": "Following discovery of a breach of unsecured PHI, notify the Secretary of HHS."}, {"id": "\u00a7164.410", "name": "Notification by a business associate", "desc": "A business associate shall notify the covered entity of a breach of unsecured PHI without unreasonable delay."}]}]}, {"id": "cis", "name": "CIS Controls", "version": "v8", "desc": "Prioritised set of actions to protect organisations from cyber attacks.", "tag": "CIS", "domains": [{"id": "IG1", "name": "Basic Cyber Hygiene (IG1)", "desc": "A foundational set of controls for every enterprise.", "controls": [{"id": "CIS-1", "name": "Inventory and control of enterprise assets", "desc": "Actively manage all enterprise assets connected to the infrastructure to accurately track and protect those with access to critical assets."}, {"id": "CIS-2", "name": "Inventory and control of software assets", "desc": "Actively manage all software on the network so only authorized software is installed and can execute."}, {"id": "CIS-3", "name": "Data protection", "desc": "Develop processes and technical controls to identify, classify, securely handle, retain and dispose of data."}, {"id": "CIS-4", "name": "Secure configuration of enterprise assets and software", "desc": "Establish and maintain secure configurations for enterprise assets and software."}, {"id": "CIS-5", "name": "Account management", "desc": "Use processes and tools to assign and manage authorization to credentials for user, administrator and service accounts."}, {"id": "CIS-6", "name": "Access control management", "desc": "Use processes and tools to create, assign, manage and revoke access credentials and privileges."}]}, {"id": "IG2", "name": "Foundational Controls (IG2)", "desc": "Technical controls for organizations with dedicated IT and security staff.", "controls": [{"id": "CIS-7", "name": "Continuous vulnerability management", "desc": "Develop a plan to continuously assess and track vulnerabilities on all enterprise assets and remediate or minimize the window of opportunity for attackers."}, {"id": "CIS-8", "name": "Audit log management", "desc": "Collect, alert, review and retain audit logs of events that could help detect, understand, or recover from an attack."}, {"id": "CIS-9", "name": "Email and web browser protections", "desc": "Improve protections and detections of threats from email and web vectors."}, {"id": "CIS-10", "name": "Malware defenses", "desc": "Prevent or control the installation, spread and execution of malicious applications, code, or scripts on enterprise assets."}, {"id": "CIS-11", "name": "Data recovery", "desc": "Establish and maintain data recovery practices sufficient to restore in-scope enterprise assets to a pre-incident and trusted state."}, {"id": "CIS-12", "name": "Network infrastructure management", "desc": "Establish, implement, and actively manage network devices to prevent attackers from exploiting vulnerable network services and access points."}, {"id": "CIS-13", "name": "Network monitoring and defense", "desc": "Operate processes and tooling to establish and maintain comprehensive network monitoring and defense against security threats."}]}, {"id": "IG3", "name": "Organisational Controls (IG3)", "desc": "Advanced controls for organizations with dedicated security teams.", "controls": [{"id": "CIS-14", "name": "Security awareness and skills training", "desc": "Establish and maintain a security awareness program to influence behavior among the workforce."}, {"id": "CIS-15", "name": "Service provider management", "desc": "Develop a process to evaluate service providers who hold sensitive data or are responsible for critical IT platforms."}, {"id": "CIS-16", "name": "Application software security", "desc": "Manage the security lifecycle of in-house developed, hosted or acquired software to prevent, detect and remediate security weaknesses."}, {"id": "CIS-17", "name": "Incident response management", "desc": "Establish a program to develop and maintain an incident response capability to prepare, detect and quickly respond to an attack."}, {"id": "CIS-18", "name": "Penetration testing", "desc": "Test the effectiveness and resiliency of enterprise assets through identifying and exploiting weaknesses in controls."}]}]}, {"id": "nis2", "name": "NIS2", "version": "EU 2022/2555", "desc": "EU Network and Information Systems Directive 2 \u2014 cybersecurity for essential and important entities.", "tag": "EU Directive", "domains": [{"id": "Art.20", "name": "Governance", "desc": "Management bodies must approve, oversee and be trained on cybersecurity risk-management measures.", "controls": [{"id": "Art.20.1", "name": "Management body approval of cybersecurity measures", "desc": "Member States shall ensure that management bodies of essential and important entities approve the cybersecurity risk-management measures taken, oversee their implementation and can be held liable for infringements."}, {"id": "Art.20.2", "name": "Training of management bodies", "desc": "Member States shall ensure that members of the management bodies are required to follow training, and shall encourage essential and important entities to offer similar training to their employees on a regular basis."}]}, {"id": "Art.21", "name": "Cybersecurity Risk-Management Measures", "desc": "Entities must adopt appropriate and proportionate technical, operational and organisational measures.", "controls": [{"id": "Art.21.2(a)", "name": "Policies on risk analysis and information system security", "desc": "All-hazards approach policies covering risk analysis and information system security must be established, documented and implemented."}, {"id": "Art.21.2(b)", "name": "Incident handling", "desc": "Policies and procedures for incident detection, analysis, containment, response and recovery must be in place and regularly tested."}, {"id": "Art.21.2(c)", "name": "Business continuity and crisis management", "desc": "Business continuity measures including backup management, disaster recovery and crisis management must be established and maintained."}, {"id": "Art.21.2(d)", "name": "Supply chain security", "desc": "Security in supply chain including security-related aspects concerning relationships between entities and their direct suppliers or service providers must be addressed."}, {"id": "Art.21.2(e)", "name": "Security in network and information systems acquisition, development and maintenance", "desc": "Security measures covering acquisition, development and maintenance of network and information systems, including vulnerability handling and disclosure."}, {"id": "Art.21.2(f)", "name": "Policies to assess effectiveness of cybersecurity measures", "desc": "Policies and procedures to assess the effectiveness of cybersecurity risk-management measures including testing and auditing."}, {"id": "Art.21.2(g)", "name": "Basic cyber hygiene practices and cybersecurity training", "desc": "Basic cyber hygiene practices including zero-trust principles, software updates, device configuration, network segmentation, identity and access management, and user awareness training."}, {"id": "Art.21.2(h)", "name": "Policies and procedures regarding use of cryptography", "desc": "Policies and procedures regarding the use of cryptography and, where appropriate, encryption."}, {"id": "Art.21.2(i)", "name": "Human resources security, access control and asset management", "desc": "Human resources security policies, access control policies and asset management covering physical and environmental security."}, {"id": "Art.21.2(j)", "name": "Multi-factor authentication or continuous authentication solutions", "desc": "Use of multi-factor authentication or continuous authentication solutions, secured voice, video and text communications where appropriate."}]}, {"id": "Art.23", "name": "Reporting Obligations", "desc": "Essential and important entities must notify their CSIRT or competent authority of significant incidents.", "controls": [{"id": "Art.23.1", "name": "Notification of significant incidents", "desc": "Essential and important entities shall notify their CSIRT or competent authority of any significant incident without undue delay."}, {"id": "Art.23.2", "name": "Early warning (24 hours)", "desc": "Within 24 hours of becoming aware of a significant incident, entities shall submit an early warning indicating whether the incident is suspected to be caused by unlawful or malicious acts."}, {"id": "Art.23.3", "name": "Incident notification (72 hours)", "desc": "Within 72 hours of becoming aware, entities shall submit an incident notification including an initial assessment of the incident's severity, impact and indicators of compromise."}, {"id": "Art.23.4", "name": "Final report (1 month)", "desc": "Within 1 month of the incident notification, entities shall submit a final report including a detailed description, type of threat, root cause, applied and ongoing mitigation measures, and cross-border impact."}]}, {"id": "Art.30-36", "name": "Supervisory & Enforcement", "desc": "Supervisory powers available to competent authorities for essential and important entities.", "controls": [{"id": "Art.32.1", "name": "Supervisory measures for essential entities", "desc": "Competent authorities shall have the power to subject essential entities to ex-ante and ex-post supervisory measures including on-site inspections, targeted security audits, security scans and requests for information."}, {"id": "Art.33.1", "name": "Supervisory measures for important entities", "desc": "Competent authorities shall have the power to subject important entities to ex-post supervisory measures including on-site inspections, targeted security audits and security scans."}, {"id": "Art.34.1", "name": "Administrative fines \u2014 essential entities", "desc": "Essential entities that infringe Articles 21 or 23 shall be subject to administrative fines of a maximum of at least EUR 10,000,000 or 2% of the total worldwide annual turnover, whichever is higher."}, {"id": "Art.34.2", "name": "Administrative fines \u2014 important entities", "desc": "Important entities that infringe Articles 21 or 23 shall be subject to administrative fines of a maximum of at least EUR 7,000,000 or 1.4% of the total worldwide annual turnover, whichever is higher."}, {"id": "Art.35.1", "name": "Personal liability of management", "desc": "Member States shall ensure that natural persons responsible for essential entities are liable for infringements, and may impose a temporary ban on persons discharging managerial responsibilities."}]}]}, {"id": "nist80053", "name": "NIST SP 800-53", "version": "Rev. 5", "desc": "Security and privacy controls for information systems and organizations \u2014 the comprehensive US federal control catalog.", "tag": "NIST", "domains": [{"id": "AC", "name": "Access Control", "desc": "Limiting system access to authorized users, processes and devices.", "controls": [{"id": "AC-1", "name": "Policy and procedures", "desc": "Develop, document and disseminate access control policy and procedures that address purpose, scope, roles, responsibilities, management commitment and compliance."}, {"id": "AC-2", "name": "Account management", "desc": "Define account types, establish conditions for membership, identify authorized users, require approvals, create and enable accounts, monitor for atypical use."}, {"id": "AC-3", "name": "Access enforcement", "desc": "Enforce approved authorizations for logical access to information and system resources in accordance with applicable access control policies."}, {"id": "AC-5", "name": "Separation of duties", "desc": "Separate duties of individuals as necessary to prevent malevolent activity; document separation of duties; implement access control policies to enforce separation."}, {"id": "AC-6", "name": "Least privilege", "desc": "Employ the principle of least privilege, allowing only authorized accesses for users and processes necessary to accomplish assigned organizational tasks."}, {"id": "AC-7", "name": "Unsuccessful logon attempts", "desc": "Enforce a limit of consecutive invalid logon attempts by a user during a specified time period and automatically lock the account."}, {"id": "AC-17", "name": "Remote access", "desc": "Establish and document usage restrictions, configuration and connection requirements for remote access; authorize each type of remote access prior to allowing connections."}, {"id": "AC-18", "name": "Wireless access", "desc": "Establish configuration requirements and connection requirements for wireless access; authorize wireless access prior to allowing connections."}]}, {"id": "AT", "name": "Awareness and Training", "desc": "Ensuring personnel are aware of security risks and trained to carry out their responsibilities.", "controls": [{"id": "AT-2", "name": "Literacy training and awareness", "desc": "Provide security and privacy literacy training to personnel as part of initial training for new personnel and when required by changes; update training content at least annually."}, {"id": "AT-3", "name": "Role-based training", "desc": "Provide role-based security and privacy training before authorizing access to the system, when required by changes, and at a defined frequency thereafter."}, {"id": "AT-4", "name": "Training records", "desc": "Document and monitor information security and privacy training activities and retain individual training records for a defined period."}]}, {"id": "AU", "name": "Audit and Accountability", "desc": "Creating, protecting and retaining system audit logs to enable monitoring, analysis, investigation and reporting.", "controls": [{"id": "AU-2", "name": "Event logging", "desc": "Identify the types of events that the system is capable of logging in support of the audit function; coordinate the event logging function with other organizations."}, {"id": "AU-3", "name": "Content of audit records", "desc": "Ensure that audit records contain information that establishes what type of event occurred, when, where, the source, the outcome, and the identity of individuals associated with the event."}, {"id": "AU-6", "name": "Audit record review, analysis and reporting", "desc": "Review and analyze system audit records at a defined frequency for indications of inappropriate or unusual activity; report findings to defined personnel."}, {"id": "AU-9", "name": "Protection of audit information", "desc": "Protect audit information and tools from unauthorized access, modification, and deletion."}, {"id": "AU-11", "name": "Audit record retention", "desc": "Retain audit records for a defined period to provide support for after-the-fact investigations of security incidents."}, {"id": "AU-12", "name": "Audit record generation", "desc": "Provide audit record generation capability for defined event types; generate audit records for defined events."}]}, {"id": "CA", "name": "Assessment, Authorization & Monitoring", "desc": "Ongoing assessment of security controls, authorization of systems, and continuous monitoring.", "controls": [{"id": "CA-2", "name": "Control assessments", "desc": "Select the appropriate assessor or assessment team; develop a plan; assess controls; produce assessment reports; provide results to defined personnel."}, {"id": "CA-5", "name": "Plan of action and milestones", "desc": "Develop a plan of action and milestones for the system documenting planned remediation actions to correct weaknesses or deficiencies."}, {"id": "CA-6", "name": "Authorization", "desc": "Assign a senior official as the authorizing official; ensure the official authorizes the system for processing before commencing operations."}, {"id": "CA-7", "name": "Continuous monitoring", "desc": "Develop a continuous monitoring strategy and implement a program that includes establishment of defined metrics; monitoring of controls; assessment of control effectiveness; reporting security status."}]}, {"id": "CM", "name": "Configuration Management", "desc": "Establishing and maintaining baseline configurations and inventories of organizational systems.", "controls": [{"id": "CM-2", "name": "Baseline configuration", "desc": "Develop, document and maintain a current baseline configuration of the system; review and update the baseline at defined frequency."}, {"id": "CM-3", "name": "Configuration change control", "desc": "Determine types of changes that are configuration-controlled; review proposed changes; approve or disapprove changes with consideration for security and privacy."}, {"id": "CM-6", "name": "Configuration settings", "desc": "Establish and document configuration settings for technology products that reflect the most restrictive mode consistent with operational requirements."}, {"id": "CM-7", "name": "Least functionality", "desc": "Configure the system to provide only essential capabilities; prohibit or restrict use of functions, ports, protocols, software and services not required."}, {"id": "CM-8", "name": "System component inventory", "desc": "Develop and document an inventory of system components that accurately reflects the system; review and update the inventory at a defined frequency."}]}, {"id": "CP", "name": "Contingency Planning", "desc": "Establishing, maintaining and implementing plans for emergency response, backup operations and post-disaster recovery.", "controls": [{"id": "CP-2", "name": "Contingency plan", "desc": "Develop a contingency plan that identifies essential missions and business functions; provides recovery objectives; identifies roles and responsibilities; addresses maintaining essential missions during disruption."}, {"id": "CP-4", "name": "Contingency plan testing", "desc": "Test the contingency plan at a defined frequency to determine the effectiveness of the plan and the readiness to execute it."}, {"id": "CP-9", "name": "System backup", "desc": "Conduct backups of user-level information, system-level information and system documentation at a defined frequency; protect the confidentiality, integrity and availability of backup information."}, {"id": "CP-10", "name": "System recovery and reconstitution", "desc": "Provide for the recovery and reconstitution of the system to a known state within a defined time period after disruption, compromise or failure."}]}, {"id": "IA", "name": "Identification and Authentication", "desc": "Identifying and authenticating organizational users, devices and processes.", "controls": [{"id": "IA-2", "name": "Identification and authentication \u2014 organizational users", "desc": "Uniquely identify and authenticate organizational users and associate that unique identification with processes acting on behalf of those users."}, {"id": "IA-4", "name": "Identifier management", "desc": "Manage system identifiers by receiving authorization to assign; selecting an identifier; assigning the identifier; preventing reuse of identifiers."}, {"id": "IA-5", "name": "Authenticator management", "desc": "Manage system authenticators by verifying identity; establishing initial authenticator content; establishing administrative procedures; changing default authenticators."}, {"id": "IA-8", "name": "Identification and authentication \u2014 non-organizational users", "desc": "Uniquely identify and authenticate non-organizational users or processes acting on behalf of non-organizational users."}, {"id": "IA-11", "name": "Re-authentication", "desc": "Require users to re-authenticate when defined circumstances or situations require re-authentication."}]}, {"id": "IR", "name": "Incident Response", "desc": "Establishing incident response capability including training, testing, handling, monitoring and reporting.", "controls": [{"id": "IR-2", "name": "Incident response training", "desc": "Provide incident response training to system users consistent with assigned roles and responsibilities at a defined frequency."}, {"id": "IR-3", "name": "Incident response testing", "desc": "Test the incident response capability at a defined frequency to determine its effectiveness."}, {"id": "IR-4", "name": "Incident handling", "desc": "Implement an incident handling capability for incidents that includes preparation, detection and analysis, containment, eradication and recovery."}, {"id": "IR-5", "name": "Incident monitoring", "desc": "Track and document incidents."}, {"id": "IR-6", "name": "Incident reporting", "desc": "Require personnel to report suspected incidents to the organizational incident response capability within a defined time period."}, {"id": "IR-8", "name": "Incident response plan", "desc": "Develop an incident response plan that provides guidance for implementing the incident response capability; review and update the plan at a defined frequency."}]}, {"id": "RA", "name": "Risk Assessment", "desc": "Assessing risk to operations, assets, individuals and other organizations.", "controls": [{"id": "RA-2", "name": "Security categorization", "desc": "Categorize the system and information it processes, stores and transmits; document the security categorization results in the security plan."}, {"id": "RA-3", "name": "Risk assessment", "desc": "Conduct a risk assessment that includes identifying threats and vulnerabilities; determining the likelihood; determining the resulting impact; identifying mitigations that reduce risk to an acceptable level."}, {"id": "RA-5", "name": "Vulnerability monitoring and scanning", "desc": "Monitor and scan for vulnerabilities in the system and hosted applications at a defined frequency; employ vulnerability monitoring tools and techniques."}]}, {"id": "SC", "name": "System and Communications Protection", "desc": "Protecting communications and controlling the flow of information.", "controls": [{"id": "SC-5", "name": "Denial of service protection", "desc": "Protect against or limit the effects of denial-of-service events."}, {"id": "SC-7", "name": "Boundary protection", "desc": "Monitor and control communications at the external boundary of the system and at key internal boundaries; connect to external networks only through managed interfaces."}, {"id": "SC-8", "name": "Transmission confidentiality and integrity", "desc": "Implement cryptographic mechanisms to prevent unauthorized disclosure of information and detect changes to information during transmission."}, {"id": "SC-12", "name": "Cryptographic key establishment and management", "desc": "Establish and manage cryptographic keys when cryptography is employed within the system in accordance with applicable requirements."}, {"id": "SC-28", "name": "Protection of information at rest", "desc": "Implement cryptographic mechanisms to prevent unauthorized disclosure and modification of defined information at rest."}]}, {"id": "SI", "name": "System and Information Integrity", "desc": "Identifying, reporting and correcting information system flaws.", "controls": [{"id": "SI-2", "name": "Flaw remediation", "desc": "Identify, report and correct information system flaws; test software and firmware updates for effectiveness; install security updates within a defined time period."}, {"id": "SI-3", "name": "Malicious code protection", "desc": "Implement malicious code protection mechanisms at system entry and exit points; update mechanisms at a defined frequency."}, {"id": "SI-4", "name": "System monitoring", "desc": "Monitor the system to detect attacks and indicators of potential attacks; anomalous and unauthorized system activity; connections of unauthorized devices."}, {"id": "SI-7", "name": "Software, firmware and information integrity", "desc": "Employ integrity verification tools to detect unauthorized changes to software, firmware and information."}]}, {"id": "SR", "name": "Supply Chain Risk Management", "desc": "Protecting against supply chain risks to the system, system components and system services.", "controls": [{"id": "SR-2", "name": "Supply chain risk management plan", "desc": "Develop a plan for managing supply chain risks associated with the research, development, design, manufacturing, acquisition, delivery, integration, operations, maintenance and disposal of the system."}, {"id": "SR-3", "name": "Supply chain controls and processes", "desc": "Establish a process or processes to identify and address weaknesses or deficiencies in the supply chain elements and processes."}, {"id": "SR-5", "name": "Acquisition strategies, tools and methods", "desc": "Employ acquisition strategies, contract tools and procurement methods to protect against, identify and mitigate supply chain risks."}, {"id": "SR-11", "name": "Component authenticity", "desc": "Implement controls to validate the authenticity of system components: anti-counterfeit training; anti-counterfeit scanning of components; reporting counterfeit system components."}]}]}, {"id": "dora", "name": "DORA", "version": "EU 2022/2554", "desc": "Digital Operational Resilience Act \u2014 ICT risk management and resilience requirements for EU financial entities.", "tag": "EU Regulation", "domains": [{"id": "Art.5-16", "name": "ICT Risk Management", "desc": "Requirements for financial entities to have robust ICT risk management frameworks.", "controls": [{"id": "Art.5", "name": "Governance and organisation", "desc": "Financial entities shall have in place an internal governance and control framework that ensures an effective and prudent management of ICT risk, in order to achieve a high level of digital operational resilience."}, {"id": "Art.6", "name": "ICT risk management framework", "desc": "Financial entities shall have a sound, comprehensive and well-documented ICT risk management framework enabling them to address ICT risk quickly, efficiently and comprehensively."}, {"id": "Art.7", "name": "ICT systems, protocols and tools", "desc": "Financial entities shall use and maintain updated ICT systems, protocols and tools that are appropriate to the magnitude of operations supporting the conduct of their activities."}, {"id": "Art.8", "name": "Identification", "desc": "Financial entities shall identify, classify and adequately document all ICT supported business functions, roles and responsibilities, information assets and ICT assets."}, {"id": "Art.9", "name": "Protection and prevention", "desc": "Financial entities shall continuously monitor and control the security and functioning of ICT systems and tools and shall minimise the impact of ICT risk through appropriate ICT security tools, policies and procedures."}, {"id": "Art.10", "name": "Detection", "desc": "Financial entities shall have in place mechanisms to promptly detect anomalous activities, including ICT network performance issues and ICT-related incidents."}, {"id": "Art.11", "name": "Response and recovery", "desc": "Financial entities shall put in place a comprehensive ICT business continuity policy, enabling recovery of all critical functions with minimum recovery time and recovery point objectives."}, {"id": "Art.12", "name": "Backup policies and recovery methods", "desc": "Financial entities shall implement ICT Business Continuity Plans that enable the recovery of all critical functions; set out minimum recovery time objectives and recovery point objectives."}, {"id": "Art.13", "name": "Learning and evolving", "desc": "Financial entities shall have capabilities and staff to gather information on vulnerabilities and cyber threats and ICT-related incidents, and analyse the impact those can have on their digital operational resilience."}, {"id": "Art.14", "name": "Communication", "desc": "Financial entities shall have in place crisis communication plans enabling responsible disclosure of ICT-related incidents to clients, counterparts and the public."}]}, {"id": "Art.17-23", "name": "ICT-Related Incident Management", "desc": "Requirements for managing, classifying and reporting ICT-related incidents.", "controls": [{"id": "Art.17", "name": "ICT-related incident management process", "desc": "Financial entities shall define, establish and implement an ICT-related incident management process to detect, manage and notify ICT-related incidents."}, {"id": "Art.18", "name": "Classification of ICT-related incidents and cyber threats", "desc": "Financial entities shall classify ICT-related incidents and determine their impact based on defined criteria including number of clients affected, duration, geographic spread, data losses and economic impact."}, {"id": "Art.19", "name": "Reporting of major ICT-related incidents", "desc": "Financial entities shall report major ICT-related incidents to the relevant competent authority: initial notification; intermediate report after a significant change; final report when root cause analysis has been completed."}]}, {"id": "Art.24-27", "name": "Digital Operational Resilience Testing", "desc": "Regular testing of ICT systems and tools to identify weaknesses and gaps.", "controls": [{"id": "Art.24", "name": "General requirements for resilience testing", "desc": "Financial entities shall establish, maintain and review a sound and comprehensive digital operational resilience testing programme as an integral part of the ICT risk management framework."}, {"id": "Art.25", "name": "Testing of ICT tools and systems", "desc": "The digital operational resilience testing programme shall include a range of assessments, tests, methodologies, practices and tools to be applied at least annually."}, {"id": "Art.26", "name": "Threat-led Penetration Testing (TLPT)", "desc": "Financial entities identified by competent authorities shall carry out Threat-Led Penetration Testing at least every 3 years."}]}, {"id": "Art.28-44", "name": "ICT Third-Party Risk Management", "desc": "Managing risks arising from ICT services provided by third-party providers.", "controls": [{"id": "Art.28", "name": "General principles of third-party risk management", "desc": "Financial entities shall manage ICT third-party risk as an integral component of ICT risk within their ICT risk management framework, adopting a risk-based approach in managing third-party relationships."}, {"id": "Art.29", "name": "Preliminary assessment of ICT concentration risk", "desc": "Prior to entering into a contractual arrangement, financial entities shall identify and assess all relevant risks including concentration risk."}, {"id": "Art.30", "name": "Key contractual provisions", "desc": "Contractual arrangements shall include: description of services; locations where services are provided; audit rights; data portability; termination rights; data security requirements."}, {"id": "Art.31", "name": "Designation of critical ICT third-party service providers", "desc": "The ESAs shall designate ICT third-party service providers that are critical for financial entities; critical providers shall be subject to an EU Oversight Framework."}]}, {"id": "Art.45-49", "name": "Information Sharing", "desc": "Arrangements for sharing cyber threat intelligence among financial entities.", "controls": [{"id": "Art.45", "name": "Principles for sharing information and intelligence", "desc": "Financial entities may exchange amongst themselves cyber threat information and intelligence, including indicators of compromise, tactics, techniques and procedures, and cyber security alerts."}]}]}, {"id": "iso22301", "name": "ISO 22301", "version": "2019", "desc": "Business continuity management systems \u2014 requirements for planning, establishing, implementing and improving a BCMS.", "tag": "ISO", "domains": [{"id": "4", "name": "Context of the Organisation", "desc": "Understanding the organisation and its context in relation to business continuity management.", "controls": [{"id": "4.1", "name": "Understanding the organisation and its context", "desc": "The organisation shall determine external and internal issues relevant to its purpose and that affect its ability to achieve the intended outcomes of its BCMS."}, {"id": "4.2", "name": "Understanding the needs of interested parties", "desc": "The organisation shall determine the interested parties relevant to the BCMS and their requirements related to business continuity."}, {"id": "4.3", "name": "Determining the scope of the BCMS", "desc": "The organisation shall determine the boundaries and applicability of the BCMS considering external and internal issues, requirements of interested parties, and the organisation's functions and services."}, {"id": "4.4", "name": "Business continuity management system", "desc": "The organisation shall establish, implement, maintain and continually improve a BCMS in accordance with the requirements of ISO 22301."}]}, {"id": "6", "name": "Planning", "desc": "Addressing risks and opportunities, setting objectives and planning to achieve them.", "controls": [{"id": "6.1", "name": "Actions to address risks and opportunities", "desc": "When planning for the BCMS, the organisation shall consider issues and determine the risks and opportunities that need to be addressed to give assurance that the BCMS can achieve its intended outcomes."}, {"id": "6.2", "name": "Business continuity objectives and plans", "desc": "The organisation shall establish business continuity objectives that are consistent with the policy; measurable; consider applicable requirements; be monitored and updated as appropriate."}]}, {"id": "8.2", "name": "Business Impact Analysis and Risk Assessment", "desc": "Understanding the organisation's activities and the impact of a disruption.", "controls": [{"id": "8.2.1", "name": "Business impact analysis", "desc": "The organisation shall establish a formal and documented process for business impact analysis that determines the impact of a disruption; identifies activities that support provision of products and services; determines recovery time objectives."}, {"id": "8.2.2", "name": "Risk assessment", "desc": "The organisation shall establish a formal and documented risk assessment process that identifies the risks of disruption; analyses and evaluates the risk of disruption; determines appropriate risk treatment."}]}, {"id": "8.3", "name": "Business Continuity Strategies and Solutions", "desc": "Determining and selecting strategies and solutions to protect prioritised activities.", "controls": [{"id": "8.3.1", "name": "Determination of business continuity strategies and solutions", "desc": "The organisation shall determine appropriate business continuity strategies and solutions to protect prioritised activities, stabilise, continue, resume and recover activities within their recovery time objectives."}, {"id": "8.3.3", "name": "Resource requirements", "desc": "The organisation shall determine the resource requirements for implementing business continuity solutions, including people, information and data, buildings and workspaces, technology, transportation and finance."}]}, {"id": "8.4", "name": "Business Continuity Plans and Procedures", "desc": "Documented procedures for responding to and recovering from a disruption.", "controls": [{"id": "8.4.1", "name": "General requirements", "desc": "The organisation shall establish, implement and maintain documented plans and procedures to respond to and recover from a disruption, including activation and deactivation of business continuity responses."}, {"id": "8.4.2", "name": "Incident response structure", "desc": "The organisation shall establish an incident response structure that enables it to manage a disruptive incident and provides immediate response to protect safety of people; manage and coordinate the incident; communicate with stakeholders."}, {"id": "8.4.4", "name": "Business continuity plans", "desc": "Plans shall contain the purpose and scope, activation criteria and procedures, roles and responsibilities, communication and contact details, resource requirements, key dependencies and information."}, {"id": "8.4.5", "name": "Recovery plans", "desc": "The organisation shall have documented procedures that restore and return business activities from a temporary measure to the normal level of business operations."}]}, {"id": "8.5", "name": "Exercising and Testing", "desc": "Confirming that business continuity plans and solutions are consistent with objectives.", "controls": [{"id": "8.5.1", "name": "General", "desc": "The organisation shall conduct exercises and tests of its business continuity procedures to ensure they are consistent with business continuity objectives; validate plans and solutions; identify opportunities for improvement."}, {"id": "8.5.2", "name": "Evaluation of exercises and tests", "desc": "The results of exercises and tests shall be evaluated and used to identify opportunities for improvement; update plans and procedures; report to management."}]}, {"id": "9", "name": "Performance Evaluation", "desc": "Monitoring, measurement, analysis, evaluation, internal audit and management review.", "controls": [{"id": "9.1", "name": "Monitoring, measurement, analysis and evaluation", "desc": "The organisation shall determine what needs to be monitored and measured; the methods for monitoring; when monitoring shall be performed; when the results shall be analysed and evaluated."}, {"id": "9.2", "name": "Internal audit", "desc": "The organisation shall conduct internal audits at planned intervals to provide information on whether the BCMS conforms to requirements of this document and is effectively implemented and maintained."}, {"id": "9.3", "name": "Management review", "desc": "Top management shall review the organisation's BCMS at planned intervals to ensure its continuing suitability, adequacy, effectiveness and alignment with the strategic direction."}]}]}, {"id": "mitre", "name": "MITRE ATT&CK", "version": "v14", "desc": "Knowledge base of adversary tactics, techniques and procedures based on real-world observations of cyber attacks.", "tag": "MITRE", "domains": [{"id": "TA0043", "name": "Reconnaissance", "desc": "Adversary is trying to gather information to plan future operations.", "controls": [{"id": "T1595", "name": "Active scanning", "desc": "Adversaries may execute active reconnaissance scans to gather information that can be used during targeting. Active scans involve the adversary probing victim infrastructure via network traffic."}, {"id": "T1592", "name": "Gather victim host information", "desc": "Adversaries may gather information about the victim's hosts that can be used during targeting, including administrative data and specifics regarding OS configuration and language."}, {"id": "T1589", "name": "Gather victim identity information", "desc": "Adversaries may gather information about the victim's identity that can be used during targeting, including employee names, email addresses, and credentials."}, {"id": "T1591", "name": "Gather victim organisation information", "desc": "Adversaries may gather information about the victim's organisation including business relationships, identified weaknesses, and determinations about key personnel."}, {"id": "T1593", "name": "Search open websites and domains", "desc": "Adversaries may search freely available websites and/or domains for information about victims, including social media, news articles and public-facing technical infrastructure."}]}, {"id": "TA0001", "name": "Initial Access", "desc": "Adversary is trying to get into your network.", "controls": [{"id": "T1189", "name": "Drive-by compromise", "desc": "Adversaries may gain access to a system through a user visiting a website over the normal course of browsing. Multiple ways of delivering exploit code to a browser exist."}, {"id": "T1190", "name": "Exploit public-facing application", "desc": "Adversaries may attempt to take advantage of a weakness in an Internet-facing computer or program using software, data, or commands in order to cause unintended behaviour."}, {"id": "T1566", "name": "Phishing", "desc": "Adversaries may send phishing messages to gain access to victim systems. All forms of phishing are electronically delivered social engineering. Phishing can be targeted, known as spearphishing."}, {"id": "T1078", "name": "Valid accounts", "desc": "Adversaries may obtain and abuse credentials of existing accounts as a means of gaining initial access, persistence, privilege escalation, or defense evasion."}, {"id": "T1195", "name": "Supply chain compromise", "desc": "Adversaries may manipulate products or product delivery mechanisms prior to receipt by a final consumer for the purpose of data or system compromise."}, {"id": "T1133", "name": "External remote services", "desc": "Adversaries may leverage external-facing remote services to initially access and/or persist within a network, including VPNs and Citrix."}]}, {"id": "TA0002", "name": "Execution", "desc": "Adversary is trying to run malicious code.", "controls": [{"id": "T1059", "name": "Command and scripting interpreter", "desc": "Adversaries may abuse command and script interpreters to execute commands, scripts, or binaries including PowerShell, Windows Command Shell, Unix shell, Python and JavaScript."}, {"id": "T1203", "name": "Exploitation for client execution", "desc": "Adversaries may exploit software vulnerabilities in client applications to execute code, including vulnerabilities in web browsers, office applications and PDF readers."}, {"id": "T1053", "name": "Scheduled task/job", "desc": "Adversaries may abuse task scheduling functionality to facilitate initial or recurring execution of malicious code including Windows Task Scheduler and cron."}]}, {"id": "TA0003", "name": "Persistence", "desc": "Adversary is trying to maintain their foothold.", "controls": [{"id": "T1547", "name": "Boot or logon autostart execution", "desc": "Adversaries may configure system settings to automatically execute a program during system boot or logon to maintain persistence or gain higher-level privileges."}, {"id": "T1136", "name": "Create account", "desc": "Adversaries may create an account to maintain access to victim systems. With sufficient access, creating accounts may establish secondary credentialed access that does not require persistent remote access tools."}, {"id": "T1176", "name": "Browser extensions", "desc": "Adversaries may abuse internet browser extensions to establish persistent access by hijacking the browser, stealing credentials, or establishing web traffic proxies."}]}, {"id": "TA0004", "name": "Privilege Escalation", "desc": "Adversary is trying to gain higher-level permissions.", "controls": [{"id": "T1548", "name": "Abuse elevation control mechanism", "desc": "Adversaries may circumvent mechanisms designed to control elevated privileges to gain higher-level permissions, including UAC bypass, sudo and setuid abuse."}, {"id": "T1068", "name": "Exploitation for privilege escalation", "desc": "Adversaries may exploit software vulnerabilities in an attempt to elevate privileges, including vulnerabilities in OS components, services and applications."}, {"id": "T1055", "name": "Process injection", "desc": "Adversaries may inject code into processes in order to evade process-based defenses as well as possibly elevate privileges on systems."}]}, {"id": "TA0005", "name": "Defense Evasion", "desc": "Adversary is trying to avoid being detected.", "controls": [{"id": "T1562", "name": "Impair defenses", "desc": "Adversaries may maliciously modify components of a victim environment to hinder or disable defensive mechanisms, including disabling AV, SIEM, firewalls, security auditing and logging."}, {"id": "T1070", "name": "Indicator removal", "desc": "Adversaries may delete or modify artifacts generated within systems to remove evidence of their presence or hinder defenses, including log deletion, file deletion and timestomping."}, {"id": "T1036", "name": "Masquerading", "desc": "Adversaries may attempt to manipulate features of their artifacts to make them appear legitimate or benign to users and/or security tools."}, {"id": "T1027", "name": "Obfuscated files or information", "desc": "Adversaries may attempt to make an executable or file difficult to discover or analyze by encrypting, encoding, or otherwise obfuscating its contents on the system or in transit."}]}, {"id": "TA0006", "name": "Credential Access", "desc": "Adversary is trying to steal account names and passwords.", "controls": [{"id": "T1110", "name": "Brute force", "desc": "Adversaries may use brute force techniques to gain access to accounts when passwords are unknown or when password hashes are obtained, including password spraying and credential stuffing."}, {"id": "T1555", "name": "Credentials from password stores", "desc": "Adversaries may search for common password storage locations to obtain user credentials, including web browsers, password managers, Windows Credential Manager and macOS Keychain."}, {"id": "T1056", "name": "Input capture", "desc": "Adversaries may use methods of capturing user input to obtain credentials or collect information including keylogging, GUI input capture and web portal capture."}, {"id": "T1539", "name": "Steal web session cookie", "desc": "Adversaries may steal web application or service session cookies and use them to gain access to web applications as an authenticated user without needing credentials."}]}, {"id": "TA0008", "name": "Lateral Movement", "desc": "Adversary is trying to move through your environment.", "controls": [{"id": "T1210", "name": "Exploitation of remote services", "desc": "Adversaries may exploit remote services to gain unauthorized access to internal systems once inside a network by targeting vulnerabilities in services such as SMB, RDP and databases."}, {"id": "T1021", "name": "Remote services", "desc": "Adversaries may use valid accounts to log into a service specifically designed to accept remote connections, such as RDP, SSH, VNC, Telnet and FTP."}, {"id": "T1570", "name": "Lateral tool transfer", "desc": "Adversaries may transfer tools or other files between systems in a compromised environment using protocols such as SMB and RDP or using management frameworks."}]}, {"id": "TA0010", "name": "Exfiltration", "desc": "Adversary is trying to steal data.", "controls": [{"id": "T1048", "name": "Exfiltration over alternative protocol", "desc": "Adversaries may steal data by exfiltrating it over a different protocol than that of the existing command and control channel, including DNS, SMTP, SFTP and FTP."}, {"id": "T1041", "name": "Exfiltration over C2 channel", "desc": "Adversaries may steal data by exfiltrating it over an existing command and control channel. Stolen data is encoded into the normal communications channel."}, {"id": "T1567", "name": "Exfiltration over web service", "desc": "Adversaries may use an existing, legitimate external web service to exfiltrate data rather than their primary command and control channel, including cloud storage and code repositories."}]}, {"id": "TA0040", "name": "Impact", "desc": "Adversary is trying to manipulate, interrupt, or destroy your systems and data.", "controls": [{"id": "T1485", "name": "Data destruction", "desc": "Adversaries may destroy data and files on specific systems or in large numbers on a network to interrupt availability to systems, services and network resources."}, {"id": "T1486", "name": "Data encrypted for impact", "desc": "Adversaries may encrypt data on target systems or on large numbers of systems in a network to interrupt availability to system and network resources, as in ransomware attacks."}, {"id": "T1490", "name": "Inhibit system recovery", "desc": "Adversaries may delete or remove built-in operating system data and turn off services designed to aid in the recovery of a corrupted system, including deleting backups and shadow copies."}, {"id": "T1499", "name": "Endpoint denial of service", "desc": "Adversaries may perform endpoint denial of service attacks to degrade or block the availability of services to users, including OS exhaustion floods and application exhaustion floods."}]}]}, {"id": "owasp", "name": "OWASP Top 10", "version": "2021", "desc": "The ten most critical web application security risks, maintained by the Open Web Application Security Project.", "tag": "OWASP", "domains": [{"id": "A01", "name": "Broken Access Control", "desc": "Access control enforces policy such that users cannot act outside of their intended permissions.", "controls": [{"id": "A01-1", "name": "Least privilege and deny by default", "desc": "Implement least privilege \u2014 access should only be granted to particular capabilities, resources, or data as required. Deny by default; deny access unless explicitly granted."}, {"id": "A01-2", "name": "Bypass access control checks", "desc": "Implement server-side access control checks; ensure that directory listing is disabled; log access control failures and alert administrators when appropriate."}, {"id": "A01-3", "name": "Insecure direct object references", "desc": "Use indirect object references; validate that the user has authorization to access the requested object; avoid exposing direct database keys in URLs."}, {"id": "A01-4", "name": "Missing access control for API endpoints", "desc": "Enforce access controls on APIs as well as web pages; do not rely on obscurity; implement rate limiting on API endpoints to reduce automated attack tool exposure."}, {"id": "A01-5", "name": "Elevation of privilege", "desc": "Deny access by default and require explicit grants; invalidate server-side sessions after logout; ensure JWT tokens are invalidated on server after logout."}]}, {"id": "A02", "name": "Cryptographic Failures", "desc": "Failures related to cryptography which often lead to sensitive data exposure or system compromise.", "controls": [{"id": "A02-1", "name": "Sensitive data transmitted in clear text", "desc": "Do not transmit sensitive data in clear text; use TLS with forward secrecy for all data in transit; enforce HTTPS using HSTS headers; disable older protocols."}, {"id": "A02-2", "name": "Weak cryptographic algorithms", "desc": "Use only strong, standard algorithms, protocols and keys; use bcrypt, scrypt or Argon2 for password storage; implement proper key management."}, {"id": "A02-3", "name": "Improper key management", "desc": "Generate cryptographically random keys of sufficient length; store keys securely and separately from encrypted data; rotate keys regularly."}, {"id": "A02-4", "name": "Missing encryption at rest", "desc": "Encrypt all sensitive data at rest; ensure backups are encrypted; do not store sensitive data unnecessarily; classify data and apply controls accordingly."}]}, {"id": "A03", "name": "Injection", "desc": "Injection flaws occur when untrusted data is sent to an interpreter as part of a command or query.", "controls": [{"id": "A03-1", "name": "SQL injection", "desc": "Use parameterized queries, prepared statements or stored procedures; validate all user-supplied input using allowlists; apply least privilege to database accounts."}, {"id": "A03-2", "name": "Command injection", "desc": "Avoid using system shell commands; if necessary, use safe APIs that avoid the shell; validate, filter and sanitize user-supplied data."}, {"id": "A03-4", "name": "Cross-site scripting (XSS)", "desc": "Use a framework that automatically escapes XSS by design; escape untrusted HTTP request data based on context; apply Content Security Policy (CSP) headers."}, {"id": "A03-5", "name": "XML injection and XXE", "desc": "Disable XML external entity and DTD processing in all XML parsers; implement positive server-side input validation; use JSON where possible."}]}, {"id": "A04", "name": "Insecure Design", "desc": "Risks related to design and architectural flaws, calling for more use of threat modelling.", "controls": [{"id": "A04-1", "name": "Missing threat modelling", "desc": "Establish and use a secure development lifecycle with AppSec professionals; implement threat modelling for critical authentication, access control and business logic flows."}, {"id": "A04-2", "name": "Insecure design patterns", "desc": "Integrate security design principles into the software development methodology; use security design patterns and reference architectures; limit consumption of resources by user or service."}, {"id": "A04-3", "name": "Missing business logic validation", "desc": "Validate business logic on the server side; use domain-driven design to identify and protect business-critical flows; implement anti-automation controls."}]}, {"id": "A05", "name": "Security Misconfiguration", "desc": "The most commonly seen issue \u2014 often resulting from insecure default configurations.", "controls": [{"id": "A05-1", "name": "Missing security hardening", "desc": "Implement a repeatable hardening process; remove all unnecessary features, components, documentation and samples; review and update configurations as part of patch management."}, {"id": "A05-2", "name": "Unnecessary features enabled", "desc": "Disable or remove all features, components, documentation, sample applications, default accounts and services not required; remove unused dependencies."}, {"id": "A05-3", "name": "Default credentials unchanged", "desc": "Change all default credentials after installation; implement a minimal platform without unnecessary features; implement automated verification of effectiveness of configurations."}]}, {"id": "A06", "name": "Vulnerable and Outdated Components", "desc": "Using components with known vulnerabilities that undermine application defenses.", "controls": [{"id": "A06-1", "name": "Unknown component versions", "desc": "Maintain an inventory of all components on both client and server side; continuously monitor CVE and NVD for vulnerabilities; obtain components only from official sources over secure links."}, {"id": "A06-2", "name": "Unpatched or unsupported components", "desc": "Remove unused dependencies and unnecessary features; continuously monitor for vulnerabilities in components; update components on a risk-based schedule."}, {"id": "A06-3", "name": "Missing software composition analysis", "desc": "Use software composition analysis (SCA) tools to identify vulnerable dependencies; implement automated dependency scanning in the CI/CD pipeline."}]}, {"id": "A07", "name": "Identification and Authentication Failures", "desc": "Confirmation of the user's identity, authentication and session management is critical.", "controls": [{"id": "A07-1", "name": "Weak password policies", "desc": "Implement multi-factor authentication; do not allow default, weak or well-known passwords; implement password length, complexity and reuse checks aligned with NIST 800-63B."}, {"id": "A07-3", "name": "Insecure session management", "desc": "Use server-side session management that generates new random session IDs with high entropy after login; do not send session IDs in URLs; properly invalidate session IDs after logout."}, {"id": "A07-4", "name": "Missing multi-factor authentication", "desc": "Implement MFA where possible to prevent credential stuffing, brute force and stolen credential reuse attacks; use phishing-resistant MFA (FIDO2/WebAuthn) for sensitive operations."}]}, {"id": "A08", "name": "Software and Data Integrity Failures", "desc": "Failures relating to code and infrastructure that does not protect against integrity violations.", "controls": [{"id": "A08-1", "name": "Insecure CI/CD pipeline", "desc": "Use digital signatures or similar mechanisms to verify the source and integrity of software and data; ensure pipelines have proper access controls and segregation of duties."}, {"id": "A08-3", "name": "Insecure deserialization", "desc": "Implement integrity checks such as digital signatures on serialized objects; enforce strict type constraints during deserialization; isolate and run code that deserializes in low privilege environments."}]}, {"id": "A09", "name": "Security Logging and Monitoring Failures", "desc": "Without logging and monitoring, breaches cannot be detected.", "controls": [{"id": "A09-1", "name": "Missing audit logs", "desc": "Ensure all login, access control failures and server-side input validation failures are logged with sufficient context to identify suspicious or malicious accounts."}, {"id": "A09-2", "name": "No monitoring of suspicious activity", "desc": "Ensure high-value transactions have an audit trail with integrity controls; establish effective monitoring and alerting so suspicious activities are detected and responded to in a timely fashion."}, {"id": "A09-4", "name": "Missing incident response plan", "desc": "Establish or adopt an incident response and recovery plan; use SIEM software to aggregate and correlate log data from multiple sources; implement alerting for common attack patterns."}]}, {"id": "A10", "name": "Server-Side Request Forgery (SSRF)", "desc": "SSRF flaws occur when a web application fetches a remote resource without validating the user-supplied URL.", "controls": [{"id": "A10-1", "name": "No network layer defenses", "desc": "Segment remote resource access functionality in separate networks; enforce deny-by-default firewall policies to block intranet traffic; log all accepted and blocked network flows on firewalls."}, {"id": "A10-2", "name": "Missing input validation for URLs", "desc": "Sanitize and validate all client-supplied input data; enforce URL schema, port, and destination with a positive allow list; do not send raw responses to clients; disable HTTP redirections."}]}]}];

function g(id){return document.getElementById(id);}

  if(!S.q||raw==null) return he(String(raw||""));

function showView(id){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));

  S.view=id.replace("v","").toLowerCase();

  g("nb-home").classList.toggle("on",id==="vHome");
  g("nb-bk").classList.toggle("on",id==="vBk");
  g("nb-search").classList.toggle("on",id==="vSearch");
}

function navHome(){showView("vHome");renderHome();}

  S.fw=DATA.find(f=>f.id===fwId);

  renderDoms();

function goBack(){
  if(S.hist.length){
    const prev=S.hist.pop();
    if(prev==="home") navHome();
    else if(prev==="doms") showView("vDoms");
  } else {
    navHome();
  }

let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();
  deferredPrompt=e;
  const banner=g("install-banner");
  if(banner&&!localStorage.getItem("grc_install_dismissed")){
    banner.classList.add("show");
  }
});
function installApp(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(r=>{
    if(r.outcome==="accepted") g("install-banner").classList.remove("show");
    deferredPrompt=null;
  });
}
function dismissInstall(){
  g("install-banner").classList.remove("show");
  localStorage.setItem("grc_install_dismissed","1");
}

    const c=col(fw.id),l=c+"18",t=tot(fw);

// ── Domains View ────────────────────────────────────────────────────────────
function renderDoms(){
  if(!S.fw) return;
  const fw=S.fw,q=S.q,c=col(fw.id),l=c+"18",t=tot(fw);
  let doms=fw.domains;
  if(q) doms=doms.filter(d=>
    d.name.toLowerCase().includes(q)||d.id.toLowerCase().includes(q)||
    d.controls.some(c2=>c2.id.toLowerCase().includes(q)||c2.name.toLowerCase().includes(q)||c2.desc.toLowerCase().includes(q))
  );

  const hero=(
    '<div class="fw-hero-mob">'+
      '<div class="fhm-ico" style="background:'+l+'">'+
        '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="'+c+'" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'+
      '</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="fhm-name">'+he(fw.name)+'</div>'+
        '<div class="fhm-ver">'+he(fw.version)+'</div>'+
        '<div class="fhm-desc">'+he(fw.desc)+'</div>'+
        '<div class="fhm-tags">'+
          '<span class="fhm-tag" style="background:'+l+';color:'+c+'">'+he(fw.tag)+'</span>'+
          '<span class="fhm-st">'+fw.domains.length+' domains</span>'+
          '<span class="fhm-st">'+t+' controls</span>'+
        '</div>'+
      '</div>'+
    '</div>'
  );

  const domBlocks=doms.map(function(d){
    const dk=fw.id+"::"+d.id;
    const isOp=!!S.open[dk]||!!q;
    let ctrls=d.controls;
    if(q) ctrls=ctrls.filter(c2=>c2.id.toLowerCase().includes(q)||c2.name.toLowerCase().includes(q)||c2.desc.toLowerCase().includes(q));
    const chvCls=isOp?"dom-chv op":"dom-chv";

    const ctrlRows=isOp?ctrls.map(function(c2){
      const isBk=!!S.bk[c2.id];
      const rowCls=isBk?"ctrl-row bkd":"ctrl-row";
      const bkCls=isBk?"ctrl-bk on":"ctrl-bk";
      const bkFill=isBk?"currentColor":"none";
      const maps=MAPS[c2.id]||[];
      const mapTags=maps.slice(0,4).map(function(mid){
        const e=IDX[mid];
        const mc=e?col(e.fw.id):"#888";
        return(
          '<button class="mt" style="color:'+mc+';border-color:'+mc+'33;background:'+mc+'11" data-goto="'+he(mid)+'">'+
            he(mid)+
            (e?'<span class="mt-fw">'+he(e.fw.tag)+'</span>':'')+
          '</button>'
        );
      }).join("")+(maps.length>4?'<span style="font-size:10px;color:var(--tx3)">+' +(maps.length-4)+'</span>':"");
      return(
        '<div class="'+rowCls+'" data-fwid="'+he(fw.id)+'" data-domid="'+he(d.id)+'" data-ctlid="'+he(c2.id)+'">'+
          '<div class="ctrl-id" style="color:'+c+'">'+hlT(c2.id)+'</div>'+
          '<div class="ctrl-body">'+
            '<div class="ctrl-nm">'+hlT(c2.name)+'</div>'+
            '<div class="ctrl-ds">'+hlT(c2.desc)+'</div>'+
            (maps.length?'<div class="ctrl-maps">'+mapTags+'</div>':'')+
          '</div>'+
          '<button class="'+bkCls+'" data-bkfw="'+he(fw.id)+'" data-bkdom="'+he(d.id)+'" data-bkctl="'+he(c2.id)+'">'+
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="'+bkFill+'" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>'+
          '</button>'+
        '</div>'
      );
    }).join(""):"";

    return(
      '<div class="dom-item">'+
        '<div class="dom-hd" data-dk="'+he(dk)+'">'+
          '<svg class="'+chvCls+'" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>'+
          '<span class="dom-did" style="background:'+l+';color:'+c+'">'+hlT(d.id)+'</span>'+
          '<div class="dom-nm">'+hlT(d.name)+'</div>'+
          '<span class="dom-ct">'+ctrls.length+(ctrls.length!==d.controls.length?"/"+d.controls.length:"")+'</span>'+
        '</div>'+
        (isOp?'<div class="dom-ctrls">'+ctrlRows+'</div>':'')+
      '</div>'
    );
  }).join("");

  g("vDoms").innerHTML=(
    '<div class="back-bar">'+
      '<button class="back-btn" id="backBtn">'+
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>'+
        'Frameworks'+
      '</button>'+
    '</div>'+
    hero+
    '<div class="doms-list">'+domBlocks+'</div>'
  );

  g("backBtn").addEventListener("click", navHome);
}

// Domains view event delegation
g("vDoms").addEventListener("click",function(e){
  const mt=e.target.closest(".mt[data-goto]");
  if(mt){e.stopPropagation();goCtrlDetail(mt.dataset.goto);return;}
  const bb=e.target.closest(".ctrl-bk[data-bkfw]");
  if(bb){e.stopPropagation();toggleBk(bb.dataset.bkfw,bb.dataset.bkdom,bb.dataset.bkctl);return;}
  const cr=e.target.closest(".ctrl-row[data-ctlid]");
