s incidents; ensure an adequate level of cybersecurity protection for the model and physical infrastructure."}, {"id": "Art.56", "name": "Codes of Practice", "desc": "The AI Office shall encourage and facilitate the drawing up of codes of practice at Union level to contribute to proper application of obligations for GPAI model providers. Providers of GPAI models shall make best efforts to contribute to and adhere to codes of practice."}]}, {"id": "Ch.VI", "name": "Innovation and Sandboxes", "desc": "Measures to support innovation including AI regulatory sandboxes and real-world testing provisions.", "controls": [{"id": "Art.57", "name": "AI Regulatory Sandboxes", "desc": "Member States shall establish at least one AI regulatory sandbox at national level which shall be operational by 2 August 2026. Sandboxes shall provide a controlled environment facilitating development, training, testing and validation of innovative AI systems before placement on the market."}, {"id": "Art.60", "name": "Testing in Real World Conditions", "desc": "Providers or prospective providers of high-risk AI systems may conduct testing in real world conditions outside AI regulatory sandboxes, under specific conditions including that testing must be conducted after notification to market surveillance authorities and for no longer than 6 months, extendable by 6 months."}]}, {"id": "Ch.VII", "name": "Governance", "desc": "Governance structures at EU and national level for implementing and enforcing the AI Act.", "controls": [{"id": "Art.64", "name": "AI Office", "desc": "The Commission shall establish an AI Office within the Commission, operational from 21 May 2024. The AI Office shall monitor and supervise GPAI models, develop expertise on AI, contribute to international cooperation on AI, and promote standards and testing tools."}, {"id": "Art.65", "name": "European Artificial Intelligence Board", "desc": "A European Artificial Intelligence Board is established. It shall consist of one representative per Member State. The Board shall advise and assist the Commission and Member States in order to facilitate the consistent and effective application of this Regulation."}, {"id": "Art.70", "name": "National Competent Authorities", "desc": "Each Member State shall designate at least one notifying authority and at least one market surveillance authority as national competent authorities. Member States may designate one single national competent authority to fulfil both roles."}]}, {"id": "Ch.IX", "name": "Post-Market Monitoring and Enforcement", "desc": "Obligations for post-market monitoring, serious incident reporting, and market surveillance by authorities.", "controls": [{"id": "Art.72", "name": "Post-Market Monitoring", "desc": "Providers of high-risk AI systems shall establish and document a post-market monitoring system. The system shall actively and systematically collect, document and analyse relevant data provided by deployers or collected through other sources throughout the lifetime of the AI system."}, {"id": "Art.73", "name": "Reporting of Serious Incidents", "desc": "Providers of high-risk AI systems placed on the EU market shall report any serious incident to the market surveillance authorities of the Member States where that incident occurred. Reporting shall be done immediately after establishing a causal link and no later than 15 days after becoming aware of the incident."}, {"id": "Art.74", "name": "Market Surveillance", "desc": "Market surveillance authorities shall have the power to require providers, deployers and other relevant operators to take corrective action where an AI system presents a risk, to withdraw the system from the market, to recall it, or to prohibit its use."}, {"id": "Art.86", "name": "Right to Explanation", "desc": "Any affected person who is subject to a decision taken by a deployer based significantly on the output of a high-risk AI system listed in Annex III, and that decision produces legal or similarly significant effects, shall have the right to obtain from the deployer a meaningful explanation of the decision."}]}, {"id": "Ch.XII", "name": "Penalties", "desc": "Administrative fines for non-compliance with the AI Act obligations.", "controls": [{"id": "Art.99(1)", "name": "Fines for Prohibited Practices", "desc": "Non-compliance with prohibited AI practices under Article 5 shall be subject to administrative fines of up to EUR 35,000,000 or, if the offender is an undertaking, up to 7% of its total worldwide annual turnover for the preceding financial year, whichever is higher."}, {"id": "Art.99(2)", "name": "Fines for High-Risk AI Non-Compliance", "desc": "Non-compliance with obligations for high-risk AI systems, GPAI model obligations, or transparency obligations shall be subject to administrative fines of up to EUR 15,000,000 or, if the offender is an undertaking, up to 3% of total worldwide annual turnover, whichever is higher."}, {"id": "Art.99(3)", "name": "Fines for Incorrect Information", "desc": "The supply of incorrect, incomplete or misleading information to notified bodies or national competent authorities in reply to a request shall be subject to administrative fines of up to EUR 7,500,000 or, if the offender is an undertaking, up to 1% of total worldwide annual turnover, whichever is higher."}, {"id": "Art.101", "name": "Fines for GPAI Model Providers", "desc": "The AI Office may impose on providers of GPAI models fines not exceeding 3% of their total worldwide annual turnover in the preceding financial year or EUR 15,000,000, whichever is higher, where the provider intentionally or negligently fails to comply with obligations."}]}]}];

// ── VIEW MANAGEMENT ──────────────────────────────────────────────────────────
function showView(id,dir){
  const views=document.querySelectorAll(".view");
  views.forEach(v=>{v.classList.remove("active","slide-in","slide-back");});
  const el=g(id);
  if(el){
    el.classList.add("active");
    if(dir==="forward") el.classList.add("slide-in");
    else if(dir==="back") el.classList.add("slide-back");
    setTimeout(()=>el.classList.remove("slide-in","slide-back"),250);
  }
  S.view=id.replace("v","").toLowerCase();
  g("nb-home").classList.toggle("on",id==="vHome"||id==="vDoms"||id==="vCtrls");
  g("nb-bk").classList.toggle("on",id==="vBk");
  g("nb-search").classList.toggle("on",id==="vSearch");
  renderBreadcrumb();
}

function navHome(){
  S.fw=null;S.dom=null;
  showView("vHome","back");
  renderHome();
}

function navBk(){showView("vBk");renderBkView();}

  const rows=fws.map(function(fw){

    const handleSvg='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="18" x2="16" y2="18"/></svg>';
    return(
      '<div class="fw-card" data-fwid="'+he(fw.id)+'" draggable="true">'+
        '<div class="drag-handle" data-handle="1">'+handleSvg+'</div>'+
        '<div class="fw-ico" style="background:'+l+'">'+
          '<svg width="20" height="20" viewBox="0 0 24 24" fill="'+l+'" stroke="'+c2+'" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>'+
        '</div>'+
        '<div class="fw-info">'+
          '<div class="fw-nm">'+he(fw.name)+'</div>'+
          '<div class="fw-meta">'+he(fw.tag)+' &bull; '+he(fw.version)+' &bull; '+he(fcat(fw.id))+' &bull; '+fw.domains.length+' domains</div>'+
        '</div>'+
        '<span class="fw-ct">'+t+'</span>'+
        '<svg class="fw-arr" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>'+
      '</div>'
    );
  }).join("");

  g("vHome").innerHTML=(
    '<div id="install-banner">'+
      '<div class="ib-txt"><strong>Install GRC Dashboard</strong>Add to home screen for offline access</div>'+
      '<button class="ib-btn" onclick="installApp()">Install</button>'+
      '<button class="ib-close" onclick="dismissInstall()">&#10005;</button>'+
    '</div>'+
    '<div class="sec-hd" style="display:flex;align-items:center;justify-content:space-between">'+
      '<span>'+lbl+'</span>'+editBtn+
    '</div>'+
    (rows||'<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>No frameworks match</p></div>')
  );
  // Attach edit order button listener
  const eob=g("editOrderBtn");
  if(eob) eob.addEventListener("click",function(){
    S.editOrder=!S.editOrder;
    document.body.classList.toggle("edit-order",S.editOrder);
    renderHome();
  });
  // Init drag (always — desktop draggable, touch handled separately)

  }

g("vHome").addEventListener("click",function(e){
  if(e.target.closest(".drag-handle")) return; // ignore handle clicks
  if(S.editOrder) return; // ignore card clicks in edit mode
  const card=e.target.closest(".fw-card[data-fwid]");
  if(card) goFW(card.dataset.fwid);
});

// ── DOMAINS: Folder view ──────────────────────────────────────────────────────
function goFW(fwId){
  S.fw=DATA.find(f=>f.id===fwId);
  S.dom=null;
  showView("vDoms","forward");
  renderDoms();
}

function goFWView(){
  S.dom=null;
  showView("vDoms","back");
  renderDoms();
}

function renderDoms(){
  if(!S.fw) return;
  const fw=S.fw,q=S.q,c2=col(fw.id),l=c2+"18",t=tot(fw);

  let doms=fw.domains;
  if(q) doms=doms.filter(d=>d.name.toLowerCase().includes(q)||d.id.toLowerCase().includes(q)||
    d.controls.some(c=>c.id.toLowerCase().includes(q)||c.name.toLowerCase().includes(q)||c.desc.toLowerCase().includes(q)));

  // Framework hero strip
  const hero=(
    '<div class="fw-hero-strip">'+
      '<div class="fhs-ico" style="background:'+l+'">'+
        '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="'+c2+'" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'+
      '</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="fhs-nm">'+he(fw.name)+'</div>'+
        '<div class="fhs-meta">'+he(fw.desc)+'</div>'+
        '<div class="fhs-tags">'+
          '<span class="fhs-tag" style="background:'+l+';color:'+c2+'">'+he(fw.tag)+'</span>'+
          '<span class="fhs-st">'+fw.domains.length+' domains</span>'+
          '<span class="fhs-st">'+t+' controls</span>'+
        '</div>'+
      '</div>'+
    '</div>'
  );

  // Folder cards for each domain
  const folderCards=doms.map(function(d){
    const ctCount=d.controls.length;
    return(
      '<div class="dom-folder" data-domid="'+he(d.id)+'">'+
        '<div class="dom-fol-ico" style="background:'+l+'">'+
          '<svg width="20" height="20" viewBox="0 0 24 24" fill="'+l+'" stroke="'+c2+'" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>'+
        '</div>'+
        '<div class="dom-fol-info">'+
          '<div><span class="dom-fol-id" style="background:'+l+';color:'+c2+'">'+hlT(d.id)+'</span></div>'+
          '<div class="dom-fol-nm">'+hlT(d.name)+'</div>'+
          '<div class="dom-fol-desc">'+he(d.desc)+'</div>'+
        '</div>'+
        '<span class="dom-fol-ct">'+ctCount+'</span>'+
        '<svg class="dom-fol-arr" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>'+
      '</div>'
    );
  }).join("");

  g("vDoms").innerHTML=hero+(folderCards||'<div class="empty"><p>No domains match</p></div>');
}

g("vDoms").addEventListener("click",function(e){
  const card=e.target.closest(".dom-folder[data-domid]");
  if(card&&S.fw){
    S.dom=S.fw.domains.find(d=>d.id===card.dataset.domid);
    showView("vCtrls","forward");
    renderCtrls();
  }
});

// ── CONTROLS: Control list for a domain ──────────────────────────────────────
function renderCtrls(){
  if(!S.fw||!S.dom) return;
  const fw=S.fw,d=S.dom,q=S.q,c2=col(fw.id),l=c2+"18";

  let ctrls=d.controls;
  if(q) ctrls=ctrls.filter(c=>c.id.toLowerCase().includes(q)||c.name.toLowerCase().includes(q)||c.desc.toLowerCase().includes(q));

  // Domain header strip
  const domHdr=(
    '<div class="dom-hdr-strip" style="border-bottom-color:'+c2+'">'+
      '<div class="dhs-ico" style="background:'+l+'">'+
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="'+c2+'" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>'+
      '</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div><span class="dhs-id" style="background:'+l+';color:'+c2+'">'+he(d.id)+'</span></div>'+
        '<div class="dhs-nm">'+he(d.name)+'</div>'+
        '<div class="dhs-desc">'+he(d.desc)+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="ctrl-count-bar">'+ctrls.length+' control'+(ctrls.length!==1?"s":"")+(q?" (filtered)":"")+'</div>'
  );

  const ctrlRows=ctrls.map(function(c){
    const isBk=!!S.bk[c.id];
    const rowCls=isBk?"ctrl-row bkd":"ctrl-row";
    const bkCls=isBk?"ctrl-bk on":"ctrl-bk";
    const bkFill=isBk?"currentColor":"none";
    const maps=MAPS[c.id]||[];
    const mapTags=maps.slice(0,4).map(function(mid){
      const e=IDX[mid];
      const mc=e?col(e.fw.id):"#888";
      return(
        '<button class="mt" style="color:'+mc+';border-color:'+mc+'33;background:'+mc+'11" data-goto="'+he(mid)+'">'+
          he(mid)+(e?'<span class="mt-fw">'+he(e.fw.tag)+'</span>':'')+
        '</button>'
      );
    }).join("")+(maps.length>4?'<span style="font-size:10px;color:var(--tx3)">+' +(maps.length-4)+'</span>':"");
    return(
      '<div class="'+rowCls+'" data-fwid="'+he(fw.id)+'" data-domid="'+he(d.id)+'" data-ctlid="'+he(c.id)+'">'+
        '<div class="ctrl-id" style="color:'+c2+'">'+hlT(c.id)+'</div>'+
        '<div class="ctrl-body">'+
          '<div class="ctrl-nm">'+hlT(c.name)+'</div>'+
          '<div class="ctrl-ds">'+hlT(c.desc)+'</div>'+
          (maps.length?'<div class="ctrl-maps">'+mapTags+'</div>':'')+
        '</div>'+
        '<button class="'+bkCls+'" data-bkfw="'+he(fw.id)+'" data-bkdom="'+he(d.id)+'" data-bkctl="'+he(c.id)+'">'+
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="'+bkFill+'" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>'+
        '</button>'+
      '</div>'
    );
  }).join("");

  g("vCtrls").innerHTML=domHdr+(ctrlRows||'<div class="empty"><p>No controls match</p></div>');
}

g("vCtrls").addEventListener("click",function(e){
  const mt=e.target.closest(".mt[data-goto]");
  if(mt){e.stopPropagation();goCtrlDetail(mt.dataset.goto);return;}
  const bb=e.target.closest(".ctrl-bk[data-bkfw]");
  if(bb){e.stopPropagation();toggleBk(bb.dataset.bkfw,bb.dataset.bkdom,bb.dataset.bkctl);return;}
  const cr=e.target.closest(".ctrl-row[data-ctlid]");
  if(cr){openDetail(cr.dataset.fwid,cr.dataset.domid,cr.dataset.ctlid);}
});

// ── SEARCH VIEW ───────────────────────────────────────────────────────────────
function renderSearch(){
  const q=S.q;
  if(!q){
    g("vSearch").innerHTML=(
      '<div class="empty">'+
        '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'+
        '<h2>Search Controls</h2>'+
        '<p>Search across all 16 frameworks<br>and 547 controls</p>'+
      '</div>'
    );
    return;
  }
  const results=[];
  DATA.forEach(fw=>{
    if(S.cat!=="All"&&fcat(fw.id)!==S.cat) return;
    fw.domains.forEach(d=>{
      d.controls.forEach(c=>{
        if(c.id.toLowerCase().includes(q)||c.name.toLowerCase().includes(q)||c.desc.toLowerCase().includes(q))
          results.push({c,d,fw});
      });
    });
  });
  if(!results.length){
    g("vSearch").innerHTML='<div class="empty"><p>No results for "'+he(q)+'"</p></div>';
    return;
  }
  const rows=results.slice(0,80).map(function(r){
    const co=col(r.fw.id),l=co+"18";
    return(
      '<div class="ctrl-row" data-fwid="'+he(r.fw.id)+'" data-domid="'+he(r.d.id)+'" data-ctlid="'+he(r.c.id)+'">'+
        '<div class="ctrl-id" style="color:'+co+'">'+hlT(r.c.id)+'</div>'+
        '<div class="ctrl-body">'+
          '<div class="ctrl-nm">'+hlT(r.c.name)+'</div>'+
          '<div class="ctrl-ds" style="margin-top:2px">'+
            '<span style="font-size:10px;background:'+l+';color:'+co+';padding:1px 5px;border-radius:3px;font-weight:600;margin-right:4px">'+he(r.fw.tag)+'</span>'+
            he(r.fw.name)+' &rsaquo; '+he(r.d.name)+
          '</div>'+
        '</div>'+
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--tx3);flex-shrink:0"><polyline points="9 18 15 12 9 6"/></svg>'+
      '</div>'
    );
  }).join("");
  g("vSearch").innerHTML=(
    '<div class="sec-hd">'+results.length+' result'+(results.length!==1?"s":"")+(results.length>80?" (showing 80)":"")+'</div>'+rows
  );
}
g("vSearch").addEventListener("click",function(e){
  const cr=e.target.closest(".ctrl-row[data-ctlid]");
  if(cr) openDetail(cr.dataset.fwid,cr.dataset.domid,cr.dataset.ctlid);
});

// ── DETAIL PANEL ──────────────────────────────────────────────────────────────
function openDetail(fwId,domId,ctlId){
  const fw=DATA.find(f=>f.id===fwId);if(!fw)return;
  const d=fw.domains.find(d=>d.id===domId);if(!d)return;
  const c=d.controls.find(c=>c.id===ctlId);if(!c)return;
  S.detMode="ctrl";S.detCtrl={c,d,fw};
  renderDetail();
  g("vDetail").classList.add("open");
}

function renderDetail(){
  if(!S.detMode)return;
  if(S.detMode==="bk"){renderBkDetail();return;}
  const{c,d,fw}=S.detCtrl,co=col(fw.id),l=co+"18";
  const isBk=!!S.bk[c.id],bkCls=isBk?"ctrl-bk on":"ctrl-bk",bkFill=isBk?"currentColor":"none";
  const maps=MAPS[c.id]||[];

  g("det-hdr").innerHTML=(
    '<div style="flex:1;min-width:0">'+
      '<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">'+
        '<span style="font-family:var(--mn);font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;background:'+l+';color:'+co+'">'+he(c.id)+'</span>'+
        '<span style="font-size:11px;color:var(--tx3)">'+he(fw.name)+'</span>'+
      '</div>'+
      '<div style="font-size:15px;font-weight:700;line-height:1.3">'+he(c.name)+'</div>'+
    '</div>'+
    '<div style="display:flex;gap:6px;margin-left:8px;flex-shrink:0">'+
      '<button class="'+bkCls+'" style="width:32px;height:32px" id="det-bk">'+
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="'+bkFill+'" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>'+
      '</button>'+
      '<button class="det-close" id="det-cl">'+
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'+
      '</button>'+
    '</div>'
  );
  g("det-cl").addEventListener("click",closeDetail);
  g("det-bk").addEventListener("click",function(){toggleBk(fw.id,d.id,c.id);});

  // Group mappings by framework
  const mapsByFw={};
  maps.forEach(function(mid){
    const e=IDX[mid];
    const key=e?e.fw.id:"__unk__";
    if(!mapsByFw[key]) mapsByFw[key]={fwTag:e?e.fw.tag:"?",col:e?col(e.fw.id):"#888",items:[]};
    mapsByFw[key].items.push(mid);
  });
  const eqPairs=[["iso27001","nist80053"],["iso27001","soc2"],["gdpr","hipaa"],
    ["nist","nist80053"],["nis2","iso27001"],["dora","iso22301"],
    ["pci","iso27001"],["cobit","iso27001"],["iso42001","iso27001"],
    ["euaiact","iso42001"],["euaiact","gdpr"]];
  function relType(mid){
    const e=IDX[mid];if(!e)return"Related";
    const isEq=eqPairs.some(p=>(p[0]===fw.id&&p[1]===e.fw.id)||(p[1]===fw.id&&p[0]===e.fw.id));
    return isEq?"Equivalent":"Related";
  }
  const mapGroups=Object.values(mapsByFw).map(function(grp){
    const rows=grp.items.map(function(mid){
      const e=IDX[mid],rel=relType(mid);
      const relCls=rel==="Equivalent"?"mg-rel rel-eq":"mg-rel rel-rel";
      if(!e) return'<div class="mg-row"><span class="mg-arr">&rarr;</span><span class="mg-cnm" style="font-style:italic;color:var(--tx3)">'+he(mid)+'</span></div>';
      return'<div class="mg-row" data-goto="'+he(mid)+'"><span class="mg-arr">&rarr;</span><span class="mg-cnm">'+he(e.c.name)+'</span><span class="'+relCls+'">'+rel+'</span></div>';
    }).join("");
    return'<div class="mg-group"><div class="mg-fw-badge" style="background:'+grp.col+'">'+he(grp.fwTag)+'</div>'+rows+'</div>';
  }).join("");

  g("det-body").innerHTML=(
    '<div class="det-sec"><div class="det-lbl">Control Statement</div><p class="det-txt">'+he(c.desc)+'</p></div>'+
    '<div class="det-sec" style="margin-top:12px"><div class="det-lbl">Domain</div>'+
      '<p class="det-txt"><strong>'+he(d.id)+'</strong> &mdash; '+he(d.name)+'</p></div>'+
    '<div class="det-sec" style="margin-top:12px"><div class="det-lbl">Related Controls in Other Frameworks ('+maps.length+')</div>'+
      (maps.length?mapGroups:'<p class="mu">No mapped controls</p>')+
    '</div>'
  );
  g("det-body").addEventListener("click",function(e){
    const row=e.target.closest(".mg-row[data-goto]");
    if(row) goCtrlDetail(row.dataset.goto);
  });
}

function renderBkDetail(){
  const bks=Object.values(S.bk);
  g("det-hdr").innerHTML=(
    '<div style="flex:1"><div style="font-size:15px;font-weight:700">Bookmarks</div>'+
    '<div style="font-size:11px;color:var(--tx3);margin-top:2px">'+bks.length+' saved</div></div>'+
    '<button class="det-close" id="det-cl2">'+
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'+
    '</button>'
  );
  g("det-cl2").addEventListener("click",closeDetail);
  g("det-body").innerHTML=bks.length
    ?('<div class="det-sec">'+bks.map(function(b){
        return'<div class="bk-item" data-goto="'+he(b.ctrlId)+'">'+
          '<div class="bk-id" style="color:'+col(b.fwId)+'">'+he(b.ctrlId)+'</div>'+
          '<div class="bk-nm">'+he(b.name)+'</div>'+
          '<div class="bk-fw">'+he(b.fwName)+' &bull; '+he(b.domName)+'</div></div>';
      }).join("")+'</div>'+
      '<div class="det-sec"><button style="font-size:12px;color:var(--tx3);text-decoration:underline;background:none;border:none;cursor:pointer" id="clr-bk">Clear all</button></div>')
    :'<div class="det-sec"><p class="mu">No bookmarks yet.</p></div>';
  if(bks.length){
    g("clr-bk").addEventListener("click",function(){S.bk={};saveBk();updateBkBadge();renderBkDetail();renderBkView();toast("Cleared");});
    g("det-body").addEventListener("click",function(e){
      const bi=e.target.closest(".bk-item[data-goto]");
      if(bi){closeDetail();goCtrlDetail(bi.dataset.goto);}
    });
  }
}

function closeDetail(){
  g("vDetail").classList.remove("open");
  S.detMode=null;S.detCtrl=null;
}

function goCtrlDetail(ctrlId){
  const e=IDX[ctrlId];
  if(!e){toast("Not in current dataset");return;}
  closeDetail();
  S.fw=e.fw;S.dom=e.d;
  showView("vCtrls","forward");
  renderCtrls();
  setTimeout(function(){openDetail(e.fw.id,e.d.id,e.c.id);},80);
  toast("Jumped to "+ctrlId);
}

// ── BOOKMARKS VIEW ────────────────────────────────────────────────────────────
function renderBkView(){
  const bks=Object.values(S.bk);
  if(!bks.length){
    g("vBk").innerHTML='<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><h2>No Bookmarks</h2><p>Tap the bookmark icon on any<br>control to save it here.</p></div>';
    return;
  }
  const items=bks.map(function(b){
    return'<div class="bk-item" data-goto="'+he(b.ctrlId)+'">'+
      '<div class="bk-id" style="color:'+col(b.fwId)+'">'+he(b.ctrlId)+'</div>'+
      '<div class="bk-nm">'+he(b.name)+'</div>'+
      '<div class="bk-fw">'+he(b.fwName)+' &bull; '+he(b.domName)+'</div></div>';
  }).join("");
  g("vBk").innerHTML='<div class="sec-hd">'+bks.length+' saved control'+(bks.length!==1?"s":"")+'</div><div class="bk-list">'+items+'</div>';
  g("vBk").addEventListener("click",function(e){
    const bi=e.target.closest(".bk-item[data-goto]");
    if(bi) goCtrlDetail(bi.dataset.goto);
  });
}

function updateBkBadge(){
  const n=bkCount(),badge=g("bk-badge");
  if(badge){badge.style.display=n>0?"block":"none";badge.textContent=n>9?"9+":n;}
}

function toggleBk(fwId,domId,ctlId){
  if(S.bk[ctlId]){delete S.bk[ctlId];toast("Removed");}
  else{
    const fw=DATA.find(f=>f.id===fwId),d=fw.domains.find(d=>d.id===domId),c=d.controls.find(c=>c.id===ctlId);
    S.bk[ctlId]={ctrlId:ctlId,name:c.name,fwId,fwName:fw.name,domId,domName:d.name};
    toast("Bookmarked");
  }
  saveBk();updateBkBadge();
  if(S.detMode==="ctrl"&&S.detCtrl&&S.detCtrl.c.id===ctlId) renderDetail();
  if(S.view==="ctrls") renderCtrls();
  if(S.view==="bk") renderBkView();
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
g("sb").addEventListener("input",function(e){
  S.q=e.target.value.toLowerCase().trim();
  g("s-clear").style.display=S.q?"block":"none";
  if(S.view==="home") renderHome();
  else if(S.view==="doms") renderDoms();
  else if(S.view==="ctrls") renderCtrls();
  else{showView("vSearch");renderSearch();}
});
g("s-clear").addEventListener("click",function(){
  g("sb").value="";S.q="";g("s-clear").style.display="none";
  if(S.view==="search"){showView("vHome","back");renderHome();}
  else if(S.view==="doms") renderDoms();
  else if(S.view==="ctrls") renderCtrls();
  else renderHome();
});

// ── CATEGORY PILLS ────────────────────────────────────────────────────────────
g("cats").addEventListener("click",function(e){
  const p=e.target.closest(".pill");if(!p)return;
  S.cat=p.dataset.cat;
  document.querySelectorAll(".pill").forEach(x=>x.classList.toggle("on",x===p));
  if(S.view==="home") renderHome();
  else if(S.view==="search") renderSearch();
  else{S.fw=null;S.dom=null;showView("vHome","back");renderHome();}
});

// ── BOTTOM NAV ────────────────────────────────────────────────────────────────
g("nb-home").addEventListener("click",function(){
  if(S.view==="ctrls"){showView("vDoms","back");renderBreadcrumb();return;}
  if(S.view==="doms"){navHome();return;}
  showView("vHome","back");renderHome();renderBreadcrumb();
});
g("nb-search").addEventListener("click",function(){showView("vSearch");renderSearch();g("sb").focus();});
g("nb-bk").addEventListener("click",function(){showView("vBk");renderBkView();});

// ── DARK MODE ─────────────────────────────────────────────────────────────────
g("dmb").addEventListener("click",function(){
  S.dark=!S.dark;
  if(S.dark) document.documentElement.setAttribute("data-dark","");
  else document.documentElement.removeAttribute("data-dark");
  try{localStorage.setItem("grc_dark",S.dark?"1":"0");}catch(e){}
});

// ── SWIPE TO CLOSE DETAIL ─────────────────────────────────────────────────────
(function(){
  let sy=0;
  g("vDetail").addEventListener("touchstart",function(e){sy=e.touches[0].clientY;},{passive:true});
  g("vDetail").addEventListener("touchend",function(e){if(e.changedTouches[0].clientY-sy>80) closeDetail();},{passive:true});
})();

// ── SWIPE BACK (right swipe on views) ────────────────────────────────────────
(function(){
  let sx=0,sy=0;
  document.getElementById("views").addEventListener("touchstart",function(e){
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;
  },{passive:true});
  document.getElementById("views").addEventListener("touchend",function(e){
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(dx>70&&Math.abs(dy)<50){
      if(S.view==="ctrls"){showView("vDoms","back");renderBreadcrumb();}
      else if(S.view==="doms"){navHome();}
    }
  },{passive:true});
})();

// ── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener("keydown",function(e){
  if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();g("sb").focus();}
  if(e.key==="Escape"){
    if(S.detMode){closeDetail();return;}
    if(S.view==="ctrls"){showView("vDoms","back");renderBreadcrumb();return;}
    if(S.view==="doms"){navHome();return;}
    if(S.q){g("sb").value="";S.q="";renderHome();}
  }
});

// ── INSTALL PWA ───────────────────────────────────────────────────────────────
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();deferredPrompt=e;
  if(!localStorage.getItem("grc_install_dismissed")){
    const b=g("install-banner");if(b) b.classList.add("show");
  }
});
function installApp(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(r=>{
    if(r.outcome==="accepted") g("install-banner").classList.remove("show");
    deferredPrompt=null;
  });
}
function dismissInstall(){
  g("install-banner").classList.remove("show");
  localStorage.setItem("grc_install_dismissed","1");
}

// ── DRAG & DROP TO REORDER FRAMEWORKS ──────────────────────────────────────
let dragSrc=null,touchDragEl=null,touchClone=null,touchStartY=0;

function initDrag(){
  const list=g("vHome");
  const cards=list.querySelectorAll(".fw-card[data-fwid]");

  cards.forEach(function(card){
    // ── HTML5 drag (desktop) ──
    card.addEventListener("dragstart",function(e){
      if(!S.editOrder) return e.preventDefault();
      dragSrc=card;
      e.dataTransfer.effectAllowed="move";
      e.dataTransfer.setData("text/plain",card.dataset.fwid);
      setTimeout(()=>card.classList.add("dragging"),0);
    });
    card.addEventListener("dragend",function(){
      card.classList.remove("dragging");
      list.querySelectorAll(".fw-card").forEach(c=>c.classList.remove("drop-above","drop-below"));
      dragSrc=null;
    });
    card.addEventListener("dragover",function(e){
      if(!S.editOrder||!dragSrc||dragSrc===card) return;
      e.preventDefault();
      e.dataTransfer.dropEffect="move";
      list.querySelectorAll(".fw-card").forEach(c=>c.classList.remove("drop-above","drop-below"));
      const rect=card.getBoundingClientRect();
      const mid=rect.top+rect.height/2;
      card.classList.add(e.clientY<mid?"drop-above":"drop-below");
    });
    card.addEventListener("dragleave",function(){
      card.classList.remove("drop-above","drop-below");
    });
    card.addEventListener("drop",function(e){
      if(!S.editOrder||!dragSrc||dragSrc===card) return;
      e.preventDefault();
      card.classList.remove("drop-above","drop-below");
      const rect=card.getBoundingClientRect();
      const mid=rect.top+rect.height/2;
      const insertBefore=e.clientY<mid;
      // Reorder DATA array
      const srcId=dragSrc.dataset.fwid;
      const tgtId=card.dataset.fwid;
      const srcIdx=DATA.findIndex(f=>f.id===srcId);
      const tgtIdx=DATA.findIndex(f=>f.id===tgtId);
      const [moved]=DATA.splice(srcIdx,1);
      const newTgt=DATA.findIndex(f=>f.id===tgtId);
      DATA.splice(insertBefore?newTgt:newTgt+1,0,moved);
      saveOrder();
      renderHome();
    });

    // ── Touch drag (mobile) ──
    const handle=card.querySelector(".drag-handle");
    if(handle){
      handle.addEventListener("touchstart",function(e){
        if(!S.editOrder) return;
        e.preventDefault();
        touchDragEl=card;
        touchStartY=e.touches[0].clientY;
        // Create floating clone
        const rect=card.getBoundingClientRect();
        touchClone=card.cloneNode(true);
        touchClone.style.cssText="position:fixed;left:"+rect.left+"px;top:"+rect.top+"px;width:"+rect.width+"px;z-index:999;opacity:.92;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.18);border-radius:10px;background:var(--surf);";
        document.body.appendChild(touchClone);
        card.style.opacity="0.35";
      },{passive:false});
    }
  });

  // Global touch move + end
  if(!list._touchBound){
    list._touchBound=true;
    document.addEventListener("touchmove",function(e){
      if(!touchDragEl||!touchClone) return;
      e.preventDefault();
      const ty=e.touches[0].clientY;
      const rect=touchDragEl.getBoundingClientRect();
      touchClone.style.top=(rect.top+(ty-touchStartY))+"px";
      // Find card under touch
      touchClone.style.display="none";
      const el=document.elementFromPoint(e.touches[0].clientX,ty);
      touchClone.style.display="";
      const overCard=el?el.closest(".fw-card[data-fwid]"):null;
      list.querySelectorAll(".fw-card").forEach(c=>c.classList.remove("drop-above","drop-below"));
      if(overCard&&overCard!==touchDragEl){
        const orect=overCard.getBoundingClientRect();
        overCard.classList.add(ty<orect.top+orect.height/2?"drop-above":"drop-below");
      }
    },{passive:false});

    document.addEventListener("touchend",function(e){
      if(!touchDragEl||!touchClone) return;
      // Clean up clone
      touchClone.remove();touchClone=null;
      touchDragEl.style.opacity="";
      list.querySelectorAll(".fw-card").forEach(c=>c.classList.remove("drop-above","drop-below"));
      // Find drop target
      const ty=e.changedTouches[0].clientY;
      const el=document.elementFromPoint(e.changedTouches[0].clientX,ty);
      const overCard=el?el.closest(".fw-card[data-fwid]"):null;
      if(overCard&&overCard!==touchDragEl){
        const orect=overCard.getBoundingClientRect();
        const insertBefore=ty<orect.top+orect.height/2;
        const srcId=touchDragEl.dataset.fwid;
        const tgtId=overCard.dataset.fwid;
        const srcIdx=DATA.findIndex(f=>f.id===srcId);
        const [moved]=DATA.splice(srcIdx,1);
        const newTgt=DATA.findIndex(f=>f.id===tgtId);
        DATA.splice(insertBefore?newTgt:newTgt+1,0,moved);
        saveOrder();
        renderHome();
      }
      touchDragEl=null;
    },{passive:true});
  }
}

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
updateBkBadge();
showView("vHome");
renderHome();
