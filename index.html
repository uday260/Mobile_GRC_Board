<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GRC Ref">
<meta name="theme-color" content="#6366f1">
<meta name="description" content="Offline GRC compliance framework reference - 16 frameworks">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>GRC Reference Dashboard</title>
<style>
:root{
  --bg:#f0f2f5;--surf:#fff;--surf2:#f4f5f8;--surf3:#eceef2;
  --tx:#1a1a2e;--tx2:#4b5563;--tx3:#9ca3af;
  --bd:#e5e7eb;--bd2:#d1d5db;
  --ac:#6366f1;--acl:#eef0ff;
  --fn:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  --mn:"SF Mono","Fira Code",monospace;
  --nav-h:56px;--hdr-h:52px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
[data-dark]{
  --bg:#0d0f18;--surf:#151823;--surf2:#1d2030;--surf3:#252838;
  --tx:#e2e4ee;--tx2:#8b93a8;--tx3:#555e75;
  --bd:#252838;--bd2:#2f3449;
  --ac:#818cf8;--acl:#1a1c30;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);height:100%;
  display:flex;flex-direction:column;overflow:hidden;
  padding-top:env(safe-area-inset-top,0px)}
button,input{font-family:var(--fn);border:none;background:none;color:inherit}
button{cursor:pointer}

/* HEADER */
#hdr{height:var(--hdr-h);min-height:var(--hdr-h);background:var(--surf);
  border-bottom:1px solid var(--bd);display:flex;align-items:center;
  gap:10px;padding:0 14px;flex-shrink:0;z-index:10}
.brand{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.bico{width:32px;height:32px;background:var(--acl);border-radius:8px;
  display:flex;align-items:center;justify-content:center;color:var(--ac);flex-shrink:0}
.bnm{font-size:15px;font-weight:700;letter-spacing:-.01em}
.bsub{font-size:10px;color:var(--tx3)}
.hbtn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;color:var(--tx2);background:var(--surf2);
  border:1px solid var(--bd);flex-shrink:0}
.hbtn.lit{background:var(--acl);color:var(--ac);border-color:var(--ac)}

/* BREADCRUMB BAR */
#bcbar{
  display:none;background:var(--surf);border-bottom:1px solid var(--bd);
  padding:0 14px;height:40px;min-height:40px;align-items:center;
  overflow-x:auto;white-space:nowrap;flex-shrink:0;gap:0;
}
#bcbar::-webkit-scrollbar{display:none}
#bcbar.show{display:flex}
.bc-seg{display:inline-flex;align-items:center;gap:0;flex-shrink:0}
.bc-btn{font-size:12px;font-weight:500;color:var(--ac);padding:4px 2px;
  border:none;background:none;flex-shrink:0;max-width:120px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bc-btn.cur{color:var(--tx);font-weight:600;cursor:default}
.bc-sep{font-size:12px;color:var(--tx3);padding:0 5px;flex-shrink:0}
.bc-folder-icon{width:14px;height:14px;flex-shrink:0;margin-right:4px;
  vertical-align:middle;position:relative;top:-1px}

/* SEARCH */
#sbar{padding:8px 14px;background:var(--surf);border-bottom:1px solid var(--bd);flex-shrink:0}
.si-wrap{position:relative}
#sb{width:100%;height:36px;padding:0 32px 0 34px;border:1px solid var(--bd2);
  border-radius:10px;background:var(--surf2);color:var(--tx);font-size:14px;outline:none}
#sb:focus{border-color:var(--ac)}
#sb::placeholder{color:var(--tx3)}
.s-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);
  pointer-events:none;color:var(--tx3)}
#s-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  color:var(--tx3);display:none;padding:4px;font-size:14px}

/* CATEGORY PILLS */
#cats{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;
  background:var(--surf);border-bottom:1px solid var(--bd);flex-shrink:0}
#cats::-webkit-scrollbar{display:none}
.pill{height:28px;padding:0 12px;border-radius:20px;font-size:12px;font-weight:500;
  color:var(--tx2);background:var(--surf2);border:1px solid var(--bd);
  white-space:nowrap;transition:all .12s;flex-shrink:0}
.pill.on{background:var(--ac);color:#fff;border-color:var(--ac)}

/* VIEWS */
#views{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}
.view{position:absolute;inset:0;overflow-y:auto;display:none;flex-direction:column;
  padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px)}
.view.active{display:flex}
.view::-webkit-scrollbar{width:3px}
.view::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* FRAMEWORK LIST (Home) */
.sec-hd{padding:10px 14px 6px;font-size:10px;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;color:var(--tx3)}
.fw-card{display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--surf);border-bottom:1px solid var(--bd);transition:background .1s,transform .15s,box-shadow .15s;
  position:relative;user-select:none}
.fw-card:active:not(.edit-mode .fw-card){background:var(--surf2)}
.fw-card.dragging{opacity:.5;background:var(--surf2);transform:scale(0.98)}
.fw-card.drag-over{border-top:2px solid var(--ac);margin-top:-1px}
.drag-handle{width:32px;height:32px;display:none;align-items:center;justify-content:center;
  color:var(--tx3);flex-shrink:0;cursor:grab;touch-action:none;border-radius:6px;
  margin-left:-4px}
.drag-handle:active{cursor:grabbing}
.drag-handle svg{pointer-events:none}
body.edit-order .drag-handle{display:flex}
body.edit-order .fw-card{cursor:default}
body.edit-order .fw-card:active{background:var(--surf)}
.edit-order-btn{font-size:12px;font-weight:600;color:var(--ac);padding:5px 10px;
  border-radius:8px;background:var(--acl);border:none;cursor:pointer;flex-shrink:0;white-space:nowrap}
.edit-order-btn.done{background:var(--ac);color:#fff}
.fw-card.drop-above{box-shadow:inset 0 2px 0 var(--ac)}
.fw-card.drop-below{box-shadow:inset 0 -2px 0 var(--ac)}
.fw-ico{width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fw-info{flex:1;min-width:0}
.fw-nm{font-size:14px;font-weight:600}
.fw-meta{font-size:11px;color:var(--tx3);margin-top:2px}
.fw-ct{font-size:11px;font-weight:600;padding:2px 8px;border-radius:9px;
  background:var(--surf2);color:var(--tx3);flex-shrink:0}
.fw-arr{color:var(--tx3);flex-shrink:0}

/* DOMAIN FOLDER LIST */
.dom-folder{display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--surf);border-bottom:1px solid var(--bd);transition:background .1s}
.dom-folder:active{background:var(--surf2)}
.dom-fol-ico{width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dom-fol-info{flex:1;min-width:0}
.dom-fol-nm{font-size:14px;font-weight:600}
.dom-fol-id{font-family:var(--mn);font-size:10px;font-weight:600;
  display:inline-block;margin-bottom:3px;padding:1px 6px;border-radius:4px}
.dom-fol-desc{font-size:11px;color:var(--tx2);margin-top:2px;line-height:1.4;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.dom-fol-ct{font-size:11px;font-weight:600;padding:2px 8px;border-radius:9px;
  background:var(--surf2);color:var(--tx3);flex-shrink:0}
.dom-fol-arr{color:var(--tx3);flex-shrink:0}

/* FW HERO (shown at top of domain list) */
.fw-hero-strip{
  padding:12px 14px;background:var(--surf);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:10px;
}
.fhs-ico{width:36px;height:36px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fhs-nm{font-size:14px;font-weight:700}
.fhs-meta{font-size:11px;color:var(--tx3);margin-top:1px}
.fhs-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.fhs-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;letter-spacing:.04em}
.fhs-st{font-size:10px;color:var(--tx3);padding:2px 6px;background:var(--surf2);border-radius:4px}

/* CONTROL LIST */
.ctrl-row{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;
  border-bottom:1px solid var(--bd);transition:background .08s}
.ctrl-row:active{background:var(--surf2)}
.ctrl-row.bkd{background:linear-gradient(90deg,rgba(251,191,36,.07),transparent)}
.ctrl-id{font-family:var(--mn);font-size:10px;font-weight:700;
  min-width:68px;flex-shrink:0;padding-top:1px;line-height:1.4}
.ctrl-body{flex:1;min-width:0}
.ctrl-nm{font-size:13px;font-weight:600;line-height:1.35}
.ctrl-ds{font-size:11px;color:var(--tx2);margin-top:3px;line-height:1.55}
.ctrl-maps{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.mt{display:inline-flex;flex-direction:column;align-items:center;
  font-size:10px;padding:2px 5px;border-radius:4px;font-family:var(--mn);
  font-weight:600;border:1px solid;flex-shrink:0;background:none;gap:1px}
.mt-fw{font-size:8px;opacity:.75;font-family:var(--fn);font-weight:600}
.ctrl-bk{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;color:var(--tx3);background:var(--surf3);flex-shrink:0}
.ctrl-bk.on{color:#f59e0b;background:rgba(245,158,11,.12)}

/* DOMAIN HEADER in vCtrls */
.dom-hdr-strip{
  padding:12px 14px;background:var(--surf);border-bottom:2px solid;
  display:flex;align-items:flex-start;gap:10px;flex-shrink:0;
  position:sticky;top:0;z-index:5;
}
.dhs-ico{width:36px;height:36px;border-radius:9px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0}
.dhs-id{font-family:var(--mn);font-size:10px;font-weight:700;
  padding:2px 6px;border-radius:4px;display:inline-block;margin-bottom:4px}
.dhs-nm{font-size:14px;font-weight:700;line-height:1.3}
.dhs-desc{font-size:11px;color:var(--tx2);margin-top:3px;line-height:1.4}
.ctrl-count-bar{padding:8px 14px;background:var(--surf2);border-bottom:1px solid var(--bd);
  font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
  color:var(--tx3);flex-shrink:0}

/* DETAIL PANEL */
#vDetail{position:fixed;inset:0;z-index:50;background:var(--surf);
  transform:translateY(100%);transition:transform .25s ease;
  display:flex;flex-direction:column;padding-top:env(safe-area-inset-top,0px)}
#vDetail.open{transform:translateY(0)}
#det-hdr{padding:14px 14px 10px;border-bottom:1px solid var(--bd);
  flex-shrink:0;display:flex;align-items:flex-start;gap:10px;background:var(--surf)}
#det-body{flex:1;overflow-y:auto;padding:0 0 calc(var(--safe-b) + 80px)}
#det-body::-webkit-scrollbar{width:3px}
#det-body::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.det-sec{padding:14px 14px 0}
.det-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.det-txt{font-size:13px;color:var(--tx2);line-height:1.65}
.det-close{width:32px;height:32px;border-radius:8px;display:flex;
  align-items:center;justify-content:center;color:var(--tx3);
  background:var(--surf2);border:1px solid var(--bd)}

/* MAPPING GROUPS */
.mg-group{margin-bottom:14px;padding:0 14px}
.mg-fw-badge{display:inline-flex;align-items:center;padding:3px 10px;
  border-radius:20px;font-size:11px;font-weight:700;color:#fff;
  letter-spacing:.03em;margin-bottom:7px}
.mg-row{display:flex;align-items:center;gap:8px;padding:10px 12px;
  border-radius:8px;background:var(--surf2);border:1px solid var(--bd);
  margin-bottom:6px;transition:background .1s}
.mg-row:active{background:var(--surf3)}
.mg-arr{color:var(--ac);font-size:14px;flex-shrink:0}
.mg-cnm{font-size:12px;color:var(--tx);flex:1;min-width:0;line-height:1.35}
.mg-rel{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;flex-shrink:0}
.rel-eq{background:#dcfce7;color:#166534}
[data-dark] .rel-eq{background:#14532d;color:#86efac}
.rel-rel{background:#eff6ff;color:#1d4ed8}
[data-dark] .rel-rel{background:#1e3a5f;color:#93c5fd}

/* BOOKMARKS */
.bk-item{padding:10px 12px;background:var(--surf2);border-radius:8px;
  border-left:3px solid #f59e0b;border-top:1px solid var(--bd);
  border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);
  margin-bottom:6px;transition:background .1s}
.bk-item:active{background:var(--surf3)}
.bk-id{font-family:var(--mn);font-size:10px;font-weight:700;color:var(--tx3)}
.bk-nm{font-size:13px;font-weight:600;color:var(--tx);margin-top:2px}
.bk-fw{font-size:11px;color:var(--tx3);margin-top:2px}
.mu{font-size:13px;color:var(--tx3);font-style:italic;padding:0 14px}
.bk-list{padding:12px 14px}

/* BOTTOM NAV */
#nav{height:calc(var(--nav-h) + var(--safe-b));min-height:calc(var(--nav-h) + var(--safe-b));
  background:var(--surf);border-top:1px solid var(--bd);display:flex;
  align-items:flex-start;padding-top:4px;flex-shrink:0;z-index:10}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px 0;color:var(--tx3);font-size:10px;font-weight:500;transition:color .12s}
.nav-btn.on{color:var(--ac)}
.nav-icon-wrap{position:relative}
.nav-badge{position:absolute;top:-2px;right:-4px;background:#ef4444;color:#fff;
  font-size:9px;font-weight:700;padding:1px 4px;border-radius:8px;
  min-width:14px;text-align:center;display:none}

/* EMPTY / TOAST */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:3rem 2rem;text-align:center;color:var(--tx3);flex:1}
.empty svg{opacity:.25}
.empty h2{font-size:15px;font-weight:600;color:var(--tx2)}
.empty p{font-size:13px;line-height:1.5}
#toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 12px);
  left:50%;transform:translateX(-50%) translateY(40px);background:#1e2030;
  color:#e2e4ee;padding:8px 16px;border-radius:10px;font-size:13px;
  transition:transform .2s;z-index:99;pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.2)}
[data-dark] #toast{background:var(--surf3)}
#toast.show{transform:translateX(-50%)}
#install-banner{margin:10px 14px;padding:12px 14px;background:var(--acl);
  border-radius:12px;border:1px solid var(--ac);display:none;align-items:center;gap:10px}
#install-banner.show{display:flex}
.ib-txt{flex:1;font-size:12px;color:var(--tx2);line-height:1.4}
.ib-txt strong{color:var(--tx);font-size:13px;display:block;margin-bottom:2px}
.ib-btn{font-size:12px;font-weight:600;color:#fff;background:var(--ac);
  padding:6px 12px;border-radius:8px;white-space:nowrap}
.ib-close{color:var(--tx3);padding:4px;font-size:16px;line-height:1}
mark{background:#fef08a;border-radius:2px;padding:0 1px;color:inherit}
[data-dark] mark{background:#713f12;color:#fef3c7}

/* SLIDE ANIMATIONS */
.view.slide-in{animation:slideIn .22s ease forwards}
.view.slide-back{animation:slideBack .22s ease forwards}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slideBack{from{transform:translateX(-30%)}to{transform:translateX(0)}}
</style>
</head>
<body>
<div id="hdr">
  <div class="brand">
    <div class="bico">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <div>
      <div class="bnm">GRC Dashboard</div>
      <div class="bsub">16 frameworks &bull; 547 controls &bull; Offline</div>
    </div>
  </div>
  <button class="hbtn" id="dmb" title="Dark mode">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</div>

<!-- BREADCRUMB -->
<div id="bcbar"></div>

<!-- SEARCH -->
<div id="sbar">
  <div class="si-wrap">
    <svg class="s-ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="sb" placeholder="Search frameworks, controls, IDs…" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button id="s-clear" class="s-clear">&#10005;</button>
  </div>
</div>

<!-- CATEGORY PILLS -->
<div id="cats">
  <button class="pill on" data-cat="All">All</button>
  <button class="pill" data-cat="Security">Security</button>
  <button class="pill" data-cat="Privacy">Privacy</button>
  <button class="pill" data-cat="Risk">Risk</button>
  <button class="pill" data-cat="AI">AI</button>
</div>

<!-- VIEWS -->
<div id="views">
  <div class="view active" id="vHome"></div>
  <div class="view" id="vDoms"></div>
  <div class="view" id="vCtrls"></div>
  <div class="view" id="vSearch"></div>
  <div class="view" id="vBk"></div>
</div>

<!-- DETAIL PANEL -->
<div id="vDetail">
  <div id="det-hdr"></div>
  <div id="det-body"></div>
</div>

<!-- BOTTOM NAV -->
<div id="nav">
  <button class="nav-btn on" id="nb-home">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Frameworks
  </button>
  <button class="nav-btn" id="nb-search">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Search
  </button>
  <button class="nav-btn" id="nb-bk">
    <div class="nav-icon-wrap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span class="nav-badge" id="bk-badge">0</span>
    </div>
    Bookmarks
  </button>
</div>

<div id="toast"></div>

<script>
const DATA=[{"id": "iso27001", "name": "ISO 27001", "version": "2022", "desc": "Information security, cybersecurity and privacy protection \u2014 Information security management systems \u2014 Requirements.", "tag": "ISO/IEC", "domains": [{"id": "5", "name": "Organizational Controls", "desc": "Controls relating to information security policies, roles, asset management, supplier relationships and incident management.", "controls": [{"id": "5.1", "name": "Policies for information security", "desc": "Organizations must establish, document, and maintain information security policies that are approved by management, communicated to all relevant staff and stakeholders, and periodically reviewed whenever significant changes occur."}, {"id": "5.2", "name": "Information security roles and responsibilities", "desc": "Responsibilities for information security must be clearly defined, assigned to appropriate individuals, and communicated throughout the organization based on its operational needs."}, {"id": "5.3", "name": "Segregation of duties", "desc": "Duties and areas of responsibility that could conflict with each other must be separated to reduce the risk of unauthorized or unintentional modification of organizational assets."}, {"id": "5.4", "name": "Management responsibilities", "desc": "Management must actively require and support all staff in applying information security in line with established policies, topic-specific policies, and organizational procedures."}, {"id": "5.5", "name": "Contact with authorities", "desc": "Organizations must identify and maintain ongoing contact with relevant regulatory bodies, law enforcement, and other authorities relevant to their information security obligations."}, {"id": "5.6", "name": "Contact with special interest groups", "desc": "Organizations must establish and maintain relationships with specialist security communities, industry groups, and professional associations to stay current with threat intelligence and best practices."}, {"id": "5.7", "name": "Threat intelligence", "desc": "Organizations must collect, analyze, and act on information about current and emerging information security threats to produce actionable threat intelligence."}, {"id": "5.8", "name": "Information security in project management", "desc": "Information security requirements and considerations must be embedded into all project management activities regardless of project type or size."}, {"id": "5.9", "name": "Inventory of information and other associated assets", "desc": "A comprehensive inventory of information assets and other associated assets must be created, owned, and kept up to date throughout the organization."}, {"id": "5.10", "name": "Acceptable use of information and other associated assets", "desc": "Clear rules and documented procedures must be established for the acceptable use and handling of information and associated assets by all users."}, {"id": "5.11", "name": "Return of assets", "desc": "Upon termination or change of employment or contract, all personnel and relevant third parties must return any organizational assets they hold."}, {"id": "5.12", "name": "Classification of information", "desc": "Information must be classified based on its sensitivity and the organization's security requirements, considering confidentiality, integrity, availability, and stakeholder needs."}, {"id": "5.13", "name": "Labelling of information", "desc": "Procedures for labeling information must be developed and applied consistently in accordance with the organization's classification scheme."}, {"id": "5.14", "name": "Information transfer", "desc": "Rules, procedures, or formal agreements governing the transfer of information must be in place for all transfer methods used within and outside the organization."}, {"id": "5.15", "name": "Access control", "desc": "Physical and logical access to information and associated assets must be controlled through rules that are implemented based on both business and security requirements."}, {"id": "5.16", "name": "Identity management", "desc": "The complete lifecycle of all digital identities \u2014 creation, maintenance, and deactivation \u2014 must be managed in a controlled manner."}, {"id": "5.17", "name": "Authentication information", "desc": "The provisioning and management of authentication credentials must follow a formal process, including guidance to personnel on proper handling."}, {"id": "5.18", "name": "Access rights", "desc": "Access rights must be granted, reviewed, adjusted, and revoked in line with the organization's access control policies and rules."}, {"id": "5.19", "name": "Information security in supplier relationships", "desc": "Processes and procedures must be defined and implemented to identify and manage information security risks arising from the use of supplier products or services."}, {"id": "5.20", "name": "Addressing information security within supplier agreements", "desc": "Information security requirements must be formally agreed upon with each supplier, tailored to the nature of the supplier relationship."}, {"id": "5.21", "name": "Managing information security in the ICT supply chain", "desc": "Processes must be defined and implemented to manage information security risks associated with ICT products and services across the supply chain."}, {"id": "5.22", "name": "Monitoring, review and change management of supplier services", "desc": "The organization must regularly monitor, review, and manage changes in supplier information security practices and service delivery performance."}, {"id": "5.23", "name": "Information security for use of cloud services", "desc": "Processes covering the acquisition, use, management, and exit from cloud services must be established in line with organizational security requirements."}, {"id": "5.24", "name": "Information security incident management planning and preparation", "desc": "The organization must plan and prepare for managing information security incidents by defining processes, roles, and responsibilities before incidents occur."}, {"id": "5.25", "name": "Assessment and decision on information security events", "desc": "Information security events must be assessed and a decision made on whether to classify them as formal incidents requiring a response."}, {"id": "5.26", "name": "Response to information security incidents", "desc": "Information security incidents must be responded to according to documented and tested procedures."}, {"id": "5.27", "name": "Learning from information security incidents", "desc": "Lessons learned from information security incidents must be systematically captured and used to strengthen and improve existing controls."}, {"id": "5.28", "name": "Collection of evidence", "desc": "Procedures must be established for identifying, collecting, preserving, and maintaining evidence related to information security events for potential legal or disciplinary use."}, {"id": "5.29", "name": "Information security during disruption", "desc": "Plans must exist to maintain information security at an appropriate level during disruptions, crises, or adverse conditions."}, {"id": "5.30", "name": "ICT readiness for business continuity", "desc": "ICT continuity requirements, including systems and services, must be planned, implemented, tested, and maintained to meet business continuity objectives."}, {"id": "5.31", "name": "Legal, statutory, regulatory and contractual requirements", "desc": "All legal, statutory, regulatory, and contractual requirements relevant to information security must be identified, documented, and kept up to date."}, {"id": "5.32", "name": "Intellectual property rights", "desc": "Appropriate procedures must be implemented to protect intellectual property rights in accordance with applicable laws and licensing agreements."}, {"id": "5.33", "name": "Protection of records", "desc": "Records must be protected against loss, unauthorized destruction, falsification, unauthorized access, and unauthorized disclosure throughout their retention period."}, {"id": "5.34", "name": "Privacy and protection of PII", "desc": "The organization must identify and comply with applicable privacy laws, regulations, and contractual requirements regarding the preservation and protection of personally identifiable information."}, {"id": "5.35", "name": "Independent review of information security", "desc": "The organization's approach to managing information security, including its people, processes, and technologies, must be reviewed independently at planned intervals or when significant changes occur."}, {"id": "5.36", "name": "Compliance with policies, rules and standards for information security", "desc": "Compliance with information security policies, topic-specific policies, and applicable standards must be regularly reviewed across the organization."}, {"id": "5.37", "name": "Documented operating procedures", "desc": "Operating procedures for information processing facilities must be formally documented and made accessible to all personnel who require them."}]}, {"id": "6", "name": "People Controls", "desc": "Controls relating to human resources security, screening, awareness, training and remote working.", "controls": [{"id": "6.1", "name": "Screening", "desc": "Background checks must be conducted on all prospective staff prior to joining, and periodically thereafter, in proportion to business risk, data sensitivity, and applicable laws."}, {"id": "6.2", "name": "Terms and conditions of employment", "desc": "Employment contracts and agreements must clearly state both the employee's and organization's responsibilities with respect to information security."}, {"id": "6.3", "name": "Information security awareness, education and training", "desc": "All staff and relevant interested parties must receive appropriate security awareness training, education, and regular updates on policies and procedures relevant to their role."}, {"id": "6.4", "name": "Disciplinary process", "desc": "A formal disciplinary process must be established and communicated to address violations of information security policies by personnel."}, {"id": "6.5", "name": "Responsibilities after termination or change of employment", "desc": "Information security responsibilities that continue after employment ends or changes must be defined, enforced, and communicated to the individuals concerned."}, {"id": "6.6", "name": "Confidentiality or non-disclosure agreements", "desc": "Confidentiality and non-disclosure agreements must be identified, documented, signed, and reviewed regularly to reflect the organization's needs for information protection."}, {"id": "6.7", "name": "Remote working", "desc": "Security measures must be implemented to protect information accessed, processed, or stored by personnel working from remote or off-premises locations."}, {"id": "6.8", "name": "Information security event reporting", "desc": "A clear mechanism must be provided to allow personnel to report suspected or actual information security events through appropriate channels in a timely manner."}]}, {"id": "7", "name": "Physical Controls", "desc": "Controls relating to physical security perimeters, entry, equipment and environmental protection.", "controls": [{"id": "7.1", "name": "Physical security perimeters", "desc": "Clearly defined physical security boundaries must be established and maintained to protect areas containing sensitive information and associated assets."}, {"id": "7.2", "name": "Physical entry", "desc": "Secure areas must be protected by appropriate physical access controls and entry points to prevent unauthorized physical access."}, {"id": "7.3", "name": "Securing offices, rooms and facilities", "desc": "Physical security for all offices, rooms, and facilities must be thoughtfully designed and consistently applied."}, {"id": "7.4", "name": "Physical security monitoring", "desc": "Facilities must be continuously monitored for unauthorized physical entry to detect and respond to intrusions promptly."}, {"id": "7.5", "name": "Protecting against physical and environmental threats", "desc": "Protection measures against physical and environmental threats \u2014 including natural disasters, accidents, and deliberate physical attacks \u2014 must be designed and implemented."}, {"id": "7.6", "name": "Working in secure areas", "desc": "Specific security procedures and measures must be designed and applied for personnel working in secure or restricted areas."}, {"id": "7.7", "name": "Clear desk and clear screen", "desc": "Clear desk policies for physical documents and removable media, and clear screen policies for computing devices, must be defined and enforced."}, {"id": "7.8", "name": "Equipment siting and protection", "desc": "Equipment must be positioned and protected to minimize risks from environmental threats and unauthorized access."}, {"id": "7.9", "name": "Security of assets off-premises", "desc": "Assets used or stored outside organizational premises must be appropriately protected against loss, theft, and damage."}, {"id": "7.10", "name": "Storage media", "desc": "Storage media must be managed throughout its entire lifecycle \u2014 from procurement through to secure disposal \u2014 in line with the organization's classification and handling requirements."}, {"id": "7.11", "name": "Supporting utilities", "desc": "Information processing facilities must be protected against power failures, outages, and other disruptions caused by failures in supporting utilities."}, {"id": "7.12", "name": "Cabling security", "desc": "Cables carrying power, data, or supporting communications must be protected from interception, interference, and physical damage."}, {"id": "7.13", "name": "Equipment maintenance", "desc": "Equipment must be maintained in accordance with manufacturer specifications and organizational requirements to ensure continued availability, integrity, and confidentiality."}, {"id": "7.14", "name": "Secure disposal or re-use of equipment", "desc": "Before equipment containing storage media is disposed of or reused, the organization must verify that sensitive data and licensed software have been securely removed or overwritten."}]}, {"id": "8", "name": "Technological Controls", "desc": "Controls relating to access, authentication, cryptography, vulnerability management, logging and secure development.", "controls": [{"id": "8.1", "name": "User end point devices", "desc": "Information stored on, processed by, or accessible via user endpoint devices must be adequately protected against loss, theft, and unauthorized access."}, {"id": "8.2", "name": "Privileged access rights", "desc": "The allocation and use of privileged access rights must be strictly controlled, reviewed regularly, and restricted to what is necessary."}, {"id": "8.3", "name": "Information access restriction", "desc": "Access to information and associated assets must be restricted in line with the organization's access control policies."}, {"id": "8.4", "name": "Access to source code", "desc": "Access to source code, development tools, and software libraries must be carefully managed and restricted to authorized personnel."}, {"id": "8.5", "name": "Secure authentication", "desc": "Secure authentication methods and procedures must be implemented based on access restrictions and the organization's access control policies."}, {"id": "8.6", "name": "Capacity management", "desc": "Resource utilization must be monitored and managed proactively to ensure current and anticipated capacity needs are met without compromising availability."}, {"id": "8.7", "name": "Protection against malware", "desc": "Protection against malicious software must be implemented and maintained, supported by appropriate user awareness and training."}, {"id": "8.8", "name": "Management of technical vulnerabilities", "desc": "Information about technical vulnerabilities in systems must be obtained, assessed for organizational exposure, and addressed through appropriate risk treatment measures."}, {"id": "8.9", "name": "Configuration management", "desc": "Security configurations for hardware, software, services, and networks must be established, documented, implemented, monitored, and regularly reviewed."}, {"id": "8.10", "name": "Information deletion", "desc": "Information stored in systems, devices, or other storage media must be securely deleted when it is no longer required for business or legal purposes."}, {"id": "8.11", "name": "Data masking", "desc": "Data masking must be applied where appropriate, in accordance with access control policies, business requirements, and applicable legislation."}, {"id": "8.12", "name": "Data leakage prevention", "desc": "Data leakage prevention controls must be applied to systems, networks, and devices that handle sensitive information to prevent unauthorized disclosure."}, {"id": "8.13", "name": "Information backup", "desc": "Backup copies of information, software, and systems must be created, maintained, and regularly tested in line with the organization's backup policy."}, {"id": "8.14", "name": "Redundancy of information processing facilities", "desc": "Information processing facilities must be implemented with sufficient redundancy to meet the organization's availability requirements."}, {"id": "8.15", "name": "Logging", "desc": "Logs recording activities, exceptions, faults, and other relevant events must be produced, stored, protected, and analyzed to support security monitoring and investigations."}, {"id": "8.16", "name": "Monitoring activities", "desc": "Networks, systems, and applications must be continuously monitored for anomalous behavior, with appropriate actions taken when potential security incidents are identified."}, {"id": "8.17", "name": "Clock synchronization", "desc": "Clocks on all information processing systems must be synchronized to approved and consistent time sources to support accurate logging and investigations."}, {"id": "8.18", "name": "Use of privileged utility programs", "desc": "The use of utility programs capable of overriding system controls must be restricted, tightly controlled, and monitored."}, {"id": "8.19", "name": "Installation of software on operational systems", "desc": "Formal procedures and technical measures must be implemented to securely manage software installation on operational systems."}, {"id": "8.20", "name": "Networks security", "desc": "Networks and network devices must be managed, secured, and controlled to protect information in systems and applications from unauthorized access."}, {"id": "8.21", "name": "Security of network services", "desc": "Security mechanisms, service levels, and requirements for all network services must be identified, implemented, and continuously monitored."}, {"id": "8.22", "name": "Segregation of networks", "desc": "Different groups of information services, users, and systems must be separated into distinct network segments to reduce risk and limit the impact of incidents."}, {"id": "8.23", "name": "Web filtering", "desc": "Access to external websites must be managed and filtered to reduce organizational exposure to malicious content."}, {"id": "8.24", "name": "Use of cryptography", "desc": "Rules for the effective use of cryptography, including the management of cryptographic keys, must be defined, documented, and implemented."}, {"id": "8.25", "name": "Secure development life cycle", "desc": "Secure development lifecycle rules and standards must be established and consistently applied to all software and system development activities."}, {"id": "8.26", "name": "Application security requirements", "desc": "Information security requirements must be identified, specified, and formally approved before applications are developed or acquired."}, {"id": "8.27", "name": "Secure system architecture and engineering principles", "desc": "Principles for engineering secure systems must be established, documented, maintained, and applied across all information system development and integration activities."}, {"id": "8.28", "name": "Secure coding", "desc": "Secure coding principles and practices must be applied consistently throughout software development processes."}, {"id": "8.29", "name": "Security testing in development and acceptance", "desc": "Security testing processes \u2014 including penetration testing and code review \u2014 must be defined and integrated into the development lifecycle."}, {"id": "8.30", "name": "Outsourced development", "desc": "Activities related to outsourced system development must be directed, monitored, and reviewed by the organization to ensure security requirements are met."}, {"id": "8.31", "name": "Separation of development, test and production environments", "desc": "Development, testing, and production environments must be separated and appropriately secured to reduce the risk of unauthorized access or changes."}, {"id": "8.32", "name": "Change management", "desc": "All changes to information processing facilities and systems must follow formal change management procedures."}, {"id": "8.33", "name": "Test information", "desc": "Test data must be appropriately selected, protected, and managed to prevent unauthorized disclosure or misuse."}, {"id": "8.34", "name": "Protection of information systems during audit testing", "desc": "Audit tests and assurance activities that involve assessment of operational systems must be planned and agreed in advance with appropriate management to minimize disruption."}]}]}, {"id": "iso42001", "name": "ISO 42001", "version": "2023", "desc": "Information technology \u2014 Artificial intelligence \u2014 Management system. Requirements for establishing, implementing, maintaining and continually improving an AI management system.", "tag": "ISO/IEC", "domains": [{"id": "A.2", "name": "Policies Related to AI", "desc": "Objective: To provide management direction and support for AI systems according to business requirements.", "controls": [{"id": "A.2.2", "name": "AI policy", "desc": "The organization must create and maintain a formal written policy for the responsible development or use of AI systems, aligned with its business objectives and risk appetite."}, {"id": "A.2.3", "name": "Alignment with other organizational policies", "desc": "The organization must identify where other existing organizational policies intersect with or are affected by its AI-related objectives, and ensure alignment across all relevant policies."}, {"id": "A.2.4", "name": "Review of the AI policy", "desc": "The AI policy must be formally reviewed at scheduled intervals, or when triggered by significant changes, to confirm it remains appropriate, adequate, and effective."}]}, {"id": "A.3", "name": "Internal Organization", "desc": "Objective: To establish accountability within the organization to uphold its responsible approach for the implementation, operation and management of AI systems.", "controls": [{"id": "A.3.2", "name": "AI roles and responsibilities", "desc": "Roles and responsibilities relating to AI must be formally defined, documented, and allocated across the organization based on its operational needs and risk profile."}, {"id": "A.3.3", "name": "Reporting of concerns", "desc": "A formal process must be established enabling employees, contractors, and relevant parties to raise concerns about the organization's role and conduct regarding AI systems throughout their lifecycle."}]}, {"id": "A.4", "name": "Resources for AI Systems", "desc": "Objective: To ensure that the organization accounts for the resources (including AI system components and assets) of the AI system in order to fully understand and address risks and impacts.", "controls": [{"id": "A.4.2", "name": "Resource documentation", "desc": "The organization must identify and document all resources required to support AI system activities at each stage of the AI system lifecycle."}, {"id": "A.4.3", "name": "Data resources", "desc": "As part of resource documentation, the organization must record detailed information about all data resources used in AI systems, including data provenance, quality, and intended use."}, {"id": "A.4.4", "name": "Tooling resources", "desc": "The organization must document information about all tooling resources used in AI systems, including algorithms, models, evaluation tools, and development software."}, {"id": "A.4.5", "name": "System and computing resources", "desc": "The organization must document information about the system and computing resources used to develop, deploy, and operate AI systems, including hardware and infrastructure details."}, {"id": "A.4.6", "name": "Human resources", "desc": "The organization must document the human resources and competencies involved across the full AI system lifecycle, from design and development through to decommissioning."}]}, {"id": "A.5", "name": "Assessing Impacts of AI Systems", "desc": "Objective: To assess AI system impacts to individuals or groups of individuals, or both, and societies affected by the AI system throughout its life cycle.", "controls": [{"id": "A.5.2", "name": "AI system impact assessment process", "desc": "A formal process must be established to assess potential consequences \u2014 positive and negative \u2014 that AI systems may have on individuals, groups, and society throughout the system's lifecycle."}, {"id": "A.5.3", "name": "Documentation of AI system impact assessments", "desc": "The results of all AI system impact assessments must be formally documented and retained for a defined period to support accountability and future decision-making."}, {"id": "A.5.4", "name": "Assessing AI system impact on individuals or groups of individuals", "desc": "The potential impacts of AI systems on individuals and specific groups of people must be systematically assessed and documented throughout the system's operational lifecycle."}, {"id": "A.5.5", "name": "Assessing societal impacts of AI systems", "desc": "The potential societal impacts of AI systems \u2014 including economic, environmental, and cultural effects \u2014 must be assessed and documented throughout the system's lifecycle."}]}, {"id": "A.6", "name": "AI System Life Cycle", "desc": "Objective: To define the criteria and requirements for each stage of the AI system life cycle and ensure responsible design and development.", "controls": [{"id": "A.6.1.2", "name": "Objectives for responsible development of AI system", "desc": "The organization must identify, document, and integrate responsible development objectives into the AI system development lifecycle, with specific measures to achieve each objective."}, {"id": "A.6.1.3", "name": "Processes for responsible AI system design and development", "desc": "The organization must define and document specific processes governing the responsible design and development of AI systems, covering all relevant lifecycle stages."}, {"id": "A.6.2.2", "name": "AI system requirements and specification", "desc": "Requirements for new AI systems or material enhancements to existing systems must be formally specified and documented before development or acquisition proceeds."}, {"id": "A.6.2.3", "name": "Documentation of AI system design and development", "desc": "AI system design and development decisions must be documented in alignment with organizational objectives, stated requirements, and defined specification criteria."}, {"id": "A.6.2.4", "name": "AI system verification and validation", "desc": "Verification and validation measures for AI systems must be formally defined and documented, with clear criteria specifying when and how they should be applied."}, {"id": "A.6.2.5", "name": "AI system deployment", "desc": "A deployment plan must be documented for each AI system, and the organization must confirm that all relevant requirements are met before deployment proceeds."}, {"id": "A.6.2.6", "name": "AI system operation and monitoring", "desc": "The organization must define and document the operational requirements for each AI system, including at minimum: performance monitoring, maintenance, updates, and support arrangements."}, {"id": "A.6.2.7", "name": "AI system technical documentation", "desc": "The organization must determine what technical documentation is required for each category of interested party \u2014 such as users, partners, and regulators \u2014 and provide it in an appropriate form."}, {"id": "A.6.2.8", "name": "AI system recording of event logs", "desc": "The organization must determine at which phases of the AI system lifecycle event logging should be active, ensuring at minimum that logging is enabled during operational use."}]}, {"id": "A.7", "name": "Data for AI Systems", "desc": "Objective: To ensure that the organization understands the role and impacts of data in AI systems throughout their life cycles.", "controls": [{"id": "A.7.2", "name": "Data for development and enhancement of AI system", "desc": "The organization must define, document, and implement data management processes that govern the use of data throughout AI system development activities."}, {"id": "A.7.3", "name": "Acquisition of data", "desc": "The organization must determine and document the details of how data is acquired and selected for use in AI systems, including data sources, categories, and selection criteria."}, {"id": "A.7.4", "name": "Quality of data for AI systems", "desc": "Data quality requirements for AI systems must be defined and documented, and the organization must verify that data used meets those requirements before and during use."}, {"id": "A.7.5", "name": "Data provenance", "desc": "A documented process must be established for tracking and recording the provenance of data used in AI systems across both the data lifecycle and the AI system lifecycle."}, {"id": "A.7.6", "name": "Data preparation", "desc": "The organization must define and document its criteria for selecting data preparation approaches and the specific methods applied to prepare data for use in AI systems."}]}, {"id": "A.8", "name": "Information for Interested Parties of AI Systems", "desc": "Objective: To ensure that relevant interested parties have the necessary information to understand and assess the risks and their impacts.", "controls": [{"id": "A.8.2", "name": "System documentation and information for users", "desc": "The organization must determine what information users of AI systems need to understand the system's purpose, capabilities, limitations, and appropriate use, and provide it to them."}, {"id": "A.8.3", "name": "External reporting", "desc": "The organization must provide mechanisms enabling users and external parties to report adverse impacts or concerns arising from AI system outputs or behavior."}, {"id": "A.8.4", "name": "Communication of incidents", "desc": "The organization must document and maintain a plan for communicating incidents related to AI systems to affected users in a timely and transparent manner."}, {"id": "A.8.5", "name": "Information for interested parties", "desc": "The organization must determine and document its obligations to report information about AI systems to interested parties, including regulators, customers, and other stakeholders."}]}, {"id": "A.9", "name": "Use of AI Systems", "desc": "Objective: To ensure that the organization uses AI systems responsibly and per organizational policies.", "controls": [{"id": "A.9.2", "name": "Processes for responsible use of AI systems", "desc": "The organization must define and document processes that govern the responsible and appropriate use of AI systems within its operations."}, {"id": "A.9.3", "name": "Objectives for responsible use of AI system", "desc": "The organization must identify and document objectives that guide the responsible use of AI systems, such as fairness, transparency, accountability, and safety."}, {"id": "A.9.4", "name": "Intended use of the AI system", "desc": "The organization must ensure that AI systems are used only for their intended purposes, in accordance with the accompanying documentation and instructions for use."}]}, {"id": "A.10", "name": "Third-Party and Customer Relationships", "desc": "Objective: To ensure that the organization understands its responsibilities and remains accountable when third parties are involved at any stage of the AI system life cycle.", "controls": [{"id": "A.10.2", "name": "Allocating responsibilities", "desc": "The organization must ensure that responsibilities for AI system activities are clearly allocated among all parties in the value chain, including partners, suppliers, customers, and third parties."}, {"id": "A.10.3", "name": "Suppliers", "desc": "The organization must establish a process ensuring that products, services, and materials provided by suppliers are used in a manner consistent with the organization's responsible AI approach."}, {"id": "A.10.4", "name": "Customers", "desc": "The organization must ensure its responsible approach to AI development and use actively considers and addresses customer expectations and needs."}]}]}, {"id": "cobit", "name": "COBIT 2019", "version": "2019", "desc": "COBIT\u00ae 2019 Framework: Governance and Management Objectives. A framework for enterprise governance of information and technology (EGIT).", "tag": "ISACA", "domains": [{"id": "EDM", "name": "Evaluate, Direct and Monitor", "desc": "Governance domain: The board's governance objectives \u2014 ensuring the organization's governance framework for I&T is established and maintained.", "controls": [{"id": "EDM01", "name": "Ensured Governance Framework Setting and Maintenance", "desc": "Analyze and establish the governance framework for enterprise information and technology (I&T), including the structures, principles, and processes needed to achieve organizational goals while maintaining clear accountability at all levels."}, {"id": "EDM02", "name": "Ensured Benefits Delivery", "desc": "Ensure optimal value is obtained from I&T-enabled investments and services by maintaining accurate visibility into costs, benefits, and delivery performance, so that I&T activities effectively and efficiently support business needs."}, {"id": "EDM03", "name": "Ensured Risk Optimization", "desc": "Ensure that I&T-related risks remain within the organization's defined risk appetite and tolerance levels, and that potential compliance failures are proactively identified and minimized."}, {"id": "EDM04", "name": "Ensured Resource Optimization", "desc": "Ensure that I&T resource requirements are met in the most effective and efficient manner, costs are optimized, and the organization is positioned to adapt to future change."}, {"id": "EDM05", "name": "Ensured Stakeholder Engagement", "desc": "Ensure that communication and reporting to I&T stakeholders is timely, transparent, and effective, with a clear basis for measuring and reporting performance to relevant parties."}]}, {"id": "APO", "name": "Align, Plan and Organise", "desc": "Management domain: Provides direction to solution delivery and service delivery and manages I&T-related risks across the enterprise.", "controls": [{"id": "APO01", "name": "Managed I&T Management Framework", "desc": "Clarify and maintain the management framework and direction for enterprise I&T, including the structures and mechanisms that govern information and technology management across the organization."}, {"id": "APO02", "name": "Managed Strategy", "desc": "Provide a comprehensive view of the current and desired future states of the business and I&T environment, including the initiatives and investments needed to bridge the gap in alignment with strategic objectives."}, {"id": "APO03", "name": "Managed Enterprise Architecture", "desc": "Establish a shared enterprise architecture covering business processes, information, data, applications, and technology to guide both current operations and future strategic direction."}, {"id": "APO04", "name": "Managed Innovation", "desc": "Monitor emerging technology and service trends and proactively identify innovation opportunities that can improve business outcomes or create new value through I&T-enabled innovation."}, {"id": "APO05", "name": "Managed Portfolio", "desc": "Manage the I&T investment portfolio in alignment with the enterprise's strategic direction, balancing investment categories, funding constraints, and resource availability."}, {"id": "APO06", "name": "Managed Budget and Costs", "desc": "Manage all I&T-related financial activities including budgeting, cost management, benefit tracking, and the fair allocation of I&T costs across the organization."}, {"id": "APO07", "name": "Managed Human Resources", "desc": "Provide a structured approach to acquiring, planning, evaluating, and developing human resources for I&T, ensuring the right people with the right skills are available when needed."}, {"id": "APO08", "name": "Managed Relationships", "desc": "Manage relationships with business stakeholders through transparent, trust-based engagement that aligns I&T objectives with business goals within agreed risk and budget boundaries."}, {"id": "APO09", "name": "Managed Service Agreements", "desc": "Align I&T services and service levels with enterprise expectations by identifying, specifying, designing, publishing, and monitoring all I&T product and service agreements."}, {"id": "APO10", "name": "Managed Vendors", "desc": "Manage all I&T-related products and services provided by external vendors, covering vendor selection, contract management, relationship management, and ongoing performance monitoring."}, {"id": "APO11", "name": "Managed Quality", "desc": "Define and communicate quality requirements for all I&T processes and outcomes, and establish quality assurance and control practices to verify that requirements are consistently met."}, {"id": "APO12", "name": "Managed Risk", "desc": "Continuously identify, assess, and manage I&T-related risks within the organization's defined tolerance levels, maintaining alignment with the overall enterprise risk management approach."}, {"id": "APO13", "name": "Managed Security", "desc": "Define, operate, and monitor an information security management system to ensure that information security incidents and risks remain within acceptable levels for the organization."}, {"id": "APO14", "name": "Managed Data", "desc": "Achieve and sustain effective management of enterprise data assets across the entire data lifecycle \u2014 from creation through to disposal \u2014 aligned with enterprise strategy and data requirements."}]}, {"id": "BAI", "name": "Build, Acquire and Implement", "desc": "Management domain: Provides direction for the definition, acquisition and implementation of I&T solutions and their integration into business processes.", "controls": [{"id": "BAI01", "name": "Managed Programs", "desc": "Manage all programs from the I&T investment portfolio in a coordinated manner, using a standard program management approach from initiation through to closure and post-implementation review."}, {"id": "BAI02", "name": "Managed Requirements Definition", "desc": "Identify and analyze requirements before acquiring or building solutions to ensure they align with enterprise strategic objectives across business processes, applications, data, and infrastructure."}, {"id": "BAI03", "name": "Managed Solutions Identification and Build", "desc": "Establish and maintain identified products and services in line with enterprise requirements, covering design, development, procurement, and supplier/partner engagement."}, {"id": "BAI04", "name": "Managed Availability and Capacity", "desc": "Balance current and future needs for availability, performance, and capacity against cost-effective service provision, using business requirements to drive investment decisions in I&T capabilities."}, {"id": "BAI05", "name": "Managed Organizational Change", "desc": "Maximize the likelihood of successfully implementing sustainable organizational change by managing the full change lifecycle and engaging all affected stakeholders throughout the process."}, {"id": "BAI06", "name": "Managed IT Changes", "desc": "Manage all changes to business processes, applications, and infrastructure in a controlled manner, including assessment, authorization, planning, implementation, documentation, and post-implementation review."}, {"id": "BAI07", "name": "Managed IT Change Acceptance and Transitioning", "desc": "Formally accept and operationalize new solutions, covering implementation planning, system conversion, acceptance testing, communication, release preparation, and early production support."}, {"id": "BAI08", "name": "Managed Knowledge", "desc": "Maintain the availability of relevant, validated, and up-to-date knowledge and management information to support all I&T processes and enable effective governance and management decisions."}, {"id": "BAI09", "name": "Managed Assets", "desc": "Manage I&T assets throughout their lifecycle to maximize value, maintain operational fitness, ensure proper accounting, and protect assets from unauthorized use or loss."}, {"id": "BAI10", "name": "Managed Configuration", "desc": "Define and maintain descriptions and relationships among key resources and capabilities required to deliver I&T-enabled services, including configuration baselines and verification activities."}, {"id": "BAI11", "name": "Managed Projects", "desc": "Manage all I&T-related projects from initiation through to completion, using standard project management practices and conducting post-implementation reviews to capture lessons learned."}]}, {"id": "DSS", "name": "Deliver, Service and Support", "desc": "Management domain: Addresses the operational delivery and support of I&T services, including the management of security.", "controls": [{"id": "DSS01", "name": "Managed Operations", "desc": "Coordinate and execute operational activities and procedures required to deliver internal and outsourced I&T services in accordance with agreed service levels and standard operating procedures."}, {"id": "DSS02", "name": "Managed Service Requests and Incidents", "desc": "Provide timely and effective responses to user service requests and all categories of incidents, restoring normal service, resolving underlying issues, and fulfilling user requests efficiently."}, {"id": "DSS03", "name": "Managed Problems", "desc": "Identify and classify problems and their root causes, provide timely resolutions to prevent incident recurrence, and recommend improvements to prevent similar problems in future."}, {"id": "DSS04", "name": "Managed Continuity", "desc": "Establish and maintain a continuity plan enabling the organization to respond to disruptions and quickly restore critical business processes and I&T services to acceptable operating levels."}, {"id": "DSS05", "name": "Managed Security Services", "desc": "Protect enterprise information by maintaining information security at levels acceptable to the organization, managing access rights, and actively monitoring for security-relevant events."}, {"id": "DSS06", "name": "Managed Business Process Controls", "desc": "Define and maintain appropriate business process controls to ensure that information processed through in-house or outsourced processes meets all relevant integrity and control requirements."}]}, {"id": "MEA", "name": "Monitor, Evaluate and Assess", "desc": "Management domain: Monitors all processes to ensure compliance with performance targets and to confirm adequacy and effectiveness of controls.", "controls": [{"id": "MEA01", "name": "Managed Performance and Conformance Monitoring", "desc": "Collect, validate, and evaluate performance and conformance metrics against agreed goals, and provide timely management reporting to enable appropriate corrective actions where needed."}, {"id": "MEA02", "name": "Managed System of Internal Control", "desc": "Monitor and evaluate the effectiveness of the internal control environment through ongoing assessments, enabling management to identify control deficiencies and drive improvements."}, {"id": "MEA03", "name": "Managed Compliance with External Requirements", "desc": "Evaluate whether I&T processes and I&T-supported business processes comply with all applicable laws, regulations, and contractual requirements, and integrate IT compliance with enterprise-wide compliance activities."}, {"id": "MEA04", "name": "Managed Assurance", "desc": "Plan, scope, execute, and follow up on assurance initiatives to provide guidance on the adequacy and fitness for purpose of the organization's IT portfolio, services, assets, and resources."}]}]}, {"id": "soc2", "name": "SOC 2", "version": "Type II", "desc": "AICPA Trust Services Criteria for service organizations.", "tag": "AICPA", "domains": [{"id": "CC1", "name": "Control Environment", "desc": "Governance, tone at the top and accountability.", "controls": [{"id": "CC1.1", "name": "Integrity and ethical values", "desc": "The entity demonstrates a commitment to integrity and ethical values."}, {"id": "CC1.2", "name": "Board oversight", "desc": "The board of directors demonstrates independence from management and exercises oversight of the development and performance of internal control."}, {"id": "CC1.3", "name": "Structures, reporting lines and authority", "desc": "Management establishes structures, reporting lines, and appropriate authorities and responsibilities in the pursuit of objectives."}, {"id": "CC1.4", "name": "Competence and development", "desc": "The entity demonstrates a commitment to attract, develop, and retain competent individuals in alignment with objectives."}, {"id": "CC1.5", "name": "Accountability", "desc": "The entity holds individuals accountable for their internal control responsibilities in the pursuit of objectives."}]}, {"id": "CC2", "name": "Communication & Information", "desc": "Quality information and effective communication relevant to objectives.", "controls": [{"id": "CC2.1", "name": "Quality information", "desc": "The entity obtains or generates and uses relevant, quality information to support the functioning of internal control."}, {"id": "CC2.2", "name": "Internal communication", "desc": "The entity internally communicates information, including objectives and responsibilities for internal control."}, {"id": "CC2.3", "name": "External communication", "desc": "The entity communicates with external parties regarding matters affecting the functioning of internal control."}]}, {"id": "CC3", "name": "Risk Assessment", "desc": "Identifying and analyzing risks to achievement of objectives.", "controls": [{"id": "CC3.1", "name": "Specify suitable objectives", "desc": "The entity specifies objectives with sufficient clarity to enable the identification and assessment of risks."}, {"id": "CC3.2", "name": "Identify and analyze risk", "desc": "The entity identifies risks to the achievement of its objectives across the entity and analyzes risks as a basis for determining how the risks should be managed."}, {"id": "CC3.3", "name": "Assess fraud risk", "desc": "The entity considers the potential for fraud in assessing risks to the achievement of objectives."}, {"id": "CC3.4", "name": "Identify and assess change", "desc": "The entity identifies and assesses changes that could significantly impact the system of internal control."}]}, {"id": "CC6", "name": "Logical & Physical Access", "desc": "Logical access security, authentication and physical access controls.", "controls": [{"id": "CC6.1", "name": "Logical access security", "desc": "The entity implements logical access security software, infrastructure, and architectures over protected information assets to protect them from security events."}, {"id": "CC6.2", "name": "New access credentials", "desc": "Prior to issuing system credentials and granting system access, the entity registers and authorizes new internal and external users."}, {"id": "CC6.3", "name": "Role-based access", "desc": "The entity authorizes, modifies, or removes access to data, software, functions, and other protected assets based on roles and responsibilities."}, {"id": "CC6.6", "name": "Security threats from outside the system", "desc": "The entity implements controls to prevent and detect threats and vulnerabilities from outside the system boundary."}, {"id": "CC6.7", "name": "Transmission and movement of data", "desc": "The entity restricts the transmission, movement, and removal of information to authorized internal and external users and processes."}, {"id": "CC6.8", "name": "Prevention and detection of unauthorized software", "desc": "The entity implements controls to prevent or detect and act upon the introduction of unauthorized or malicious software."}]}, {"id": "CC7", "name": "System Operations", "desc": "Monitoring, change management and incident response.", "controls": [{"id": "CC7.1", "name": "Configuration management", "desc": "The entity uses detection and monitoring procedures to identify changes to configurations that introduce new vulnerabilities."}, {"id": "CC7.2", "name": "Monitor for anomalies", "desc": "The entity monitors system components and the operation of those components for anomalies indicative of malicious acts, natural disasters, and errors."}, {"id": "CC7.3", "name": "Evaluate security events", "desc": "The entity evaluates security events to determine whether they could or have resulted in a failure to meet its objectives."}, {"id": "CC7.4", "name": "Respond to security incidents", "desc": "The entity responds to identified security incidents by executing a defined incident response program."}, {"id": "CC7.5", "name": "Recover from security incidents", "desc": "The entity identifies, develops, and implements activities to recover from identified security incidents."}]}, {"id": "CC8", "name": "Change Management", "desc": "Controls for managing changes to infrastructure, data, software and procedures.", "controls": [{"id": "CC8.1", "name": "Change management process", "desc": "The entity authorizes, designs, develops, configures, documents, tests, approves, and implements changes to infrastructure, data, software, and procedures."}]}, {"id": "CC9", "name": "Risk Mitigation", "desc": "Risk mitigation activities for business disruption and vendor risks.", "controls": [{"id": "CC9.1", "name": "Business disruption risk mitigation", "desc": "The entity identifies, selects, and develops risk mitigation activities for risks arising from potential business disruptions."}, {"id": "CC9.2", "name": "Vendor and business partner risk", "desc": "The entity assesses and manages risks associated with vendors and business partners."}]}]}, {"id": "gdpr", "name": "GDPR", "version": "EU 2016/679", "desc": "European regulation on data protection and privacy for individuals within the EU.", "tag": "EU Law", "domains": [{"id": "Art.5", "name": "Principles of Processing", "desc": "Lawfulness, fairness, transparency and data minimisation.", "controls": [{"id": "Art.5.1(a)", "name": "Lawfulness, fairness and transparency", "desc": "Personal data shall be processed lawfully, fairly and in a transparent manner in relation to the data subject."}, {"id": "Art.5.1(b)", "name": "Purpose limitation", "desc": "Collected for specified, explicit and legitimate purposes and not further processed in a manner that is incompatible with those purposes."}, {"id": "Art.5.1(c)", "name": "Data minimisation", "desc": "Adequate, relevant and limited to what is necessary in relation to the purposes for which they are processed."}, {"id": "Art.5.1(d)", "name": "Accuracy", "desc": "Accurate and, where necessary, kept up to date; inaccurate personal data must be erased or rectified without delay."}, {"id": "Art.5.1(e)", "name": "Storage limitation", "desc": "Kept in identifiable form no longer than necessary for the purposes."}, {"id": "Art.5.1(f)", "name": "Integrity and confidentiality", "desc": "Processed in a manner that ensures appropriate security including protection against unauthorised processing and accidental loss."}, {"id": "Art.5.2", "name": "Accountability", "desc": "The controller shall be responsible for, and be able to demonstrate compliance with, the principles."}]}, {"id": "Art.6", "name": "Lawful Basis for Processing", "desc": "Legal grounds permitting processing of personal data.", "controls": [{"id": "Art.6.1(a)", "name": "Consent", "desc": "The data subject has given consent to the processing of his or her personal data for one or more specific purposes."}, {"id": "Art.6.1(b)", "name": "Contractual necessity", "desc": "Processing is necessary for the performance of a contract to which the data subject is party."}, {"id": "Art.6.1(c)", "name": "Legal obligation", "desc": "Processing is necessary for compliance with a legal obligation to which the controller is subject."}, {"id": "Art.6.1(f)", "name": "Legitimate interests", "desc": "Processing is necessary for the purposes of the legitimate interests pursued by the controller or by a third party."}]}, {"id": "Art.15-22", "name": "Data Subject Rights", "desc": "Rights of data subjects regarding their personal data.", "controls": [{"id": "Art.15", "name": "Right of access", "desc": "The data subject shall have the right to obtain confirmation as to whether or not personal data concerning him or her are being processed."}, {"id": "Art.16", "name": "Right to rectification", "desc": "The data subject shall have the right to obtain without undue delay the rectification of inaccurate personal data."}, {"id": "Art.17", "name": "Right to erasure", "desc": "The data subject shall have the right to obtain the erasure of personal data without undue delay where specified grounds apply."}, {"id": "Art.18", "name": "Right to restriction of processing", "desc": "The data subject shall have the right to obtain restriction of processing where certain grounds apply."}, {"id": "Art.20", "name": "Right to data portability", "desc": "The data subject shall have the right to receive the personal data in a structured, commonly used and machine-readable format."}, {"id": "Art.21", "name": "Right to object", "desc": "The data subject shall have the right to object at any time to processing of personal data based on legitimate interests or public task."}, {"id": "Art.22", "name": "Automated decision-making and profiling", "desc": "The data subject shall have the right not to be subject to a decision based solely on automated processing which produces legal or similarly significant effects."}]}, {"id": "Art.32", "name": "Security of Processing", "desc": "Technical and organisational measures appropriate to the risk.", "controls": [{"id": "Art.32.1(a)", "name": "Pseudonymisation and encryption", "desc": "Implementation of pseudonymisation and encryption of personal data where appropriate."}, {"id": "Art.32.1(b)", "name": "Ongoing confidentiality and availability", "desc": "The ability to ensure ongoing confidentiality, integrity, availability and resilience of processing systems."}, {"id": "Art.32.1(c)", "name": "Restore availability", "desc": "The ability to restore availability and access to personal data in a timely manner after an incident."}, {"id": "Art.32.1(d)", "name": "Testing and evaluation", "desc": "A process for regularly testing, assessing and evaluating the effectiveness of technical and organisational measures."}]}, {"id": "Art.33-34", "name": "Breach Notification", "desc": "Requirements for notification following a personal data breach.", "controls": [{"id": "Art.33.1", "name": "Notification within 72 hours", "desc": "In the case of a personal data breach, the controller shall notify the supervisory authority not later than 72 hours after becoming aware."}, {"id": "Art.33.3", "name": "Content of the notification", "desc": "Notification shall describe the nature of the breach, categories of data subjects and measures taken to address the breach."}, {"id": "Art.34.1", "name": "Communication to data subjects", "desc": "When the breach is likely to result in a high risk to rights and freedoms, the controller shall communicate the breach to the data subject without undue delay."}]}, {"id": "Art.35", "name": "Data Protection Impact Assessment", "desc": "DPIA required for processing likely to result in high risk.", "controls": [{"id": "Art.35.1", "name": "DPIA requirement", "desc": "Where processing is likely to result in a high risk to the rights and freedoms of natural persons, the controller shall carry out a data protection impact assessment."}, {"id": "Art.35.7", "name": "DPIA content", "desc": "The assessment shall contain a systematic description of processing operations, assessment of necessity and proportionality, risks and measures to address risks."}]}]}, {"id": "pci", "name": "PCI DSS", "version": "v4.0", "desc": "Payment Card Industry Data Security Standard for protecting cardholder data.", "tag": "PCI SSC", "domains": [{"id": "Req.1", "name": "Network Security Controls", "desc": "Build and maintain a secure network and systems.", "controls": [{"id": "1.1", "name": "Network security control processes", "desc": "Processes and mechanisms for protecting the network from unauthorized access are defined, documented, implemented and maintained."}, {"id": "1.2", "name": "Network security configuration", "desc": "Network security controls are configured and validated to restrict inbound and outbound traffic."}, {"id": "1.3", "name": "Restrict inbound and outbound traffic", "desc": "Network access to and from the cardholder data environment is restricted."}, {"id": "1.4", "name": "Untrusted network connections", "desc": "Network connections between trusted and untrusted networks are controlled."}]}, {"id": "Req.3", "name": "Protect Stored Account Data", "desc": "Protect stored account data.", "controls": [{"id": "3.2", "name": "Storage of account data minimized", "desc": "Storage of account data is kept to a minimum."}, {"id": "3.3", "name": "Sensitive authentication data not retained", "desc": "Sensitive authentication data (SAD) is not retained after authorization."}, {"id": "3.4", "name": "PAN rendered unreadable", "desc": "PAN rendered unreadable anywhere it is stored."}, {"id": "3.5", "name": "Cryptographic key management", "desc": "PAN secured with strong cryptography; key management processes defined and implemented."}]}, {"id": "Req.6", "name": "Secure Systems and Software", "desc": "Develop and maintain secure systems and software.", "controls": [{"id": "6.1", "name": "Security vulnerability management", "desc": "Processes and mechanisms for protecting against known vulnerabilities are defined and understood."}, {"id": "6.2", "name": "Bespoke and custom software", "desc": "Bespoke and custom software are developed securely."}, {"id": "6.3", "name": "Security vulnerabilities identified", "desc": "Security vulnerabilities are identified and protected against."}, {"id": "6.4", "name": "Public-facing web applications protected", "desc": "Public-facing web applications are protected against attacks."}, {"id": "6.5", "name": "Changes to system components controlled", "desc": "All changes to system components in the production environment are authorized and managed securely."}]}, {"id": "Req.8", "name": "Identify Users & Authenticate Access", "desc": "Identify users and authenticate access to system components.", "controls": [{"id": "8.2", "name": "Unique user IDs", "desc": "All users are assigned and use a unique ID before allowing them to access system components or cardholder data."}, {"id": "8.3", "name": "Strong authentication for users", "desc": "User identification and related accounts are strictly managed throughout an account's lifecycle."}, {"id": "8.4", "name": "Multi-factor authentication for CDE", "desc": "Multi-factor authentication is implemented to secure access into the CDE."}, {"id": "8.5", "name": "MFA systems configured securely", "desc": "Multi-factor authentication systems are configured to prevent misuse."}]}, {"id": "Req.10", "name": "Log and Monitor All Access", "desc": "Log and monitor all access to system components and cardholder data.", "controls": [{"id": "10.2", "name": "Audit logs implemented", "desc": "Audit logs capture all individual user access to cardholder data, actions by root or administrative access, and invalid logical access attempts."}, {"id": "10.3", "name": "Audit logs protected", "desc": "Audit logs are protected to prevent modifications."}, {"id": "10.4", "name": "Audit logs reviewed", "desc": "Audit logs are reviewed to identify anomalies or suspicious activity."}, {"id": "10.7", "name": "Failures of security controls detected", "desc": "Failures of critical security controls are detected, reported, and responded to promptly."}]}, {"id": "Req.11", "name": "Test Security Regularly", "desc": "Test security of systems and networks regularly.", "controls": [{"id": "11.3", "name": "Vulnerability scanning", "desc": "External and internal vulnerabilities are regularly identified, prioritized, and addressed."}, {"id": "11.4", "name": "Penetration testing", "desc": "External and internal penetration testing is regularly performed."}, {"id": "11.5", "name": "Network intrusion detection", "desc": "Network intrusions and unexpected file changes are detected and responded to."}]}, {"id": "Req.12", "name": "Security Policies and Programs", "desc": "Support information security with organizational policies and programs.", "controls": [{"id": "12.1", "name": "Comprehensive information security policy", "desc": "A comprehensive information security policy that governs protection of the entity's information assets is known and current."}, {"id": "12.3", "name": "Risk management for technologies", "desc": "Risks to cardholder data and other assets are identified, evaluated, and managed."}, {"id": "12.10", "name": "Incident response plan", "desc": "Suspected and confirmed security incidents that could impact the CDE are responded to immediately."}]}]}, {"id": "nist", "name": "NIST CSF", "version": "2.0", "desc": "Voluntary framework for managing and reducin
