<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GRC Ref">
<meta name="theme-color" content="#6366f1">
<meta name="description" content="Offline GRC compliance framework reference">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>GRC Reference Dashboard</title>
<style>
:root{
  --bg:#f0f2f5;--surf:#fff;--surf2:#f4f5f8;--surf3:#eceef2;
  --tx:#1a1a2e;--tx2:#4b5563;--tx3:#9ca3af;
  --bd:#e5e7eb;--bd2:#d1d5db;
  --ac:#6366f1;--acl:#eef0ff;
  --fn:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  --mn:"SF Mono","Fira Code",monospace;
  --nav-h:56px;
  --header-h:52px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
[data-dark]{
  --bg:#0d0f18;--surf:#151823;--surf2:#1d2030;--surf3:#252838;
  --tx:#e2e4ee;--tx2:#8b93a8;--tx3:#555e75;
  --bd:#252838;--bd2:#2f3449;
  --ac:#818cf8;--acl:#1a1c30;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);
  height:100%;display:flex;flex-direction:column;overflow:hidden;
  padding-top:env(safe-area-inset-top,0px);
}
button,input{font-family:var(--fn);border:none;background:none;color:inherit}
button{cursor:pointer}
a{color:var(--ac);text-decoration:none}

/* ── HEADER ── */
#hdr{
  height:var(--header-h);min-height:var(--header-h);
  background:var(--surf);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:10px;padding:0 14px;
  flex-shrink:0;z-index:10;
}
.brand{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.bico{width:32px;height:32px;background:var(--acl);border-radius:8px;
  display:flex;align-items:center;justify-content:center;color:var(--ac);flex-shrink:0}
.btxt{min-width:0}
.bnm{font-size:15px;font-weight:700;letter-spacing:-.01em}
.bsub{font-size:10px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbtn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;color:var(--tx2);background:var(--surf2);border:1px solid var(--bd);flex-shrink:0}
.hbtn.lit{background:var(--acl);color:var(--ac);border-color:var(--ac)}

/* ── SEARCH BAR ── */
#sbar{
  padding:8px 14px;background:var(--surf);border-bottom:1px solid var(--bd);flex-shrink:0;
}
.si-wrap{position:relative}
#sb{
  width:100%;height:36px;padding:0 10px 0 34px;
  border:1px solid var(--bd2);border-radius:10px;
  background:var(--surf2);color:var(--tx);font-size:14px;outline:none;
}
#sb:focus{border-color:var(--ac)}
#sb::placeholder{color:var(--tx3)}
.s-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--tx3)}
.s-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  color:var(--tx3);display:none;padding:4px}

/* ── CATEGORY PILLS ── */
#cats{
  display:flex;gap:6px;padding:8px 14px;overflow-x:auto;
  background:var(--surf);border-bottom:1px solid var(--bd);flex-shrink:0;
}
#cats::-webkit-scrollbar{display:none}
.pill{height:28px;padding:0 12px;border-radius:20px;font-size:12px;font-weight:500;
  color:var(--tx2);background:var(--surf2);border:1px solid var(--bd);
  white-space:nowrap;transition:all .12s;flex-shrink:0}
.pill.on{background:var(--ac);color:#fff;border-color:var(--ac)}

/* ── VIEWS ── */
#views{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}
.view{position:absolute;inset:0;overflow-y:auto;display:none;flex-direction:column;
  padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px)}
.view.active{display:flex}
.view::-webkit-scrollbar{width:3px}
.view::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ── FRAMEWORKS LIST ── */
#vHome{}
.fw-list-hd{padding:12px 14px 6px;font-size:10px;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;color:var(--tx3)}
.fw-card{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--surf);border-bottom:1px solid var(--bd);
  transition:background .1s;
}
.fw-card:active{background:var(--surf2)}
.fw-card-ico{width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fw-card-info{flex:1;min-width:0}
.fw-card-name{font-size:14px;font-weight:600}
.fw-card-meta{font-size:11px;color:var(--tx3);margin-top:2px}
.fw-card-ct{font-size:11px;font-weight:600;padding:2px 8px;
  border-radius:9px;background:var(--surf2);color:var(--tx3);flex-shrink:0}
.fw-card-arr{color:var(--tx3);flex-shrink:0}

/* ── DOMAINS VIEW ── */
#vDoms{}
.back-bar{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:var(--surf);border-bottom:1px solid var(--bd);flex-shrink:0;
  position:sticky;top:0;z-index:5;
}
.back-btn{display:flex;align-items:center;gap:5px;font-size:13px;
  font-weight:500;color:var(--ac);padding:4px 0}
.fw-hero-mob{
  padding:14px;background:var(--surf);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:12px;
}
.fhm-ico{width:44px;height:44px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fhm-name{font-size:16px;font-weight:700}
.fhm-ver{font-size:11px;color:var(--tx3)}
.fhm-desc{font-size:11px;color:var(--tx2);margin-top:3px;line-height:1.4}
.fhm-tags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.fhm-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;letter-spacing:.04em}
.fhm-st{font-size:10px;color:var(--tx3);padding:2px 6px;background:var(--surf2);border-radius:4px}
.doms-list{flex:1}
.dom-item{background:var(--surf);border-bottom:1px solid var(--bd)}
.dom-hd{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.dom-hd:active{background:var(--surf2)}
.dom-chv{transition:transform .18s;color:var(--tx3);flex-shrink:0}
.dom-chv.op{transform:rotate(90deg)}
.dom-did{font-family:var(--mn);font-size:10px;font-weight:600;
  padding:2px 6px;border-radius:4px;flex-shrink:0}
.dom-nm{font-size:13px;font-weight:600;flex:1}
.dom-ct{font-size:10px;font-weight:600;padding:1px 7px;
  border-radius:9px;background:var(--surf2);color:var(--tx3)}
.dom-ctrls{border-top:1px solid var(--bd)}

/* ── CONTROL ROWS ── */
.ctrl-row{
  display:flex;align-items:flex-start;gap:10px;padding:11px 14px;
  border-bottom:1px solid var(--bd);transition:background .08s;
}
.ctrl-row:active{background:var(--surf2)}
.ctrl-row.bkd{background:linear-gradient(90deg,rgba(251,191,36,.07),transparent)}
.ctrl-id{font-family:var(--mn);font-size:10px;font-weight:700;
  min-width:68px;flex-shrink:0;padding-top:1px;line-height:1.4}
.ctrl-body{flex:1;min-width:0}
.ctrl-nm{font-size:13px;font-weight:600;line-height:1.35}
.ctrl-ds{font-size:11px;color:var(--tx2);margin-top:3px;line-height:1.55}
.ctrl-maps{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.mt{display:inline-flex;flex-direction:column;align-items:center;
  font-size:10px;padding:2px 5px;border-radius:4px;font-family:var(--mn);
  font-weight:600;border:1px solid;flex-shrink:0;transition:opacity .1s;background:none;gap:1px}
.mt-fw{font-size:8px;opacity:.75;font-family:var(--fn);font-weight:600}
.ctrl-bk{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;color:var(--tx3);background:var(--surf3);
  flex-shrink:0;transition:all .1s;margin-top:-1px}
.ctrl-bk.on{color:#f59e0b;background:rgba(245,158,11,.12)}

/* ── DETAIL PANEL (full screen slide-up on mobile) ── */
#vDetail{
  position:fixed;inset:0;z-index:50;
  background:var(--surf);
  transform:translateY(100%);
  transition:transform .25s ease;
  display:flex;flex-direction:column;
  padding-top:env(safe-area-inset-top,0px);
}
#vDetail.open{transform:translateY(0)}
#det-hdr{
  padding:14px 14px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;
  display:flex;align-items:flex-start;gap:10px;background:var(--surf);
}
#det-body{flex:1;overflow-y:auto;padding:0 0 calc(var(--safe-b) + 80px)}
#det-body::-webkit-scrollbar{width:3px}
#det-body::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.det-sec{padding:14px 14px 0}
.det-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.det-txt{font-size:13px;color:var(--tx2);line-height:1.65}
.det-close{width:32px;height:32px;border-radius:8px;display:flex;
  align-items:center;justify-content:center;color:var(--tx3);flex-shrink:0;
  background:var(--surf2);border:1px solid var(--bd)}

/* Mapping groups */
.mg-group{margin-bottom:14px;padding:0 14px}
.mg-fw-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:700;color:#fff;letter-spacing:.03em;margin-bottom:7px}
.mg-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;
  background:var(--surf2);border:1px solid var(--bd);margin-bottom:6px;transition:background .1s}
.mg-row:active{background:var(--surf3)}
.mg-arr{color:var(--ac);font-size:14px;flex-shrink:0}
.mg-cnm{font-size:12px;color:var(--tx);flex:1;min-width:0;line-height:1.35}
.mg-rel{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;flex-shrink:0}
.rel-eq{background:#dcfce7;color:#166534}
[data-dark] .rel-eq{background:#14532d;color:#86efac}
.rel-rel{background:#eff6ff;color:#1d4ed8}
[data-dark] .rel-rel{background:#1e3a5f;color:#93c5fd}

/* Bookmarks panel */
.bk-item{padding:10px 12px;background:var(--surf2);border-radius:8px;
  border-left:3px solid #f59e0b;border-top:1px solid var(--bd);
  border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);
  margin-bottom:6px;transition:background .1s}
.bk-item:active{background:var(--surf3)}
.bk-id{font-family:var(--mn);font-size:10px;font-weight:700;color:var(--tx3)}
.bk-nm{font-size:13px;font-weight:600;color:var(--tx);margin-top:2px}
.bk-fw{font-size:11px;color:var(--tx3);margin-top:2px}
.mu{font-size:13px;color:var(--tx3);font-style:italic;padding:0 14px}

/* ── BOOKMARKS VIEW ── */
#vBk{}
.bk-list{padding:12px 14px}

/* ── BOTTOM NAV ── */
#nav{
  height:calc(var(--nav-h) + var(--safe-b));
  min-height:calc(var(--nav-h) + var(--safe-b));
  background:var(--surf);border-top:1px solid var(--bd);
  display:flex;align-items:flex-start;padding-top:4px;
  flex-shrink:0;z-index:10;
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:4px 0;color:var(--tx3);font-size:10px;font-weight:500;
  border:none;background:none;cursor:pointer;transition:color .12s}
.nav-btn.on{color:var(--ac)}
.nav-btn svg{margin-bottom:1px}
.nav-badge{position:absolute;top:-2px;right:-4px;background:#ef4444;
  color:#fff;font-size:9px;font-weight:700;padding:1px 4px;
  border-radius:8px;min-width:14px;text-align:center;display:none}
.nav-icon-wrap{position:relative}

/* ── EMPTY / TOAST ── */
.empty{display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;padding:3rem 2rem;text-align:center;color:var(--tx3)}
.empty svg{opacity:.25}
.empty h2{font-size:15px;font-weight:600;color:var(--tx2)}
.empty p{font-size:13px;line-height:1.5}
#toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 12px);
  left:50%;transform:translateX(-50%) translateY(40px);
  background:#1e2030;color:#e2e4ee;padding:8px 16px;border-radius:10px;
  font-size:13px;transition:transform .2s;z-index:99;pointer-events:none;
  white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2)}
[data-dark] #toast{background:var(--surf3)}
#toast.show{transform:translateX(-50%)}

/* ── INSTALL BANNER ── */
#install-banner{
  margin:10px 14px;padding:12px 14px;background:var(--acl);
  border-radius:12px;border:1px solid var(--ac);display:none;
  align-items:center;gap:10px;
}
#install-banner.show{display:flex}
.ib-txt{flex:1;font-size:12px;color:var(--tx2);line-height:1.4}
.ib-txt strong{color:var(--tx);font-size:13px;display:block;margin-bottom:2px}
.ib-btn{font-size:12px;font-weight:600;color:#fff;background:var(--ac);
  padding:6px 12px;border-radius:8px;white-space:nowrap}
.ib-close{color:var(--tx3);padding:4px;font-size:16px;line-height:1}

mark{background:#fef08a;border-radius:2px;padding:0 1px;color:inherit}
[data-dark] mark{background:#713f12;color:#fef3c7}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div class="brand">
    <div class="bico">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <div class="btxt">
      <div class="bnm">GRC Dashboard</div>
      <div class="bsub">15 frameworks &bull; 500+ controls &bull; Offline</div>
    </div>
  </div>
  <button class="hbtn" id="dmb" title="Dark mode">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</div>

<!-- SEARCH -->
<div id="sbar">
  <div class="si-wrap">
    <svg class="s-ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="sb" placeholder="Search frameworks, controls, IDs…" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button id="s-clear" class="s-clear">&#10005;</button>
  </div>
</div>

<!-- CATEGORY PILLS -->
<div id="cats">
  <button class="pill on" data-cat="All">All</button>
  <button class="pill" data-cat="Security">Security</button>
  <button class="pill" data-cat="Privacy">Privacy</button>
  <button class="pill" data-cat="Risk">Risk</button>
  <button class="pill" data-cat="AI">AI</button>
</div>

<!-- VIEWS -->
<div id="views">
  <div class="view active" id="vHome"></div>
  <div class="view" id="vDoms"></div>
  <div class="view" id="vSearch"></div>
  <div class="view" id="vBk"></div>
</div>

<!-- DETAIL PANEL (slide-up) -->
<div id="vDetail">
  <div id="det-hdr"></div>
  <div id="det-body"></div>
</div>

<!-- BOTTOM NAV -->
<div id="nav">
  <button class="nav-btn on" id="nb-home">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Frameworks
  </button>
  <button class="nav-btn" id="nb-search">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Search
  </button>
  <button class="nav-btn" id="nb-bk" style="position:relative">
    <div class="nav-icon-wrap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span class="nav-badge" id="bk-badge">0</span>
    </div>
    Bookmarks
  </button>
</div>

<div id="toast"></div>

<script>
const DATA=[{"id": "iso27001", "name": "ISO 27001", "version": "2022", "desc": "Information security, cybersecurity and privacy protection \u2014 Information security management systems \u2014 Requirements.", "tag": "ISO/IEC", "domains": [{"id": "5", "name": "Organizational Controls", "desc": "Controls relating to information security policies, roles, asset management, supplier relationships and incident management.", "controls": [{"id": "5.1", "name": "Policies for information security", "desc": "Information security policy and topic-specific policies shall be defined, approved by management, published, communicated to and acknowledged by relevant personnel and relevant interested parties, and reviewed at planned intervals and if significant changes occur."}, {"id": "5.2", "name": "Information security roles and responsibilities", "desc": "Information security roles and responsibilities shall be defined and allocated according to the organization needs."}, {"id": "5.3", "name": "Segregation of duties", "desc": "Conflicting duties and conflicting areas of responsibility shall be segregated."}, {"id": "5.4", "name": "Management responsibilities", "desc": "Management shall require all personnel to apply information security in accordance with the established information security policy, topic-specific policies and procedures of the organization."}, {"id": "5.5", "name": "Contact with authorities", "desc": "The organization shall establish and maintain contact with relevant authorities."}, {"id": "5.6", "name": "Contact with special interest groups", "desc": "The organization shall establish and maintain contact with special interest groups or other specialist security forums and professional associations."}, {"id": "5.7", "name": "Threat intelligence", "desc": "Information relating to information security threats shall be collected and analysed to produce threat intelligence."}, {"id": "5.8", "name": "Information security in project management", "desc": "Information security shall be integrated into project management."}, {"id": "5.9", "name": "Inventory of information and other associated assets", "desc": "An inventory of information and other associated assets, including owners, shall be developed and maintained."}, {"id": "5.10", "name": "Acceptable use of information and other associated assets", "desc": "Rules for the acceptable use and procedures for handling information and other associated assets shall be identified, documented and implemented."}, {"id": "5.11", "name": "Return of assets", "desc": "Personnel and other interested parties as appropriate shall return all the organization's assets in their possession upon change or termination of their employment, contract or agreement."}, {"id": "5.12", "name": "Classification of information", "desc": "Information shall be classified according to the information security needs of the organization based on confidentiality, integrity, availability and relevant interested party requirements."}, {"id": "5.13", "name": "Labelling of information", "desc": "An appropriate set of procedures for information labelling shall be developed and implemented in accordance with the information classification scheme adopted by the organization."}, {"id": "5.14", "name": "Information transfer", "desc": "Information transfer rules, procedures, or agreements shall be in place for all types of transfer facilities within the organization and between the organization and other parties."}, {"id": "5.15", "name": "Access control", "desc": "Rules to control physical and logical access to information and other associated assets shall be established and implemented based on business and information security requirements."}, {"id": "5.16", "name": "Identity management", "desc": "The full life cycle of identities shall be managed."}, {"id": "5.17", "name": "Authentication information", "desc": "Allocation and management of authentication information shall be controlled by a management process, including advising personnel on appropriate handling of authentication information."}, {"id": "5.18", "name": "Access rights", "desc": "Access rights to information and other associated assets shall be provisioned, reviewed, modified and removed in accordance with the organization's topic-specific policy on and rules for access control."}, {"id": "5.19", "name": "Information security in supplier relationships", "desc": "Processes and procedures shall be defined and implemented to manage the information security risks associated with the use of supplier's products or services."}, {"id": "5.20", "name": "Addressing information security within supplier agreements", "desc": "Relevant information security requirements shall be established and agreed with each supplier based on the type of supplier relationship."}, {"id": "5.21", "name": "Managing information security in the ICT supply chain", "desc": "Processes and procedures shall be defined and implemented to manage the information security risks associated with the ICT products and services supply chain."}, {"id": "5.22", "name": "Monitoring, review and change management of supplier services", "desc": "The organization shall regularly monitor, review, evaluate and manage change in supplier information security practices and service delivery."}, {"id": "5.23", "name": "Information security for use of cloud services", "desc": "Processes for acquisition, use, management and exit from cloud services shall be established in accordance with the organization's information security requirements."}, {"id": "5.24", "name": "Information security incident management planning and preparation", "desc": "The organization shall plan and prepare for managing information security incidents by defining, establishing and communicating information security incident management processes, roles and responsibilities."}, {"id": "5.25", "name": "Assessment and decision on information security events", "desc": "The organization shall assess information security events and decide if they are to be categorized as information security incidents."}, {"id": "5.26", "name": "Response to information security incidents", "desc": "Information security incidents shall be responded to in accordance with the documented procedures."}, {"id": "5.27", "name": "Learning from information security incidents", "desc": "Knowledge gained from information security incidents shall be used to strengthen and improve the information security controls."}, {"id": "5.28", "name": "Collection of evidence", "desc": "The organization shall establish and implement procedures for the identification, collection, acquisition and preservation of evidence related to information security events."}, {"id": "5.29", "name": "Information security during disruption", "desc": "The organization shall plan how to maintain information security at an appropriate level during disruption."}, {"id": "5.30", "name": "ICT readiness for business continuity", "desc": "ICT readiness shall be planned, implemented, maintained and tested based on business continuity objectives and ICT continuity requirements."}, {"id": "5.31", "name": "Legal, statutory, regulatory and contractual requirements", "desc": "Legal, statutory, regulatory and contractual requirements relevant to information security and the organization's approach to meet these requirements shall be identified, documented and kept up to date."}, {"id": "5.32", "name": "Intellectual property rights", "desc": "The organization shall implement appropriate procedures to protect intellectual property rights."}, {"id": "5.33", "name": "Protection of records", "desc": "Records shall be protected from loss, destruction, falsification, unauthorized access and unauthorized release."}, {"id": "5.34", "name": "Privacy and protection of PII", "desc": "The organization shall identify and meet the requirements regarding the preservation of privacy and protection of PII according to applicable laws and regulations and contractual requirements."}, {"id": "5.35", "name": "Independent review of information security", "desc": "The organization's approach to managing information security and its implementation including people, processes and technologies shall be reviewed independently at planned intervals, or when significant changes occur."}, {"id": "5.36", "name": "Compliance with policies, rules and standards for information security", "desc": "Compliance with the organization's information security policy, topic-specific policies, rules and standards shall be regularly reviewed."}, {"id": "5.37", "name": "Documented operating procedures", "desc": "Operating procedures for information processing facilities shall be documented and made available to personnel who need them."}]}, {"id": "6", "name": "People Controls", "desc": "Controls relating to human resources security, screening, awareness, training and remote working.", "controls": [{"id": "6.1", "name": "Screening", "desc": "Background verification checks on all candidates to become personnel shall be carried out prior to joining the organization and on an ongoing basis taking into consideration applicable laws, regulations and ethics and be proportional to the business requirements, the classification of the information to be accessed and the perceived risks."}, {"id": "6.2", "name": "Terms and conditions of employment", "desc": "The employment contractual agreements shall state the personnel's and the organization's responsibilities for information security."}, {"id": "6.3", "name": "Information security awareness, education and training", "desc": "Personnel of the organization and relevant interested parties shall receive appropriate information security awareness, education and training and regular updates of the organization's information security policy, topic-specific policies and procedures, as relevant for their job function."}, {"id": "6.4", "name": "Disciplinary process", "desc": "A disciplinary process shall be formalized and communicated to take actions against personnel and other relevant interested parties who have committed an information security policy violation."}, {"id": "6.5", "name": "Responsibilities after termination or change of employment", "desc": "Information security responsibilities and duties that remain valid after termination or change of employment shall be defined, enforced and communicated to relevant personnel and other interested parties."}, {"id": "6.6", "name": "Confidentiality or non-disclosure agreements", "desc": "Confidentiality or non-disclosure agreements reflecting the organization's needs for the protection of information shall be identified, documented, regularly reviewed and signed by personnel and other relevant interested parties."}, {"id": "6.7", "name": "Remote working", "desc": "Security measures shall be implemented when personnel are working remotely to protect information accessed, processed or stored outside the organization's premises."}, {"id": "6.8", "name": "Information security event reporting", "desc": "The organization shall provide a mechanism for personnel to report observed or suspected information security events through appropriate channels in a timely manner."}]}, {"id": "7", "name": "Physical Controls", "desc": "Controls relating to physical security perimeters, entry, equipment and environmental protection.", "controls": [{"id": "7.1", "name": "Physical security perimeters", "desc": "Security perimeters shall be defined and used to protect areas that contain information and other associated assets."}, {"id": "7.2", "name": "Physical entry", "desc": "Secure areas shall be protected by appropriate entry controls and access points."}, {"id": "7.3", "name": "Securing offices, rooms and facilities", "desc": "Physical security for offices, rooms and facilities shall be designed and implemented."}, {"id": "7.4", "name": "Physical security monitoring", "desc": "Premises shall be continuously monitored for unauthorized physical access."}, {"id": "7.5", "name": "Protecting against physical and environmental threats", "desc": "Protection against physical and environmental threats, such as natural disasters and other intentional or unintentional physical threats to infrastructure shall be designed and implemented."}, {"id": "7.6", "name": "Working in secure areas", "desc": "Security measures for working in secure areas shall be designed and implemented."}, {"id": "7.7", "name": "Clear desk and clear screen", "desc": "Clear desk rules for papers and removable storage media and clear screen rules for information processing facilities shall be defined and appropriately enforced."}, {"id": "7.8", "name": "Equipment siting and protection", "desc": "Equipment shall be sited securely and protected."}, {"id": "7.9", "name": "Security of assets off-premises", "desc": "Off-site assets shall be protected."}, {"id": "7.10", "name": "Storage media", "desc": "Storage media shall be managed through their life cycle of acquisition, use, transportation and disposal in accordance with the organization's classification scheme and handling requirements."}, {"id": "7.11", "name": "Supporting utilities", "desc": "Information processing facilities shall be protected from power failures and other disruptions caused by failures in supporting utilities."}, {"id": "7.12", "name": "Cabling security", "desc": "Cables carrying power, data or supporting information services shall be protected from interception, interference or damage."}, {"id": "7.13", "name": "Equipment maintenance", "desc": "Equipment shall be maintained correctly to ensure availability, integrity and confidentiality of information."}, {"id": "7.14", "name": "Secure disposal or re-use of equipment", "desc": "Items of equipment containing storage media shall be verified to ensure that any sensitive data and licensed software has been removed or securely overwritten prior to disposal or re-use."}]}, {"id": "8", "name": "Technological Controls", "desc": "Controls relating to access, authentication, cryptography, vulnerability management, logging and secure development.", "controls": [{"id": "8.1", "name": "User end point devices", "desc": "Information stored on, processed by or accessible via user end point devices shall be protected."}, {"id": "8.2", "name": "Privileged access rights", "desc": "The allocation and use of privileged access rights shall be restricted and managed."}, {"id": "8.3", "name": "Information access restriction", "desc": "Access to information and other associated assets shall be restricted in accordance with the established topic-specific policy on access control."}, {"id": "8.4", "name": "Access to source code", "desc": "Read and write access to source code, development tools and software libraries shall be appropriately managed."}, {"id": "8.5", "name": "Secure authentication", "desc": "Secure authentication technologies and procedures shall be implemented based on information access restrictions and the topic-specific policy on access control."}, {"id": "8.6", "name": "Capacity management", "desc": "The use of resources shall be monitored and adjusted in line with current and expected capacity requirements."}, {"id": "8.7", "name": "Protection against malware", "desc": "Protection against malware shall be implemented and supported by appropriate user awareness."}, {"id": "8.8", "name": "Management of technical vulnerabilities", "desc": "Information about technical vulnerabilities of information systems in use shall be obtained, the organization's exposure to such vulnerabilities shall be evaluated and appropriate measures shall be taken."}, {"id": "8.9", "name": "Configuration management", "desc": "Configurations, including security configurations, of hardware, software, services and networks shall be established, documented, implemented, monitored and reviewed."}, {"id": "8.10", "name": "Information deletion", "desc": "Information stored in information systems, devices or in any other storage media shall be deleted when no longer required."}, {"id": "8.11", "name": "Data masking", "desc": "Data masking shall be used in accordance with the organization's topic-specific policy on access control and other related topic-specific policies, and business requirements, taking applicable legislation into consideration."}, {"id": "8.12", "name": "Data leakage prevention", "desc": "Data leakage prevention measures shall be applied to systems, networks and any other devices that process, store or transmit sensitive information."}, {"id": "8.13", "name": "Information backup", "desc": "Backup copies of information, software and systems shall be maintained and regularly tested in accordance with the agreed topic-specific policy on backup."}, {"id": "8.14", "name": "Redundancy of information processing facilities", "desc": "Information processing facilities shall be implemented with redundancy sufficient to meet availability requirements."}, {"id": "8.15", "name": "Logging", "desc": "Logs that record activities, exceptions, faults and other relevant events shall be produced, stored, protected and analysed."}, {"id": "8.16", "name": "Monitoring activities", "desc": "Networks, systems and applications shall be monitored for anomalous behaviour and appropriate actions taken to evaluate potential information security incidents."}, {"id": "8.17", "name": "Clock synchronization", "desc": "The clocks of information processing systems used by the organization shall be synchronized to approved time sources."}, {"id": "8.18", "name": "Use of privileged utility programs", "desc": "The use of utility programs that can be capable of overriding system and application controls shall be restricted and tightly controlled."}, {"id": "8.19", "name": "Installation of software on operational systems", "desc": "Procedures and measures shall be implemented to securely manage software installation on operational systems."}, {"id": "8.20", "name": "Networks security", "desc": "Networks and network devices shall be secured, managed and controlled to protect information in systems and applications."}, {"id": "8.21", "name": "Security of network services", "desc": "Security mechanisms, service levels and service requirements of network services shall be identified, implemented and monitored."}, {"id": "8.22", "name": "Segregation of networks", "desc": "Groups of information services, users and information systems shall be segregated in the organization's networks."}, {"id": "8.23", "name": "Web filtering", "desc": "Access to external websites shall be managed to reduce exposure to malicious content."}, {"id": "8.24", "name": "Use of cryptography", "desc": "Rules for the effective use of cryptography, including cryptographic key management, shall be defined and implemented."}, {"id": "8.25", "name": "Secure development life cycle", "desc": "Rules for the secure development of software and systems shall be established and applied."}, {"id": "8.26", "name": "Application security requirements", "desc": "Information security requirements shall be identified, specified and approved when developing or acquiring applications."}, {"id": "8.27", "name": "Secure system architecture and engineering principles", "desc": "Principles for engineering secure systems shall be established, documented, maintained and applied to any information system development activities."}, {"id": "8.28", "name": "Secure coding", "desc": "Secure coding principles shall be applied to software development."}, {"id": "8.29", "name": "Security testing in development and acceptance", "desc": "Security testing processes shall be defined and implemented in the development life cycle."}, {"id": "8.30", "name": "Outsourced development", "desc": "The organization shall direct, monitor and review the activities related to outsourced system development."}, {"id": "8.31", "name": "Separation of development, test and production environments", "desc": "Development, testing and production environments shall be separated and secured."}, {"id": "8.32", "name": "Change management", "desc": "Changes to information processing facilities and information systems shall be subject to change management procedures."}, {"id": "8.33", "name": "Test information", "desc": "Test information shall be appropriately selected, protected and managed."}, {"id": "8.34", "name": "Protection of information systems during audit testing", "desc": "Audit tests and other assurance activities involving assessment of operational systems shall be planned and agreed between the tester and appropriate management."}]}]}, {"id": "iso42001", "name": "ISO 42001", "version": "2023", "desc": "Information technology \u2014 Artificial intelligence \u2014 Management system. Requirements for establishing, implementing, maintaining and continually improving an AI management system.", "tag": "ISO/IEC", "domains": [{"id": "A.2", "name": "Policies Related to AI", "desc": "Objective: To provide management direction and support for AI systems according to business requirements.", "controls": [{"id": "A.2.2", "name": "AI policy", "desc": "The organization shall document a policy for the development or use of AI systems."}, {"id": "A.2.3", "name": "Alignment with other organizational policies", "desc": "The organization shall determine where other policies can be affected by or apply to, the organization's objectives with respect to AI systems."}, {"id": "A.2.4", "name": "Review of the AI policy", "desc": "The AI policy shall be reviewed at planned intervals or additionally as needed to ensure its continuing suitability, adequacy and effectiveness."}]}, {"id": "A.3", "name": "Internal Organization", "desc": "Objective: To establish accountability within the organization to uphold its responsible approach for the implementation, operation and management of AI systems.", "controls": [{"id": "A.3.2", "name": "AI roles and responsibilities", "desc": "Roles and responsibilities for AI shall be defined and allocated according to the needs of the organization."}, {"id": "A.3.3", "name": "Reporting of concerns", "desc": "The organization shall define and put in place a process to report concerns about the organization's role with respect to an AI system throughout its life cycle."}]}, {"id": "A.4", "name": "Resources for AI Systems", "desc": "Objective: To ensure that the organization accounts for the resources (including AI system components and assets) of the AI system in order to fully understand and address risks and impacts.", "controls": [{"id": "A.4.2", "name": "Resource documentation", "desc": "The organization shall identify and document relevant resources required for the activities at given AI system life cycle stages and other AI-related activities relevant for the organization."}, {"id": "A.4.3", "name": "Data resources", "desc": "As part of resource identification, the organization shall document information about the data resources utilized for the AI system."}, {"id": "A.4.4", "name": "Tooling resources", "desc": "As part of resource identification, the organization shall document information about the tooling resources utilized for the AI system."}, {"id": "A.4.5", "name": "System and computing resources", "desc": "As part of resource identification, the organization shall document information about the system and computing resources utilized for the AI system."}, {"id": "A.4.6", "name": "Human resources", "desc": "As part of resource identification, the organization shall document information about the human resources and their competences utilized for the development, deployment, operation, change management, maintenance, transfer and decommissioning, as well as verification and integration of the AI system."}]}, {"id": "A.5", "name": "Assessing Impacts of AI Systems", "desc": "Objective: To assess AI system impacts to individuals or groups of individuals, or both, and societies affected by the AI system throughout its life cycle.", "controls": [{"id": "A.5.2", "name": "AI system impact assessment process", "desc": "The organization shall establish a process to assess the potential consequences for individuals or groups of individuals, or both, and societies that can result from the AI system throughout its life cycle."}, {"id": "A.5.3", "name": "Documentation of AI system impact assessments", "desc": "The organization shall document the results of AI system impact assessments and retain results for a defined period."}, {"id": "A.5.4", "name": "Assessing AI system impact on individuals or groups of individuals", "desc": "The organization shall assess and document the potential impacts of AI systems to individuals or groups of individuals throughout the system's life cycle."}, {"id": "A.5.5", "name": "Assessing societal impacts of AI systems", "desc": "The organization shall assess and document the potential societal impacts of their AI systems throughout their life cycle."}]}, {"id": "A.6", "name": "AI System Life Cycle", "desc": "Objective: To define the criteria and requirements for each stage of the AI system life cycle and ensure responsible design and development.", "controls": [{"id": "A.6.1.2", "name": "Objectives for responsible development of AI system", "desc": "The organization shall identify and document objectives to guide the responsible development of AI systems, and take those objectives into account and integrate measures to achieve them in the development life cycle."}, {"id": "A.6.1.3", "name": "Processes for responsible AI system design and development", "desc": "The organization shall define and document the specific processes for the responsible design and development of the AI system."}, {"id": "A.6.2.2", "name": "AI system requirements and specification", "desc": "The organization shall specify and document requirements for new AI systems or material enhancements to existing systems."}, {"id": "A.6.2.3", "name": "Documentation of AI system design and development", "desc": "The organization shall document the AI system design and development based on organizational objectives, documented requirements and specification criteria."}, {"id": "A.6.2.4", "name": "AI system verification and validation", "desc": "The organization shall define and document verification and validation measures for the AI system and specify criteria for their use."}, {"id": "A.6.2.5", "name": "AI system deployment", "desc": "The organization shall document a deployment plan and ensure that appropriate requirements are met prior to deployment."}, {"id": "A.6.2.6", "name": "AI system operation and monitoring", "desc": "The organization shall define and document the necessary elements for the ongoing operation of the AI system. At the minimum, this should include system and performance monitoring, repairs, updates and support."}, {"id": "A.6.2.7", "name": "AI system technical documentation", "desc": "The organization shall determine what AI system technical documentation is needed for each relevant category of interested parties, such as users, partners, supervisory authorities, and provide the technical documentation to them in the appropriate form."}, {"id": "A.6.2.8", "name": "AI system recording of event logs", "desc": "The organization shall determine at which phases of the AI system life cycle, record keeping of event logs should be enabled, but at the minimum when the AI system is in use."}]}, {"id": "A.7", "name": "Data for AI Systems", "desc": "Objective: To ensure that the organization understands the role and impacts of data in AI systems throughout their life cycles.", "controls": [{"id": "A.7.2", "name": "Data for development and enhancement of AI system", "desc": "The organization shall define, document and implement data management processes related to the development of AI systems."}, {"id": "A.7.3", "name": "Acquisition of data", "desc": "The organization shall determine and document details about the acquisition and selection of the data used in AI systems."}, {"id": "A.7.4", "name": "Quality of data for AI systems", "desc": "The organization shall define and document requirements for data quality and ensure that data used to develop and operate the AI system meet those requirements."}, {"id": "A.7.5", "name": "Data provenance", "desc": "The organization shall define and document a process for recording the provenance of data used in its AI systems over the life cycles of the data and the AI system."}, {"id": "A.7.6", "name": "Data preparation", "desc": "The organization shall define and document its criteria for selecting data preparations and the data preparation methods to be used."}]}, {"id": "A.8", "name": "Information for Interested Parties of AI Systems", "desc": "Objective: To ensure that relevant interested parties have the necessary information to understand and assess the risks and their impacts.", "controls": [{"id": "A.8.2", "name": "System documentation and information for users", "desc": "The organization shall determine and provide the necessary information to users of the AI system."}, {"id": "A.8.3", "name": "External reporting", "desc": "The organization shall provide capabilities for interested parties to report adverse impacts of the AI system."}, {"id": "A.8.4", "name": "Communication of incidents", "desc": "The organization shall determine and document a plan for communicating incidents to users of the AI system."}, {"id": "A.8.5", "name": "Information for interested parties", "desc": "The organization shall determine and document their obligations to reporting information about the AI system to interested parties."}]}, {"id": "A.9", "name": "Use of AI Systems", "desc": "Objective: To ensure that the organization uses AI systems responsibly and per organizational policies.", "controls": [{"id": "A.9.2", "name": "Processes for responsible use of AI systems", "desc": "The organization shall define and document the processes for the responsible use of AI systems."}, {"id": "A.9.3", "name": "Objectives for responsible use of AI system", "desc": "The organization shall identify and document objectives to guide the responsible use of AI systems."}, {"id": "A.9.4", "name": "Intended use of the AI system", "desc": "The organization shall ensure that the AI system is used according to the intended uses of the AI system and its accompanying documentation."}]}, {"id": "A.10", "name": "Third-Party and Customer Relationships", "desc": "Objective: To ensure that the organization understands its responsibilities and remains accountable when third parties are involved at any stage of the AI system life cycle.", "controls": [{"id": "A.10.2", "name": "Allocating responsibilities", "desc": "The organization shall ensure that responsibilities within their AI system life cycle are allocated between the organization, its partners, suppliers, customers and third parties."}, {"id": "A.10.3", "name": "Suppliers", "desc": "The organization shall establish a process to ensure that its usage of services, products or materials provided by suppliers aligns with the organization's approach to the responsible development and use of AI systems."}, {"id": "A.10.4", "name": "Customers", "desc": "The organization shall ensure that its responsible approach to the development and use of AI systems considers their customer expectations and needs."}]}]}, {"id": "cobit", "name": "COBIT 2019", "version": "2019", "desc": "COBIT\u00ae 2019 Framework: Governance and Management Objectives. A framework for enterprise governance of information and technology (EGIT).", "tag": "ISACA", "domains": [{"id": "EDM", "name": "Evaluate, Direct and Monitor", "desc": "Governance domain: The board's governance objectives \u2014 ensuring the organization's governance framework for I&T is established and maintained.", "controls": [{"id": "EDM01", "name": "Ensured Governance Framework Setting and Maintenance", "desc": "Analyze and articulate the requirements for the governance of enterprise I&T, and put in place and maintain effective enabling structures, principles, processes and practices, with clarity of responsibilities and authority to achieve the enterprise's mission, goals and objectives."}, {"id": "EDM02", "name": "Ensured Benefits Delivery", "desc": "Secure optimal value from I&T-enabled initiatives, services and assets; cost-efficient delivery of solutions and services; and a reliable and accurate picture of costs and likely benefits so that business needs are supported effectively and efficiently."}, {"id": "EDM03", "name": "Ensured Risk Optimization", "desc": "Ensure that I&T-related enterprise risk does not exceed the enterprise's risk appetite and risk tolerance, the impact of I&T risk to enterprise value is identified and managed, and the potential for compliance failures is minimized."}, {"id": "EDM04", "name": "Ensured Resource Optimization", "desc": "Ensure that the resource needs of the enterprise are met in the optimal manner, I&T costs are optimized, and there is an increased likelihood of benefit realization and readiness for future change."}, {"id": "EDM05", "name": "Ensured Stakeholder Engagement", "desc": "Ensure that enterprise I&T stakeholder engagement and communication are effective and that the basis for reporting to stakeholders is established, including identification, establishment and maintenance of the basis for communication."}]}, {"id": "APO", "name": "Align, Plan and Organise", "desc": "Management domain: Provides direction to solution delivery and service delivery and manages I&T-related risks across the enterprise.", "controls": [{"id": "APO01", "name": "Managed I&T Management Framework", "desc": "Clarify and maintain the mission and vision of enterprise I&T. Implement and maintain mechanisms and authorities for the management of information and technology, and implement a governance and management framework for I&T governance across the enterprise."}, {"id": "APO02", "name": "Managed Strategy", "desc": "Provide a holistic view of the current business and I&T environment, the future direction, and the initiatives required to migrate to the desired future environment. Leverage enterprise architecture building blocks and components, including externally provided services and related capabilities to enable a nimble, reliable and efficient response to strategic objectives."}, {"id": "APO03", "name": "Managed Enterprise Architecture", "desc": "Establish a common architecture consisting of business process, information, data, application and technology architecture layers, based on business and technology strategy, to effectively and efficiently realize the current and future business strategy by creating key models and practices that describe the baseline and target architectures."}, {"id": "APO04", "name": "Managed Innovation", "desc": "Maintain an awareness of I&T and related service trends. Proactively identify innovation opportunities and plan how to benefit from innovation in relation to business needs. Analyze what opportunities for business innovation or improvement can be created by emerging technologies, services or I&T-enabled business innovation, as well as through existing established technologies and by business and IT process innovation."}, {"id": "APO05", "name": "Managed Portfolio", "desc": "Execute the strategic direction set for investments in line with the enterprise architecture vision and I&T road map. Consider the different categories of investments and constraints of funding. Include other organizational resources such as people and infrastructure in the investment decision."}, {"id": "APO06", "name": "Managed Budget and Costs", "desc": "Manage the I&T-related financial activities in both the business and IT functions, covering budget, cost and benefit management, and prioritization of spending through the use of formal budgeting practices and a fair and equitable system of allocating costs to the enterprise."}, {"id": "APO07", "name": "Managed Human Resources", "desc": "Provide a structured approach to ensure optimal recruitment/acquisition, planning, evaluation and development of human resources, including third-party providers, in line with enterprise objectives; select the most appropriate provider (internal or external) for people and skills. Ensure that the human resources function in I&T is capable of delivering appropriate competencies, skills and a workforce that aligns with I&T strategy."}, {"id": "APO08", "name": "Managed Relationships", "desc": "Manage relationships with business stakeholders in a formalized and transparent way that ensures a mutual trust and combined focus on achieving shared enterprise goals within the constraints of budgets and risk tolerance."}, {"id": "APO09", "name": "Managed Service Agreements", "desc": "Align I&T-enabled products and services and service levels with enterprise needs and expectations, including identification, specification, design, publishing, agreement to, and monitoring of I&T products, services and service levels."}, {"id": "APO10", "name": "Managed Vendors", "desc": "Manage I&T-related products and services provided by all types of vendors to meet enterprise requirements. This includes the selection of vendors, management of relationships, management of contracts, and reviewing and monitoring of contract performance for effectiveness and compliance."}, {"id": "APO11", "name": "Managed Quality", "desc": "Define and communicate quality requirements in all processes, procedures and the related enterprise outcomes. Enable control of processes and tasks to ensure that they meet quality and compliance requirements. Use quality management experience and standards to develop quality assurance and control practices."}, {"id": "APO12", "name": "Managed Risk", "desc": "Continually identify, assess and reduce I&T-related risk within tolerance levels set by enterprise executive management and in line with the enterprise's risk appetite and risk tolerance."}, {"id": "APO13", "name": "Managed Security", "desc": "Define, operate and monitor an information security management system to keep the impact and occurrence of information security incidents within the enterprise's risk appetite levels."}, {"id": "APO14", "name": "Managed Data", "desc": "Achieve and sustain effective management of the enterprise data assets across the data life cycle, from creation through disposal, in line with enterprise strategy and data requirements."}]}, {"id": "BAI", "name": "Build, Acquire and Implement", "desc": "Management domain: Provides direction for the definition, acquisition and implementation of I&T solutions and their integration into business processes.", "controls": [{"id": "BAI01", "name": "Managed Programs", "desc": "Manage all programs from the investment portfolio in alignment with enterprise strategy and in a coordinated way, based on a standard program management approach. Initiate, plan, control, and execute programs, and monitor expected vs. actual performance to realize expected business benefit and avoid adverse impacts."}, {"id": "BAI02", "name": "Managed Requirements Definition", "desc": "Identify solutions and analyze requirements before acquisition or creation to ensure that they align with enterprise strategic requirements covering business processes, applications, information/data, infrastructure and services."}, {"id": "BAI03", "name": "Managed Solutions Identification and Build", "desc": "Establish and maintain identified products and services (technology, business processes and workflows) in line with enterprise requirements covering design, development, procurement/sourcing and partnering with suppliers/vendors."}, {"id": "BAI04", "name": "Managed Availability and Capacity", "desc": "Balance current and future needs for availability, performance and capacity with cost-effective service provision. Include assessment of current capabilities, forecasting of future needs based on business requirements, and analysis of business impacts to schedule investments in I&T capabilities."}, {"id": "BAI05", "name": "Managed Organizational Change", "desc": "Maximize the likelihood of successfully implementing sustainable enterprisewide organizational change quickly and with reduced risk. Cover the complete life cycle of the change and all affected stakeholders in the business and IT."}, {"id": "BAI06", "name": "Managed IT Changes", "desc": "Manage all changes in a controlled manner, including standard changes and emergency maintenance relating to business processes, applications and infrastructure. This includes change standards and procedures, impact assessment, prioritization, authorization, planning, scheduling, implementation, documentation and post-implementation review."}, {"id": "BAI07", "name": "Managed IT Change Acceptance and Transitioning", "desc": "Formally accept and make operational new solutions, including implementation planning, system and data conversion, acceptance testing, communication, release preparation, promotion to production of new or changed business processes and I&T services, and early production support."}, {"id": "BAI08", "name": "Managed Knowledge", "desc": "Maintain the availability of relevant, current, validated and reliable knowledge and management information to support all process activities and to facilitate decision making related to the governance and management of enterprise I&T."}, {"id": "BAI09", "name": "Managed Assets", "desc": "Manage I&T assets through their life cycle to make sure that their use delivers value at optimal cost, they remain operational (fit for purpose), and they are accounted for and physically protected. Manage software assets to ensure that only authorized and properly licensed software is available."}, {"id": "BAI10", "name": "Managed Configuration", "desc": "Define and maintain descriptions and relationships among key resources and capabilities required to deliver I&T-enabled services. Include collecting configuration information, establishing baselines, verifying and auditing configuration information, and updating the configuration repository."}, {"id": "BAI11", "name": "Managed Projects", "desc": "Manage all I&T-related projects from the investment portfolio in alignment with enterprise strategy and in a coordinated way. Initiate, plan, control, and execute I&T-related projects and close with a post-implementation review."}]}, {"id": "DSS", "name": "Deliver, Service and Support", "desc": "Management domain: Addresses the operational delivery and support of I&T services, including the management of security.", "controls": [{"id": "DSS01", "name": "Managed Operations", "desc": "Coordinate and execute the activities and operational procedures required to deliver internal and outsourced I&T services. Include the execution of predefined standard operating procedures and the required monitoring activities."}, {"id": "DSS02", "name": "Managed Service Requests and Incidents", "desc": "Provide timely and effective response to user requests and resolution of all types of incidents. Restore normal service; record and fulfil user requests; and record, investigate, diagnose, escalate and resolve incidents."}, {"id": "DSS03", "name": "Managed Problems", "desc": "Identify and classify problems and their root causes. Provide timely resolution to prevent recurring incidents. Provide recommendations for improvements."}, {"id": "DSS04", "name": "Managed Continuity", "desc": "Establish and maintain a plan to enable the business and IT organizations to respond to incidents and quickly adapt to disruptions. This will enable continued operations of critical business processes and required I&T services and maintain availability of information at a level acceptable to the enterprise."}, {"id": "DSS05", "name": "Managed Security Services", "desc": "Protect enterprise information to maintain the level of information security risk acceptable to the enterprise in accordance with the security policy. Establish and maintain information security roles and access privileges and perform security monitoring."}, {"id": "DSS06", "name": "Managed Business Process Controls", "desc": "Define and maintain appropriate business process controls to ensure that information related to and processed by in-house or outsourced business processes satisfies all relevant information control requirements."}]}, {"id": "MEA", "name": "Monitor, Evaluate and Assess", "desc": "Management domain: Monitors all processes to ensure compliance with performance targets and to confirm adequacy and effectiveness of controls.", "controls": [{"id": "MEA01", "name": "Managed Performance and Conformance Monitoring", "desc": "Collect, validate and evaluate enterprise and alignment goals and metrics. Monitor that processes and practices are performing against agreed performance and conformance goals and metrics. Provide reporting that is systematic and timely to allow management to make appropriate corrective actions."}, {"id": "MEA02", "name": "Managed System of Internal Control", "desc": "Continuously monitor and evaluate the control environment, including self-assessments and self-awareness. Enable management to identify control deficiencies and inefficiencies and to initiate improvement actions. Plan, organize and maintain standards for internal control assessment and assurance activities."}, {"id": "MEA03", "name": "Managed Compliance with External Requirements", "desc": "Evaluate that I&T processes and I&T-supported business processes are compliant with laws, regulations and contractual requirements. Obtain assurance that the requirements have been identified and complied with, and integrate IT compliance with overall enterprise compliance."}, {"id": "MEA04", "name": "Managed Assurance", "desc": "Plan, scope, execute and follow through on assurance initiatives to obtain guidance on the degree to which the portfolio of programs and the full portfolio of IT services, assets and resources are adequate and fit for purpose. Obtain independent assurance reports and coordinate with internal audit."}]}]}, {"id": "soc2", "name": "SOC 2", "version": "Type II", "desc": "AICPA Trust Services Criteria for service organizations.", "tag": "AICPA", "domains": [{"id": "CC1", "name": "Control Environment", "desc": "Governance, tone at the top and accountability.", "controls": [{"id": "CC1.1", "name": "Integrity and ethical values", "desc": "The entity demonstrates a commitment to integrity and ethical values."}, {"id": "CC1.2", "name": "Board oversight", "desc": "The board of directors demonstrates independence from management and exercises oversight of the development and performance of internal control."}, {"id": "CC1.3", "name": "Structures, reporting lines and authority", "desc": "Management establishes structures, reporting lines, and appropriate authorities and responsibilities in the pursuit of objectives."}, {"id": "CC1.4", "name": "Competence and development", "desc": "The entity demonstrates a commitment to attract, develop, and retain competent individuals in alignment with objectives."}, {"id": "CC1.5", "name": "Accountability", "desc": "The entity holds individuals accountable for their internal control responsibilities in the pursuit of objectives."}]}, {"id": "CC2", "name": "Communication & Information", "desc": "Quality information and effective communication relevant to objectives.", "controls": [{"id": "CC2.1", "name": "Quality information", "desc": "The entity obtains or generates and uses relevant, quality information to support the functioning of internal control."}, {"id": "CC2.2", "name": "Internal communication", "desc": "The entity internally communicates information, including objectives and responsibilities for internal control."}, {"id": "CC2.3", "name": "External communication", "desc": "The entity communicates with external parties regarding matters affecting the functioning of internal control."}]}, {"id": "CC3", "name": "Risk Assessment", "desc": "Identifying and analyzing risks to achievement of objectives.", "controls": [{"id": "CC3.1", "name": "Specify suitable objectives", "desc": "The entity specifies objectives with sufficient clarity to enable the identification and assessment of risks."}, {"id": "CC3.2", "name": "Identify and analyze risk", "desc": "The entity identifies risks to the achievement of its objectives across the entity and analyzes risks as a basis for determining how the risks should be managed."}, {"id": "CC3.3", "name": "Assess fraud risk", "desc": "The entity considers the potential for fraud in assessing risks to the achievement of objectives."}, {"id": "CC3.4", "name": "Identify and assess change", "desc": "The entity identifies and assesses changes that could significantly impact the system of internal control."}]}, {"id": "CC6", "name": "Logical & Physical Access", "desc": "Logical access security, authentication and physical access controls.", "controls": [{"id": "CC6.1", "name": "Logical access security", "desc": "The entity implements logical access security software, infrastructure, and architectures over protected information assets to protect them from security events."}, {"id": "CC6.2", "name": "New access credentials", "desc": "Prior to issuing system credentials and granting system access, the entity registers and authorizes new internal and external users."}, {"id": "CC6.3", "name": "Role-based access", "desc": "The entity authorizes, modifies, or removes access to data, software, functions, and other protected assets based on roles and responsibilities."}, {"id": "CC6.6", "name": "Security threats from outside the system", "desc": "The entity implements controls to prevent and detect threats and vulnerabilities from outside the system boundary."}, {"id": "CC6.7", "name": "Transmission and movement of data", "desc": "The entity restricts the transmission, movement, and removal of information to authorized internal and external users and processes."}, {"id": "CC6.8", "name": "Prevention and detection of unauthorized software", "desc": "The entity implements controls to prevent or detect and act upon the introduction of unauthorized or malicious software."}]}, {"id": "CC7", "name": "System Operations", "desc": "Monitoring, change management and incident response.", "controls": [{"id": "CC7.1", "name": "Configuration management", "desc": "The entity uses detection and monitoring procedures to identify changes to configurations that introduce new vulnerabilities."}, {"id": "CC7.2", "name": "Monitor for anomalies", "desc": "The entity monitors system components and the operation of those components for anomalies indicative of malicious acts, natural disasters, and errors."}, {"id": "CC7.3", "name": "Evaluate security events", "desc": "The entity evaluates security events to determine whether they could or have resulted in a failure to meet its objectives."}, {"id": "CC7.4", "name": "Respond to security incidents", "desc": "The entity responds to identified security incidents by executing a defined incident response program."}, {"id": "CC7.5", "name": "Recover from security incidents", "desc": "The entity identifies, develops, and implements activities to recover from identified security incidents."}]}, {"id": "CC8", "name": "Change Management", "desc": "Controls for managing changes to infrastructure, data, software and procedures.", "controls": [{"id": "CC8.1", "name": "Change management process", "desc": "The entity authorizes, designs, develops, configures, documents, tests, approves, and implements changes to infrastructure, data, software, and procedures."}]}, {"id": "CC9", "name": "Risk Mitigation", "desc": "Risk mitigation activities for business disruption and vendor risks.", "controls": [{"id": "CC9.1", "name": "Business disruption risk mitigation", "desc": "The entity identifies, selects, and develops risk mitigation activities for risks arising from potential business disruptions."}, {"id": "CC9.2", "name": "Vendor and business partner risk", "desc": "The entity assesses and manages risks associated with vendors and business partners."}]}]}, {"id": "gdpr", "name": "GDPR", "version": "EU 2016/679", "desc": "European regulation on data protection and privacy for individuals within the EU.", "tag": "EU Law", "domains": [{"id": "Art.5", "name": "Principles of Processing", "desc": "Lawfulness, fairness, transparency and data minimisation.", "controls": [{"id": "Art.5.1(a)", "name": "Lawfulness, fairness and transparency", "desc": "Personal data shall be processed lawfully, fairly and in a transparent manner in relation to the data subject."}, {"id": "Art.5.1(b)", "name": "Purpose limitation", "desc": "Collected for specified, explicit and legitimate purposes and not further processed in a manner that is incompatible with those purposes."}, {"id": "Art.5.1(c)", "name": "Data minimisation", "desc": "Adequate, relevant and limited to what is necessary in relation to the purposes for which they are processed."}, {"id": "Art.5.1(d)", "name": "Accuracy", "desc": "Accurate and, where necessary, kept up to date; inaccurate personal data must be erased or rectified without delay."}, {"id": "Art.5.1(e)", "name": "Storage limitation", "desc": "Kept in identifiable form no longer than necessary for the purposes."}, {"id": "Art.5.1(f)", "name": "Integrity and confidentiality", "desc": "Processed in a manner that ensures appropriate security including protection against unauthorised processing and accidental loss."}, {"id": "Art.5.2", "name": "Accountability", "desc": "The controller shall be responsible for, and be able to demonstrate compliance with, the principles."}]}, {"id": "Art.6", "name": "Lawful Basis for Processing", "desc": "Legal grounds permitting processing of personal data.", "controls": [{"id": "Art.6.1(a)", "name": "Consent", "desc": "The data subject has given consent to the processing of his or her personal data for one or more specific purposes."}, {"id": "Art.6.1(b)", "name": "Contractual necessity", "desc": "Processing is necessary for the performance of a contract to which the data subject is party."}, {"id": "Art.6.1(c)", "name": "Legal obligation", "desc": "Processing is necessary for compliance with a legal obligation to which the controller is subject."}, {"id": "Art.6.1(f)", "name": "Legitimate interests", "desc": "Processing is necessary for the purposes of the legitimate interests pursued by the controller or by a third party."}]}, {"id": "Art.15-22", "name": "Data Subject Rights", "desc": "Rights of data subjects regarding their personal data.", "controls": [{"id": "Art.15", "name": "Right of access", "desc": "The data subject shall have the right to obtain confirmation as to whether or not personal data concerning him or her are being processed."}, {"id": "Art.16", "name": "Right to rectification", "desc": "The data subject shall have the right to obtain without undue delay the rectification of inaccurate personal data."}, {"id": "Art.17", "name": "Right to erasure", "desc": "The data subject shall have the right to obtain the erasure of personal data without undue delay where specified grounds apply."}, {"id": "Art.18", "name": "Right to restriction of processing", "desc": "The data subject shall have the right to obtain restriction of processing where certain grounds apply."}, {"id": "Art.20", "name": "Right to data portability", "desc": "The data subject shall have the right to receive the personal data in a structured, commonly used and machine-readable format."}, {"id": "Art.21", "name": "Right to object", "desc": "The data subject shall have the right to object at any time to processing of personal data based on legitimate interests or public task."}, {"id": "Art.22", "name": "Automated decision-making and profiling", "desc": "The data subject shall have the right not to be subject to a decision based solely on automated processing which produces legal or similarly significant effects."}]}, {"id": "Art.32", "name": "Security of Processing", "desc": "Technical and organisational measures appropriate to the risk.", "controls": [{"id": "Art.32.1(a)", "name": "Pseudonymisation and encryption", "desc": "Implementation of pseudonymisation and encryption of personal data where appropriate."}, {"id": "Art.32.1(b)", "name": "Ongoing confidentiality and availability", "desc": "The ability to ensure ongoing confidentiality, integrity, availability and resilience of processing systems."}, {"id": "Art.32.1(c)", "name": "Restore availability", "desc": "The ability to restore availability and access to personal data in a timely manner after an incident."}, {"id": "Art.32.1(d)", "name": "Testing and evaluation", "desc": "A process for regularly testing, assessing and evaluating the effectiveness of technical and organisational measures."}]}, {"id": "Art.33-34", "name": "Breach Notification", "desc": "Requirements for notification following a personal data breach.", "controls": [{"id": "Art.33.1", "name": "Notification within 72 hours", "desc": "In the case of a personal data breach, the controller shall notify the supervisory authority not later than 72 hours after becoming aware."}, {"id": "Art.33.3", "name": "Content of the notification", "desc": "Notification shall describe the nature of the breach, categories of data subjects and measures taken to address the breach."}, {"id": "Art.34.1", "name": "Communication to data subjects", "desc": "When the breach is likely to result in a high risk to rights and freedoms, the controller shall communicate the breach to the data subject without undue delay."}]}, {"id": "Art.35", "name": "Data Protection Impact Assessment", "desc": "DPIA required for processing likely to result in high risk.", "controls": [{"id": "Art.35.1", "name": "DPIA requirement", "desc": "Where processing is likely to result in a high risk to the rights and freedoms of natural persons, the controller shall carry out a data protection impact assessment."}, {"id": "Art.35.7", "name": "DPIA content", "desc": "The assessment shall contain a systematic description of processing operations, assessment of necessity and proportionality, risks and measures to address risks."}]}]}, {"id": "pci", "name": "PCI DSS", "version": "v4.0", "desc": "Payment Card Industry Data Security Standard for protecting cardholder data.", "tag": "PCI SSC", "domains": [{"id": "Req.1", "name": "Network Security Controls", "desc": "Build and maintain a secure network and systems.", "controls": [{"id": "1.1", "name": "Network security control processes", "desc": "Processes and mechanisms for protecting the network from unauthorized access are defined, documented, implemented and maintained."}, {"id": "1.2", "name": "Network security configuration", "desc": "Network security controls are configured and validated to restrict inbound and outbound traffic."}, {"id": "1.3", "name": "Restrict inbound and outbound traffic", "desc": "Network access to and from the cardholder data environment is restricted."}, {"id": "1.4", "name": "Untrusted network connections", "desc": "Network connections between trusted and untrusted networks are controlled."}]}, {"id": "Req.3", "name": "Protect Stored Account Data", "desc": "Protect stored account data.", "controls": [{"id": "3.2", "name": "Storage of account data minimized", "desc": "Storage of account data is kept to a minimum."}, {"id": "3.3", "name": "Sensitive authentication data not retained", "desc": "Sensitive authentication data (SAD) is not retained after authorization."}, {"id": "3.4", "name": "PAN rendered unreadable", "desc": "PAN rendered unreadable anywhere it is stored."}, {"id": "3.5", "name": "Cryptographic key management", "desc": "PAN secured with strong cryptography; key management processes defined and implemented."}]}, {"id": "Req.6", "name": "Secure Systems and Software", "desc": "Develop and maintain secure systems and software.", "controls": [{"id": "6.1", "name": "Security vulnerability management", "desc": "Processes and mechanisms for protecting against known vulnerabilities are defined and understood."}, {"id": "6.2", "name": "Bespoke and custom software", "desc": "Bespoke and custom software are developed securely."}, {"id": "6.3", "name": "Security vulnerabilities identified", "desc": "Security vulnerabilities are identified and protected against."}, {"id": "6.4", "name": "Public-facing web applications protected", "desc": "Public-facing web applications are protected against attacks."}, {"id": "6.5", "name": "Changes to system components controlled", "desc": "All changes to system components in the production environment are authorized and managed securely."}]}, {"id": "Req.8", "name": "Identify Users & Authenticate Access", "desc": "Identify users and authenticate access to system components.", "controls": [{"id": "8.2", "name": "Unique user IDs", "desc": "All users are assigned and use a unique ID before allowing them to access system components or cardholder data."}, {"id": "8.3", "name": "Strong authentication for users", "desc": "User identification and related accounts are strictly managed throughout an account's lifecycle."}, {"id": "8.4", "name": "Multi-factor authentication for CDE", "desc": "Multi-factor authentication is implemented to secure access into the CDE."}, {"id": "8.5", "name": "MFA systems configured securely", "desc": "Multi-factor authentication systems are configured to prevent misuse."}]}, {"id": "Req.10", "name": "Log and Monitor All Access", "desc": "Log and monitor all access to system components and cardholder data.", "controls": [{"id": "10.2", "name": "Audit logs implemented", "desc": "Audit logs capture all individual user access to cardholder data, actions by root or administrative access, and invalid logical access attempts."}, {"id": "10.3", "name": "Audit logs protected", "desc": "Audit logs are protected to prevent modifications."}, {"id": "10.4", "name": "Audit logs reviewed", "desc": "Audit logs are reviewed to identify anomalies or suspicious activity."}, {"id": "10.7", "name": "Failures of security controls detected", "desc": "Failures of critical security controls are detected, reported, and responded to promptly."}]}, {"id": "Req.11", "name": "Test Security Regularly", "desc": "Test security of systems and networks regularly.", "controls": [{"id": "11.3", "name": "Vulnerability scanning", "desc": "External and internal vulnerabilities are regularly identified, prioritized, and addressed."}, {"id": "11.4", "name": "Penetration testing", "desc": "External and internal penetration testing is regularly performed."}, {"id": "11.5", "name": "Network intrusion detection", "desc": "Network intrusions and unexpected file changes are detected and responded to."}]}, {"id": "Req.12", "name": "Security Policies and Programs", "desc": "Support information security with organizational policies and programs.", "controls": [{"id": "12.1", "name": "Comprehensive information security policy", "desc": "A comprehensive information security policy that governs protection of the entity's information assets is known and current."}, {"id": "12.3", "name": "Risk management for technologies", "desc": "Risks to cardholder data and other assets are identified, evaluated, and managed."}, {"id": "12.10", "name": "Incident response plan", "desc": "Suspected and confirmed security incidents that could impact the CDE are responded to immediately."}]}]}, {"id": "nist", "name": "NIST CSF", "version": "2.0", "desc": "Voluntary framework for managing and reducing cybersecurity risk.", "tag": "NIST", "domains": [{"id": "GV", "name": "Govern", "desc": "Establish and monitor the cybersecurity risk management strategy.", "controls": [{"id": "GV.OC", "name": "Organizational context", "desc": "The circumstances informing the organization's cybersecurity risk decisions are understood."}, {"id": "GV.RM", "name": "Risk management strategy", "desc": "The organization's priorities, constraints, risk tolerance and appetite are established, communicated and used."}, {"id": "GV.RR", "name": "Roles and responsibilities",
